# Fixture for advisory rule A3 — anchor citation is not a primary
# source. The deterministic validator passes (anchor.length >= 5),
# but a Medium post is not a peer-reviewed paper, recognised textbook,
# or established standards document. Rule #5 / #8 require named,
# decades-tested patterns; blog posts decay (link-rot, edits) and
# the constitution is supposed to outlive any single source.
#
# The Skill should emit rule_id=A3, severity=high, suggested_repair
# pointing the author at a primary source (textbook, paper, RFC).
id: blog-anchor-example
hypothesis: |
  Adopting the new caching layer drops mean p99 read latency from
  120ms to <80ms across the synthetic benchmark suite within 7 days
  post-rollout.
success: "p99 < 80ms over 7 d"
pivot: "p99 >= 100ms over 7 d → caching layer is wrong; rip it out"
measurement: "test $(node scripts/p99.mjs) -lt 80"
anchor: "https://medium.com/@randomperson/why-caching-is-good-2019"
