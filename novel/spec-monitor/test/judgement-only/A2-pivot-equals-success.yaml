# Fixture for advisory rule A2 — pivot threshold has zero margin from
# success threshold. The deterministic validator passes (both fields
# are ≥5 chars). But the pivot at "< 95 %" against success at ">= 95 %"
# means any single failed observation triggers a pivot — there is no
# margin for noise, and the pivot carries no information beyond the
# success threshold. Per Ries 2011, that is theatre.
#
# The Skill should emit rule_id=A2, severity=medium, suggested_repair
# pointing to a 5-10 point margin and (where applicable) a wider
# observation window for the pivot threshold.
id: zero-margin-pivot-example
hypothesis: |
  Adapter availability stays at-or-above 95 % over rolling 30-day
  windows once the supervisor's restart-with-backoff strategy lands.
success: ">= 95 % uptime over 30 d"
pivot: "< 95 % uptime over 30 d"
measurement: "node scripts/uptime.mjs --window=30d"
anchor: "Beyer et al., *SRE* 2016, Ch. 4 (SLI / SLO)"
