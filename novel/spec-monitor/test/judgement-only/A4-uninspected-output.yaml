# Fixture for advisory rule A4 — measurement command runs but does
# not check its output against a threshold. The CI runner records
# the exit code; this command's exit code is 0 as long as the curl
# succeeds, regardless of the value returned. That gives false
# confidence: every observation "validates" the hypothesis.
#
# The Skill should emit rule_id=A4, severity=high, suggested_repair
# pointing to a threshold check (e.g., wrap with `test … -lt N` or
# `jq -e '.value < N'`).
id: uninspected-curl-example
hypothesis: |
  Token consumption per closed user-story drops by ≥5 % month-over-
  month after the prompt-optimizer rollout, as measured against the
  observability backend's `/metrics/tokens-per-story` endpoint.
success: ">= 5 % MoM decrease"
pivot: "<= 0 % MoM for 3 consecutive months → MAPE-K loop isn't helping; pivot"
measurement: "curl -s https://otel.local/metrics/tokens-per-story"
anchor: "Goldratt, *The Goal*, 1984 (Theory of Constraints — improving the constraint should move the metric)"
