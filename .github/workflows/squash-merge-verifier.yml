# squash-merge-verifier — detect files SILENTLY DROPPED by a GitHub
# squash-merge.
#
# Pattern: deterministic gate over the merge artefact (rule #10) wired into
# the merge timeline (push to main). Source: vision.md rule #10 (deterministic
# enforcement), rule #17 (proactive healing — observation IS the fix), rule
# #18 (Merge means MERGE — this guards the "merge dropped my file" subclass);
# 2026-05-21 PR #704 → #706 ghost-fix class. Vision § Pattern conformance
# index row for `scripts/verify-squash-merge-completeness.mjs`.
#
# Why this exists: GitHub's squash-merge re-merges parallel main churn into
# the squashed body and can silently drop a file the PR's diff included
# (observed: PR #704's `.releaserc.json`). `scripts/verify-squash-merge-
# completeness.mjs` compares each recent squash commit's file list against the
# closed PR's `--json files` and fails loudly when a file was dropped, so the
# operator re-ships the fix instead of discovering the gap days later.
#
# Read-only against the repo: it does NOT push, comment, or mutate state — it
# walks the last N first-parent commits, queries `gh pr view`, and exits
# non-zero on a drop. Don't touch ci.yml / experiment-tracker.yml territory —
# this workflow is the squash-merge-completeness gate only.

name: squash-merge-verifier

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: squash-merge-verifier-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the last few first-parent commits to inspect recent merges.
          fetch-depth: 20
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - name: verify recent squash-merges dropped no files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/verify-squash-merge-completeness.mjs --lookback=5
