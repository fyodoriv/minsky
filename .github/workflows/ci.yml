    # fails when the count exceeds 200; missing file is dormant (rule #7
    # graceful degrade — same precedent as `mape-k-budget-cap`).
    # Anchor: rule #10 (vision.md § 10 — deterministic enforcement);
    # Helland, "Life beyond Distributed Transactions", *CIDR* 2007
    # (immutable log — archive-by-reissue rather than mutate); Beck,
    # *Extreme Programming Explained*, 1999, Ch. 17 (CI as the constraint
    # enforcer).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: mape-k-constraints-md-size lint
        run: node scripts/check-mape-k-constraints-md-size.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-mape-k-constraints-md-size.test.mjs

