name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx -y markdownlint-cli2 "**/*.md" "#**/node_modules" "#.minsky" "#.obsidian" "#.claude"

  tasks-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx -y @tasks-md/lint@latest TASKS.md

  glossary-discipline:
    # vision.md § rule #5: every Minsky-coined term in vision.md resolves
    # to a Glossary entry. Implements rule #10 (deterministic enforcement)
    # for rule #5 — replaces the earlier section-header-only check.
    # Source: scripts/check-rule-5-glossary-discipline.mjs +
    #   scripts/glossary-allowlist.txt; paired tests under
    #   scripts/check-rule-5-glossary-discipline.test.mjs.
    # Ratchet (rule #10 § 5): the prior section-header grep is removed
    # in this job — never run two enforcement mechanisms competing.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/check-rule-5-glossary-discipline.mjs

  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome ci .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
        env:
          CI: "true"

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  rule-2-dep-coverage:
    # rule #2 enforcement: every external dep is reached only through
    # `novel/adapters/`. The script extracts vendor names from
    # ARCHITECTURE.md's dependency table and fails the build if any
    # non-adapter file under `novel/` directly imports one.
    # Anchor: rule #10 (every constitutional rule has a deterministic CI
    # lint); Martin, *Clean Architecture*, 2017 (dependency rule).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/check-rule-2-dep-coverage.mjs

  rule-7-chaos-coverage:
    # Rule #7 (chaos engineering) deterministic enforcement, per rule #10.
    # Verifies that every `novel/**/README.md`'s failure-mode table row has a
    # chaos-test reference that resolves to either a real `*.test.ts` path or
    # the literal `(deferred — covered when <task-id> ships)` form whose
    # task-id exists in TASKS.md or the git log.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the linter can resolve `closes <task-id>` task
          # references from past commits.
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: lint chaos-test coverage
        run: node scripts/check-rule-7-chaos-coverage.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-rule-7-chaos-coverage.test.mjs

  maciek-smoke:
    # rule #9 preparation-PR: pins Maciek's `claude-monitor` Python tool at a
    # known-good version so the future `budget-guard-maciek-impl` adapter test
    # has a reproducible upstream. Smoke = install + version invocation.
    # Anchor: rule #9 (preparation-PR pattern); rule #7 (pin versions, no `@latest`).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install claude-monitor (pinned)
        run: pipx install claude-monitor==3.1.0
      - name: verify version
        run: |
          version=$(claude-monitor --version 2>&1)
          echo "$version"
          # Fail loudly if the binary isn't on PATH or returns nothing.
          test -n "$version"
          # Fail loudly if the pinned version drifted (e.g., pipx resolved a
          # newer minor due to a yanked release). 3.1.0 is the pin until the
          # quarterly review explicitly bumps it.
          echo "$version" | grep -q "3.1.0"

  rule-1-novel-justification:
    # rule #10: deterministic enforcement of rule #1 (don't reinvent the wheel).
    # Fails when a PR adds `novel/<pkg>/` (excluding `novel/adapters/`) without
    # either a `research.md` entry under a "When the existing tools didn't fit"
    # heading mentioning <pkg>, or an opt-out comment in the package README.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the merge-base with main reachable for `git diff main...HEAD`.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: fetch base ref
        run: git fetch origin main:refs/remotes/origin/main
      - name: rule-1 lint
        run: node scripts/check-rule-1-novel-justification.mjs --diff-base=origin/main

  rule-3-doc-first:
    # rule #3 (doc-first): every PR adding/modifying `novel/**/*.ts`
    # (non-test) must touch a `user-stories/*.md` OR the affected
    # package's README.md, OR include a deferral / refactor-exemption
    # marker in the PR description.
    # Anchor: rule #10 (deterministic enforcement); Knuth 1984
    # (literate programming); Beck 1999 (CI as constraint enforcer).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: fetch base ref
        run: git fetch origin main:refs/remotes/origin/main
      - name: fetch PR body
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json body --jq .body > /tmp/rule-3-pr-body.md
      - name: rule-3 lint
        env:
          RULE_3_DIFF_BASE: origin/main
          RULE_3_PR_BODY_PATH: /tmp/rule-3-pr-body.md
        run: node scripts/check-rule-3-doc-first.mjs

  pr-self-grade:
    # AGENTS.md § "Orchestrator discipline" rule (2): every PR's description
    # carries a `Hypothesis self-grade` block (Predicted / Observed / Match /
    # Lesson). Closes the loop on rule #9 — pre-registration without
    # observation-vs-prediction is half a rule. Runs on pull_request events
    # only; on push-to-main this job is skipped (no PR to inspect).
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: fetch PR body
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json body --jq .body > /tmp/pr-body.md
          test -s /tmp/pr-body.md
      - name: lint self-grade block
        run: node scripts/check-pr-self-grade.mjs /tmp/pr-body.md
        # Unit tests for this script run in the broader `test` job (root
        # vitest config includes `scripts/**/*.test.mjs`). Keep this gate
        # narrow: read the PR body, lint the block, exit.

  ci:
    needs:
      - biome
      - glossary-discipline
      - hygiene
      - maciek-smoke
      - markdownlint
      - pr-self-grade
      - rule-1-novel-justification
      - rule-2-dep-coverage
      - rule-3-doc-first
      - rule-7-chaos-coverage
      - tasks-lint
      - test
      - typecheck
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: gate
        run: |
          # `pr-self-grade` runs on pull_request events only; on push it is
          # `skipped` — accept that, fail on `failure`/`cancelled`. All
          # other jobs must be `success`.
          fail=0
          for r in "${{ needs.biome.result }}" \
                   "${{ needs.glossary-discipline.result }}" \
                   "${{ needs.hygiene.result }}" \
                   "${{ needs.maciek-smoke.result }}" \
                   "${{ needs.markdownlint.result }}" \
                   "${{ needs.rule-1-novel-justification.result }}" \
                   "${{ needs.rule-2-dep-coverage.result }}" \
                   "${{ needs.rule-3-doc-first.result }}" \
                   "${{ needs.rule-7-chaos-coverage.result }}" \
                   "${{ needs.tasks-lint.result }}" \
                   "${{ needs.test.result }}" \
                   "${{ needs.typecheck.result }}"; do
            [ "$r" = "success" ] || fail=1
          done
          # pr-self-grade may be `skipped` (push event) OR `success` (PR);
          # only `failure` / `cancelled` should fail the gate.
          case "${{ needs.pr-self-grade.result }}" in
            success|skipped) ;;
            *) fail=1 ;;
          esac
          if [ "$fail" = "1" ]; then
            echo "one or more required checks failed" >&2
            exit 1
          fi
          echo "all required checks green"
