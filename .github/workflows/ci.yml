name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Pinned to 0.15.0 (matches the package.json devDependency). Rule #7
      # (chaos engineering — trust no unverified dependency); ARCHITECTURE.md
      # § "Versioning & dependency evolution".
      - run: npx -y markdownlint-cli2@0.15.0 "**/*.md" "#**/node_modules" "#.minsky" "#.obsidian" "#.claude"

  tasks-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Pinned to the 0.7.x minor (matches the version validated locally as of
      # 2026-05-03). Rule #7 (chaos engineering — trust no unverified
      # dependency); ARCHITECTURE.md § "Versioning & dependency evolution".
      - run: npx -y @tasks-md/lint@^0.7.0 TASKS.md

  glossary-discipline:
    # vision.md § rule #5: every Minsky-coined term in vision.md resolves
    # to a Glossary entry. Implements rule #10 (deterministic enforcement)
    # for rule #5 — replaces the earlier section-header-only check.
    # Source: scripts/check-rule-5-glossary-discipline.mjs +
    #   scripts/glossary-allowlist.txt; paired tests under
    #   scripts/check-rule-5-glossary-discipline.test.mjs.
    # Ratchet (rule #10 § 5): the prior section-header grep is removed
    # in this job — never run two enforcement mechanisms competing.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/check-rule-5-glossary-discipline.mjs

  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome ci .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
        env:
          CI: "true"

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  rule-2-dep-coverage:
    # rule #2 enforcement: every external dep is reached only through
    # `novel/adapters/`. The script extracts vendor names from
    # ARCHITECTURE.md's dependency table and fails the build if any
    # non-adapter file under `novel/` directly imports one.
    # Anchor: rule #10 (every constitutional rule has a deterministic CI
    # lint); Martin, *Clean Architecture*, 2017 (dependency rule).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/check-rule-2-dep-coverage.mjs

  rule-7-chaos-coverage:
    # Rule #7 (chaos engineering) deterministic enforcement, per rule #10.
    # Verifies that every `novel/**/README.md`'s failure-mode table row has a
    # chaos-test reference that resolves to either a real `*.test.ts` path or
    # the literal `(deferred — covered when <task-id> ships)` form whose
    # task-id exists in TASKS.md or the git log.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the linter can resolve `closes <task-id>` task
          # references from past commits.
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: lint chaos-test coverage
        run: node scripts/check-rule-7-chaos-coverage.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-rule-7-chaos-coverage.test.mjs

  maciek-smoke:
    # rule #9 preparation-PR: pins Maciek's `claude-monitor` Python tool at a
    # known-good version so the future `budget-guard-maciek-impl` adapter test
    # has a reproducible upstream. Smoke = install + version invocation.
    # Anchor: rule #9 (preparation-PR pattern); rule #7 (pin versions, no floating tags).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install claude-monitor (pinned)
        run: pipx install claude-monitor==3.1.0
      - name: verify version
        run: |
          version=$(claude-monitor --version 2>&1)
          echo "$version"
          # Fail loudly if the binary isn't on PATH or returns nothing.
          test -n "$version"
          # Fail loudly if the pinned version drifted (e.g., pipx resolved a
          # newer minor due to a yanked release). 3.1.0 is the pin until the
          # quarterly review explicitly bumps it.
          echo "$version" | grep -q "3.1.0"

  rule-1-novel-justification:
    # rule #10: deterministic enforcement of rule #1 (don't reinvent the wheel).
    # Fails when a PR adds `novel/<pkg>/` (excluding `novel/adapters/`) without
    # either a `research.md` entry under a "When the existing tools didn't fit"
    # heading mentioning <pkg>, or an opt-out comment in the package README.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the merge-base with main reachable for `git diff main...HEAD`.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: fetch base ref
        run: git fetch origin main:refs/remotes/origin/main
      - name: rule-1 lint
        run: node scripts/check-rule-1-novel-justification.mjs --diff-base=origin/main

  rule-4-otel-coverage:
    # rule #4 (everything measurable, everything visible) deterministic
    # enforcement, per rule #10. Diff-based: walks `novel/**/*.ts` files
    # newly added or modified relative to `origin/main` on the PR branch
    # and requires every exported function / method / arrow / default
    # export to carry a leading JSDoc `@otel <span-name>` or
    # `@otel-exempt <reason>` (≥3 chars). Existing un-annotated code is
    # grandfathered until each file is touched again — same precedent as
    # rule-1 and rule-3.
    # Anchor: rule #10 (deterministic enforcement); OpenTelemetry
    # specification (CNCF 2020+); Gregg, *Systems Performance*, 2014
    # (USE method — instrumentation as a structural property).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: fetch base ref
        run: git fetch origin main:refs/remotes/origin/main
      - name: rule-4 lint
        run: node scripts/check-rule-4-otel-coverage.mjs --diff-base=origin/main
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-rule-4-otel-coverage.test.mjs

  rule-3-doc-first:
    # rule #3 (doc-first): every PR adding/modifying `novel/**/*.ts`
    # (non-test) must touch a `user-stories/*.md` OR the affected
    # package's README.md, OR include a deferral / refactor-exemption
    # marker in the PR description.
    # Anchor: rule #10 (deterministic enforcement); Knuth 1984
    # (literate programming); Beck 1999 (CI as constraint enforcer).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: fetch base ref
        run: git fetch origin main:refs/remotes/origin/main
      - name: fetch PR body
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json body --jq .body > /tmp/rule-3-pr-body.md
      - name: rule-3 lint
        env:
          RULE_3_DIFF_BASE: origin/main
          RULE_3_PR_BODY_PATH: /tmp/rule-3-pr-body.md
        run: node scripts/check-rule-3-doc-first.mjs

  rule-12-scope-discipline:
    # rule #12 (vision.md § "Scope discipline" — iron rule): every
    # newly-added (status A) public artefact under `novel/**`,
    # `scripts/*.{mjs,sh,ts,js}`, `.github/workflows/*.yml`, or
    # `distribution/**` must resolve to either (a) a TASKS.md task
    # block whose body mentions the path, (b) an
    # `experiments/<id>.yaml` whose body mentions the path, OR (c) a
    # `<!-- scope: human-approved <reason> -->` comment in the new
    # file's first 20 lines OR the PR description. Modifications +
    # renames are grandfathered (rule-1 / rule-3 / rule-4 precedent).
    # Anchor: rule #10 (deterministic enforcement); rule #12 itself;
    # Ries 2011 (validated learning); Munafò 2017 (pre-registration).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: fetch base ref
        run: git fetch origin main:refs/remotes/origin/main
      - name: fetch PR body
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json body --jq .body > /tmp/rule-12-pr-body.md
      - name: rule-12 lint
        env:
          RULE_12_DIFF_BASE: origin/main
          RULE_12_PR_BODY_PATH: /tmp/rule-12-pr-body.md
        run: node scripts/check-rule-12-scope-discipline.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-rule-12-scope-discipline.test.mjs

  rule-6-let-it-crash:
    # rule #10: deterministic enforcement of rule #6 (let-it-crash). Walks
    # every novel/**/*.ts file added/modified in the PR; flags try/catch
    # blocks nested deeper than 1 level (`nested-try`) or catch clauses
    # whose body neither re-throws nor calls `supervise(...)`
    # (`swallowing-catch`). Per-catch opt-out: the line immediately above
    # the `catch` keyword is `// rule-6: handled-locally — <reason>`.
    # Anchor: rule #10; Armstrong, *Programming Erlang*, 2007 (let it
    # crash); Lampson 1983 (use exceptions only for exceptional conditions).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: fetch base ref
        run: git fetch origin main:refs/remotes/origin/main
      - name: rule-6 lint
        env:
          RULE_6_DIFF_BASE: origin/main
        run: node scripts/check-rule-6-let-it-crash.mjs

  pattern-index:
    # rule #10: deterministic enforcement of rule #8 (pattern conformance —
    # every artefact maps to a published pattern). Diff-based: every newly-
    # added top-level artefact (`novel/**`, root `*.md`, `setup.sh`,
    # `distribution/**`, `.github/workflows/**`) on the PR must be mentioned
    # by `vision.md` § "Pattern conformance index", unless the file carries
    # `<!-- pattern: not-applicable — <reason> -->` in its first ~20 lines.
    # Existing files are grandfathered until the file is renamed (same
    # precedent as rule-1 / rule-3 / rule-4).
    # Anchor: rule #10; rule #8 (pattern conformance); Beck 1999 (CI as
    # constraint enforcer); Alexander et al. 1977 (pattern catalogue).
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: fetch base ref
        run: git fetch origin main:refs/remotes/origin/main
      - name: pattern-index lint
        run: node scripts/check-pattern-index.mjs --diff-base=origin/main
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-pattern-index.test.mjs

  pr-self-grade:
    # AGENTS.md § "Orchestrator discipline" rule (2): every PR's description
    # carries a `Hypothesis self-grade` block (Predicted / Observed / Match /
    # Lesson). Closes the loop on rule #9 — pre-registration without
    # observation-vs-prediction is half a rule. Runs on pull_request events
    # only; on push-to-main this job is skipped (no PR to inspect).
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: fetch PR body
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json body --jq .body > /tmp/pr-body.md
          test -s /tmp/pr-body.md
      - name: lint self-grade block
        run: node scripts/check-pr-self-grade.mjs /tmp/pr-body.md
        # Unit tests for this script run in the broader `test` job (root
        # vitest config includes `scripts/**/*.test.mjs`). Keep this gate
        # narrow: read the PR body, lint the block, exit.

  otel-no-pii:
    # vision.md § 13.2 / TASKS.md `otel-no-pii-in-spans-lint` § Measurement:
    # full-scan of `novel/**/*.ts` rejects PR-introduced span attributes
    # whose names look like credentials (`apiKey`, `password`, `bearerToken`,
    # …) or whose string-literal values match a known credential prefix
    # (`sk-…`, `ghp_…`, `xoxb-…`). Slices 1–3 (PRs #252, #255, #256) shipped
    # the pure classifier, the AST walker, and the
    # `// @otel-pii-allowed: <reason>` annotation seam in
    # `scripts/check-otel-no-pii.mjs`. This slice (4) wires the CLI into the
    # gate. Push event runs the lint too — security gates are NOT PR-only,
    # because a leak landed via direct push must still surface.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: otel-no-pii lint
        run: node scripts/check-otel-no-pii.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-otel-no-pii.test.mjs

  pr-security-review:
    # vision.md § 13 / TASKS.md `security-privacy-priority-substrate` §
    # Measurement: every PR body carries either a `## Security & privacy`
    # section OR a typed `<!-- security: not-applicable — <reason> -->`
    # opt-out. Slice 2 of `pr-security-review` (slice 1 shipped the pure
    # classifier in `scripts/check-pr-security-review.mjs` as PR #253) wires
    # the classifier into the gate. PR-event only, like `pr-self-grade`.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: fetch PR body
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json body --jq .body > /tmp/pr-body.md
          test -s /tmp/pr-body.md
      - name: lint security-review marker
        run: node scripts/check-pr-security-review.mjs /tmp/pr-body.md

  cto-audit-pr-conventions:
    # TASKS.md `post-task-cto-audit` sub-step (e/f): audit PRs land on
    # `audit/<UTC-date>-<task-id>` branches AND carry the
    # `minsky:cto-audit` label. The pre-registered measurement query
    # (`gh pr list --label minsky:cto-audit ...`) keys on the label;
    # without this gate the metric silently undercounts when an audit
    # PR is missing the label or uses the wrong branch (Munafò et al.
    # 2017's pre-registration only works when the post-hoc query can
    # actually see the artefacts it was committed to count).
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: fetch PR shape
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json headRefName,labels > /tmp/pr-shape.json
          test -s /tmp/pr-shape.json
      - name: lint audit-branch ↔ label biconditional
        run: node scripts/check-cto-audit-pr-conventions.mjs /tmp/pr-shape.json

  linux-supervisor-integration:
    # supervisor-integration-tests (TASKS.md): empirically exercise rows
    # 1–4 of `distribution/README.md` § "Failure modes & chaos verification"
    # against systemd's user-mode supervisor. The driver SIGKILLs the
    # tick-loop and asserts respawn within 10 s; rows 2 / 3 / 4 are also
    # exercised. Anchors: Forsgren-Humble-Kim 2018 (Accelerate — test
    # reliability as DORA prerequisite); Armstrong 2007 (OTP supervision).
    #
    # Caveat (per TASKS.md "Risk" line): GitHub Actions Ubuntu runners run
    # as a non-login user, and `systemctl --user` requires either a
    # lingering session OR a wrapping `dbus-run-session`. The driver tries
    # both fallbacks; if neither produces a usable user-bus, it exits 77
    # (skipped). The job below installs `dbus-user-session` to maximise
    # the chance the driver finds one.
    #
    # Escape hatch: if the user-systemd plumbing in CI sandboxes proves
    # unfixable (>2 unrecoverable issues per the task brief), follow up
    # with `supervisor-integration-self-hosted-runner` and gate this job
    # behind `if: false` here. v0 ships with the gate ON to surface the
    # signal — drift to OFF is a deliberate Pivot, not a default.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install dbus-user-session + gettext (for envsubst)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dbus-user-session gettext-base
      - name: enable user lingering (best-effort)
        run: |
          # Linger lets systemd --user run without an active login session.
          # On GH-hosted runners this usually succeeds via passwordless sudo.
          sudo loginctl enable-linger "$USER" || true
      - name: run supervisor integration test (linux)
        # The driver itself decides whether to use dbus-run-session as the
        # final fallback; see distribution/test-supervisor.sh.
        run: bash distribution/test-supervisor.sh linux

  macos-supervisor-integration:
    # supervisor-integration-tests (TASKS.md): launchd half of the matrix.
    # macOS GH-hosted runners boot a per-user launchd LaunchAgent domain by
    # default (the runner's session has a usable `gui/$(id -u)` bootstrap),
    # so unlike Linux this side does not need a workaround.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: run supervisor integration test (macos)
        run: bash distribution/test-supervisor.sh macos

  measurement-inspects-output:
    # rule #10 ratchet applied to spec-monitor advisory rule A4 ("measurement
    # runs but doesn't actually inspect output"): the deterministic gate
    # promotes the allowlist (`test`, `[`, `[[`, `jq -e`, `grep -q`/`-c`,
    # `assert`, `vitest`, `pnpm test`/`typecheck`/`lint`, `@tasks-md/lint`,
    # `markdownlint-cli2`, `gh run list ... --jq`, `node scripts/check-*.mjs`)
    # and blacklist (`echo`, bare `true`, bare `curl`, bare `node`) from
    # SKILL.md into a CI lint over EXPERIMENT.yaml's `measurement` field.
    # Three-way verdict — pass / fail / advisory-warn. The matching
    # advisory rule (A4) is removed from `novel/spec-monitor/SKILL.md`
    # in the same PR.
    # Anchor: rule #10 (vision.md § 10 — deterministic enforcement);
    # Havelund & Goldberg, "Verify Your Runs", *VSTTE* 2008 (runtime
    # verification — the inspect-output check is the deterministic-monitor
    # layer); Beck 1999 (CI as the constraint enforcer).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: build @minsky/experiment-record
        run: pnpm --filter @minsky/experiment-record build
      - name: measurement-inspects-output lint
        # No path arg: walks experiments/*.yaml per
        # experiments-directory-migration. Backward-compat: passing an
        # explicit path (file) still works for explicit single-file lint.
        run: node scripts/check-measurement-inspects-output.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-measurement-inspects-output.test.mjs

  no-singleton-experiment:
    # rule #10 ratchet applied to experiments-directory-migration: the
    # singleton EXPERIMENT.yaml at the repo root was retired in favour
    # of plural `experiments/<id>.yaml` so concurrent experiments (cross-
    # repo runs, multi-PR work) don't collide. This job is the structural
    # one-way guarantee: it fails if the singleton reappears at the root.
    # Anchor: rule #10 (deterministic enforcement); rule #1 (don't reinvent
    # — the data layer at experiment-store/<id>.jsonl is plural; the
    # migration matches the pre-registration layer to it); Munafò 2017
    # (one record per pre-registration).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: no-singleton-experiment lint
        run: node scripts/check-no-singleton-experiment.mjs
      - run: pnpm install --frozen-lockfile
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-no-singleton-experiment.test.mjs

  skill-rule-cap:
    # rule #10 ratchet applied to the spec-monitor advisory Skill itself:
    # `novel/spec-monitor/SKILL.md` declares a hard cap of ≤5 advisory
    # rules (`### A<N>.` headings). Without a deterministic gate, a future
    # PR could silently grow the Skill back into a primary enforcement
    # mechanism. This job counts the headings and fails if the count
    # exceeds 5. Runs on pull_request only — push-to-main is skipped
    # (matching pr-self-grade / pattern-index precedent).
    # Anchor: rule #10 (deterministic enforcement); rule #6 (failure-mode
    # discipline — close "did anyone notice?" mechanically); Beck 1999
    # (CI as the constraint enforcer).
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: skill-rule-cap lint
        run: node scripts/check-skill-rule-cap.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-skill-rule-cap.test.mjs

  pivot-success-margin:
    # rule #10 ratchet applied to spec-monitor advisory rule A2: a pivot
    # threshold that equals (or sits within <1 % of) the success threshold
    # is theatre per Ries 2011 (pivot-or-persevere). The lint reads
    # `success` and `pivot` from EXPERIMENT.yaml via the
    # `@minsky/experiment-record` parser, regex-extracts the leading signed
    # numeric token from each, and fails on zero-margin / sub-1 % margin /
    # binary-equal prose. Promotion decision recorded in
    # `spec-advisories/2026-05-03-quarterly-audit.md`. Runs on every event
    # (push and pull_request) — the EXPERIMENT.yaml is checked-in state,
    # not a PR-relative diff, so the gate is universally applicable.
    # Anchor: rule #10 (deterministic enforcement); Ries, *The Lean
    # Startup*, 2011 (build-measure-learn / pivot-or-persevere); Beck 1999
    # (CI as the constraint enforcer).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: build @minsky/experiment-record
        # The lint imports the parser from @minsky/experiment-record's
        # built `dist/` (workspace-resolved). vitest reads the source
        # directly via vitest.config.ts, but the CLI import does not.
        run: pnpm --filter @minsky/experiment-record build
      - name: pivot-success-margin lint
        # No path arg: walks experiments/*.yaml per
        # experiments-directory-migration.
        run: node scripts/check-pivot-success-margin.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-pivot-success-margin.test.mjs

