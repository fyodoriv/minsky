  anchor-primary-source:
    # rule #10 ratchet applied to spec-monitor advisory rule A3 ("anchor
    # citation is not a primary source"): the deterministic gate promotes
    # the deny-list (`medium.com`, `*.substack.com`, `wikipedia.org`,
    # `twitter.com`, `x.com`, `reddit.com`, `stackoverflow.com`,
    # `chatgpt.com`, `claude.ai`, "ChatGPT said", "tweet by", "blog post")
    # and allowlist (italicised title `*…*`, `Ch. <n>`, `pp. <n>`, ISBN,
    # DOI, `<VENUE> <YEAR>`, internal cross-ref `vision.md §` / `rule
    # #<n>` / `spec-advisories/<date>.md`) from SKILL.md into a CI lint
    # over EXPERIMENT.yaml's `anchor` field. Three-way verdict — pass /
    # fail / advisory-warn. The matching advisory rule (A3) is removed
    # from `novel/spec-monitor/SKILL.md` in the same PR.
    # Anchor: rule #10 (vision.md § 10 — deterministic enforcement);
    # rule #5 / rule #8 (named, decades-tested pattern; constitution must
    # outlive any single source); Beck 1999 (CI as the constraint enforcer).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: build @minsky/experiment-record
        run: pnpm --filter @minsky/experiment-record build
      - name: anchor-primary-source lint
        # No path arg: walks experiments/*.yaml per
        # experiments-directory-migration.
        run: node scripts/check-anchor-primary-source.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-anchor-primary-source.test.mjs

  rule-11-flake-detection:
    # rule #11's auto-detect ratchet (vision.md § 11). The lint reads
    # the trailing 100 runs of `ci.yml` via `gh run list`, looks for
    # same-SHA failure→success pairs (Memon 2017 § 3, DETECTOR), and
    # surfaces any job whose pair-rate clears 10% over ≥5 same-SHA
    # pairs. When one surfaces, it auto-emits a TASKS.md task-block
    # draft + a workflow-patch instruction file to `tmp/rule-11/`,
    # uploaded as a workflow artifact for the operator to review.
    #
    # `continue-on-error: true` keeps the rule-#11 detector itself
    # informational — paradox-aware: an enforcement-coupling chain
    # where the detector fails the build on every detection would
    # itself become a flaky-feeling gate. Per the parent task's Pivot
    # ("the lint is detection + scaffolding, not decision-making"),
    # the human-in-the-loop reviews the artifact and merges the patch.
    #
    # Runs on pull_request only — `gh run list` requires auth and the
    # 30-day window per workflow is heavy; on push to main it would
    # double-burn API quota.
    #
    # Anchor: rule #11 (vision.md § 11); Memon, A., et al., "Taming
    # Google-Scale Continuous Testing", *ICSE-SEIP* 2017 (the per-job
    # same-SHA pair primitive); Forsgren, Humble, Kim, *Accelerate*,
    # 2018 Ch. 3 (DORA test-reliability — flaky gates teach the team
    # to ignore failure); Beck, *Extreme Programming Explained*, 1999
    # Ch. 17 (CI as the constraint enforcer).
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-rule-11-no-flaky-gates.test.mjs
      - name: rule-11 flake-detection (auto-emit on flake)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tmp/rule-11
          # `--workflows ci` reads the trailing 100 ci.yml runs in this
          # repo; `--emit tmp/rule-11/` writes per-flake artefacts.
          # Exit code 1 (flakes surfaced) is allowed by
          # continue-on-error: true above; the artifact upload step
          # below carries the signal.
          node scripts/check-rule-11-no-flaky-gates.mjs --workflows ci --emit tmp/rule-11/ || true
      - name: upload rule-11 patches
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rule-11-flake-patches
          path: tmp/rule-11/*-task-block.md tmp/rule-11/*-workflow.patch
          if-no-files-found: ignore

  metric-freshness:
    # Substrate slice 2/N of `canonical-metric-list-per-repo` — gates the
    # canonical `METRICS.md` artefact (vision.md row 82) against drift.
    # Every section is either a fresh observation within its
    # per-metric `freshnessBudgetMs` OR an explicit `(stub) — …`
    # follow-up pointer (visible-not-silent, Helland 2007). The
    # `--expected` flag enables drift detection against the 10
    # `SUCCESS_METRICS` ids; the lint fails when an id is missing,
    # rendered twice, or rendered without `_Updated:` past its budget.
    # Anchor: rule #10 (vision.md § 10 — deterministic enforcement);
    # Munafò et al. 2017 (pre-registered staleness threshold);
    # Ries 2011 (vanity-metric anti-pattern; `_monotonic: ok_` opt-in).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: metric-freshness lint
        run: |
          node scripts/check-metric-freshness.mjs \
            --expected loop-uptime,tokens-per-story,spec-alignment,self-improvement-velocity,mttr,wrist-dwell,extraction-count,dep-interface-coverage,token-budget-honoring,task-throughput
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-metric-freshness.test.mjs

  ci:
    needs:
      - anchor-primary-source
      - biome
      - cadence-pivot-threshold
      - glossary-discipline
      - hygiene
      - linux-supervisor-integration
      - macos-supervisor-integration
      - maciek-smoke
      - mape-k-budget-cap
      - mape-k-constraints-md-size
      - mape-k-tick-iteration-backstop
      - mape-k-watchdog-cadence
      - markdownlint
      - measurement-inspects-output
      - metric-freshness
      - no-singleton-experiment
      - otel-no-pii
      - pattern-index
      - pivot-success-margin
      - pr-self-grade
      - pr-security-review
      - skill-rule-cap
      - rule-1-novel-justification
      - rule-2-dep-coverage
      - rule-3-doc-first
      - rule-4-otel-coverage
      - rule-6-let-it-crash
      - rule-7-chaos-coverage
      - rule-12-scope-discipline
      - tasks-lint
      - test
      - tick-loop-backoff-schedule
      - typecheck
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: gate
        run: |
          # `pr-self-grade` and `pattern-index` run on pull_request events
          # only; on push they are `skipped` — accept that, fail on
          # `failure`/`cancelled`. All other jobs must be `success`.
          fail=0
          for r in "${{ needs.anchor-primary-source.result }}" \
                   "${{ needs.biome.result }}" \
                   "${{ needs.cadence-pivot-threshold.result }}" \
                   "${{ needs.glossary-discipline.result }}" \
                   "${{ needs.hygiene.result }}" \
                   "${{ needs.maciek-smoke.result }}" \
                   "${{ needs.mape-k-budget-cap.result }}" \
                   "${{ needs.mape-k-constraints-md-size.result }}" \
                   "${{ needs.mape-k-tick-iteration-backstop.result }}" \
                   "${{ needs.mape-k-watchdog-cadence.result }}" \
                   "${{ needs.markdownlint.result }}" \
                   "${{ needs.measurement-inspects-output.result }}" \
                   "${{ needs.metric-freshness.result }}" \
                   "${{ needs.no-singleton-experiment.result }}" \
                   "${{ needs.otel-no-pii.result }}" \
                   "${{ needs.pivot-success-margin.result }}" \
                   "${{ needs.rule-1-novel-justification.result }}" \
                   "${{ needs.rule-2-dep-coverage.result }}" \
                   "${{ needs.rule-3-doc-first.result }}" \
                   "${{ needs.rule-4-otel-coverage.result }}" \
                   "${{ needs.rule-6-let-it-crash.result }}" \
                   "${{ needs.rule-7-chaos-coverage.result }}" \
                   "${{ needs.rule-12-scope-discipline.result }}" \
                   "${{ needs.tasks-lint.result }}" \
                   "${{ needs.test.result }}" \
                   "${{ needs.tick-loop-backoff-schedule.result }}" \
                   "${{ needs.typecheck.result }}"; do
            [ "$r" = "success" ] || fail=1
          done
          # Supervisor-integration jobs may legitimately exit 77 (skipped)
          # if the runner's user-bus / launchd plumbing isn't usable. We
          # accept `success` and `skipped` (the GH Actions exit-77 maps to
          # skipped); only `failure` / `cancelled` should fail the gate.
          for r in "${{ needs.linux-supervisor-integration.result }}" \
                   "${{ needs.macos-supervisor-integration.result }}"; do
            case "$r" in
              success|skipped) ;;
              *) fail=1 ;;
            esac
          done
          # pr-self-grade, pr-security-review, pattern-index, and
          # skill-rule-cap may be `skipped` (push event) OR `success` (PR);
          # only `failure` / `cancelled` should fail.
          for r in "${{ needs.pr-self-grade.result }}" \
                   "${{ needs.pr-security-review.result }}" \
                   "${{ needs.pattern-index.result }}" \
                   "${{ needs.skill-rule-cap.result }}"; do
            case "$r" in
              success|skipped) ;;
              *) fail=1 ;;
            esac
          done
          if [ "$fail" = "1" ]; then
            echo "one or more required checks failed" >&2
            exit 1
          fi
          echo "all required checks green"
