    # Anchor: rule #10 (vision.md § 10 — deterministic enforcement);
    # ARCHITECTURE.md L215; Armstrong, *Programming Erlang*, Pragmatic
    # Bookshelf 2007 (let-it-crash + supervised restart with backoff);
    # Beyer et al., *Site Reliability Engineering*, O'Reilly 2016, Ch. 3.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
