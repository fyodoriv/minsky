  skill-rule-cap:
    # rule #10 ratchet applied to the spec-monitor advisory Skill itself:
    # `novel/spec-monitor/SKILL.md` declares a hard cap of ≤5 advisory
    # rules (`### A<N>.` headings). Without a deterministic gate, a future
