name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      # Pinned to 0.15.0 (matches the package.json devDependency). Rule #7
      # (chaos engineering — trust no unverified dependency); ARCHITECTURE.md
      # § "Versioning & dependency evolution".
      - run: npx -y markdownlint-cli2@0.15.0 "**/*.md" "#**/node_modules" "#.worktrees" "#.minsky" "#.obsidian" "#.claude"

  tasks-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      # Pinned to the 0.7.x minor (matches the version validated locally as of
      # 2026-05-03). Rule #7 (chaos engineering — trust no unverified
      # dependency); ARCHITECTURE.md § "Versioning & dependency evolution".
      - run: npx -y @tasks-md/lint@^0.7.0 TASKS.md

  glossary-discipline:
    # vision.md § rule #5: every Minsky-coined term in vision.md resolves
    # to a Glossary entry. Implements rule #10 (deterministic enforcement)
    # for rule #5 — replaces the earlier section-header-only check.
    # Source: scripts/check-rule-5-glossary-discipline.mjs +
    #   scripts/glossary-allowlist.txt; paired tests under
    #   scripts/check-rule-5-glossary-discipline.test.mjs.
    # Ratchet (rule #10 § 5): the prior section-header grep is removed
    # in this job — never run two enforcement mechanisms competing.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - run: node scripts/check-rule-5-glossary-discipline.mjs

  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome ci .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
        env:
          CI: "true"

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Integration + M1 TDD tests (120s timeout per test)
        run: pnpm test:integration
        env:
          CI: "true"
          MINSKY_NON_INTERACTIVE: "1"
      - name: M1 metrics dashboard
        run: node scripts/m1-metrics-dashboard.mjs --json > /tmp/m1-metrics.json || true
      - name: Upload M1 metrics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: m1-metrics
          path: /tmp/m1-metrics.json

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  rule-2-dep-coverage:
    # rule #2 enforcement: every external dep is reached only through
    # `novel/adapters/`. The script extracts vendor names from
    # ARCHITECTURE.md's dependency table and fails the build if any
    # non-adapter file under `novel/` directly imports one.
    # Anchor: rule #10 (every constitutional rule has a deterministic CI
    # lint); Martin, *Clean Architecture*, 2017 (dependency rule).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - run: node scripts/check-rule-2-dep-coverage.mjs

  rule-7-chaos-coverage:
    # Rule #7 (chaos engineering) deterministic enforcement, per rule #10.
    # Verifies that every `novel/**/README.md`'s failure-mode table row has a
    # chaos-test reference that resolves to either a real `*.test.ts` path or
    # the literal `(deferred — covered when <task-id> ships)` form whose
    # task-id exists in TASKS.md or the git log.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the linter can resolve `closes <task-id>` task
          # references from past commits.
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: lint chaos-test coverage
        run: node scripts/check-rule-7-chaos-coverage.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-rule-7-chaos-coverage.test.mjs

  maciek-smoke:
    # rule #9 preparation-PR: pins Maciek's `claude-monitor` Python tool at a
    # known-good version so the future `budget-guard-maciek-impl` adapter test
    # has a reproducible upstream. Smoke = install + version invocation.
    # Anchor: rule #9 (preparation-PR pattern); rule #7 (pin versions, no floating tags).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install claude-monitor (pinned)
        run: pipx install claude-monitor==3.1.0
      - name: verify version
        run: |
          version=$(claude-monitor --version 2>&1)
          echo "$version"
          # Fail loudly if the binary isn't on PATH or returns nothing.
          test -n "$version"
          # Fail loudly if the pinned version drifted (e.g., pipx resolved a
          # newer minor due to a yanked release). 3.1.0 is the pin until the
          # quarterly review explicitly bumps it.
          echo "$version" | grep -q "3.1.0"

  rule-1-novel-justification:
    # rule #10: deterministic enforcement of rule #1 (don't reinvent the wheel).
    # Fails when a PR adds `novel/<pkg>/` (excluding `novel/adapters/`) without
    # either a `research.md` entry under a "When the existing tools didn't fit"
    # heading mentioning <pkg>, or an opt-out comment in the package README.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the merge-base with main reachable for `git diff main...HEAD`.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - name: fetch base ref
        run: git fetch origin main:refs/remotes/origin/main
      - name: rule-1 lint
        run: node scripts/check-rule-1-novel-justification.mjs --diff-base=origin/main

  rule-4-otel-coverage:
    # rule #4 (everything measurable, everything visible) deterministic
    # enforcement, per rule #10. Diff-based: walks `novel/**/*.ts` files
    # newly added or modified relative to `origin/main` on the PR branch
    # and requires every exported function / method / arrow / default
    # export to carry a leading JSDoc `@otel <span-name>` or
    # `@otel-exempt <reason>` (≥3 chars). Existing un-annotated code is
    # grandfathered until each file is touched again — same precedent as
    # rule-1 and rule-3.
    # Anchor: rule #10 (deterministic enforcement); OpenTelemetry
    # specification (CNCF 2020+); Gregg, *Systems Performance*, 2014
    # (USE method — instrumentation as a structural property).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: fetch base ref
        run: git fetch origin main:refs/remotes/origin/main
      - name: rule-4 lint
        run: node scripts/check-rule-4-otel-coverage.mjs --diff-base=origin/main
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-rule-4-otel-coverage.test.mjs

  rule-3-doc-first:
    # rule #3 (doc-first): every PR adding/modifying `novel/**/*.ts`
    # (non-test) must touch a `user-stories/*.md` OR the affected
    # package's README.md, OR include a deferral / refactor-exemption
    # marker in the PR description.
    # Anchor: rule #10 (deterministic enforcement); Knuth 1984
    # (literate programming); Beck 1999 (CI as constraint enforcer).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - name: fetch base ref
        run: git fetch origin main:refs/remotes/origin/main
      - name: fetch PR body
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json body --jq .body > /tmp/rule-3-pr-body.md
      - name: rule-3 lint
        env:
          RULE_3_DIFF_BASE: origin/main
          RULE_3_PR_BODY_PATH: /tmp/rule-3-pr-body.md
        run: node scripts/check-rule-3-doc-first.mjs

  rule-12-scope-discipline:
    # rule #12 (vision.md § "Scope discipline" — iron rule): every
    # newly-added (status A) public artefact under `novel/**`,
    # `scripts/*.{mjs,sh,ts,js}`, `.github/workflows/*.yml`, or
    # `distribution/**` must resolve to either (a) a TASKS.md task
    # block whose body mentions the path, (b) an
    # `experiments/<id>.yaml` whose body mentions the path, OR (c) a
    # `<!-- scope: human-approved <reason> -->` comment in the new
    # file's first 20 lines OR the PR description. Modifications +
    # renames are grandfathered (rule-1 / rule-3 / rule-4 precedent).
    # Anchor: rule #10 (deterministic enforcement); rule #12 itself;
    # Ries 2011 (validated learning); Munafò 2017 (pre-registration).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: fetch base ref
        run: git fetch origin main:refs/remotes/origin/main
      - name: fetch PR body
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json body --jq .body > /tmp/rule-12-pr-body.md
      - name: rule-12 lint
        env:
          RULE_12_DIFF_BASE: origin/main
          RULE_12_PR_BODY_PATH: /tmp/rule-12-pr-body.md
        run: node scripts/check-rule-12-scope-discipline.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-rule-12-scope-discipline.test.mjs

  rule-17-proactive-heal:
    # rule #17 (vision.md § "Proactive healing — observation IS the fix"
    # — iron rule): a PR description that surfaces observed-error tokens
    # (`spawn-failed`, `scope-leak`, `ETIMEDOUT`, `GraphQL 401`, stack
    # traces, etc.) MUST also carry healing evidence — a `fix(...)` /
    # `patch:` commit subject, a `**Blocked**: <code>` task block, or a
    # non-empty diff that lands the fix. Pure "I observed X" PR bodies
    # are rejected as the "watcher who narrates" anti-pattern.
    # Anchor: rule #10 (deterministic enforcement); rule #17 itself;
    # Forsgren/Humble/Kim, *Accelerate*, 2018 (DORA — change-fail rate
    # falls when fixes prevent classes, not instances); operator
    # directive 2026-05-19 ("why aren't they being fixed by you right
    # away?").
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: fetch base ref
        run: git fetch origin main:refs/remotes/origin/main
      - name: fetch PR body
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json body --jq .body > /tmp/rule-17-pr-body.md
      - name: rule-17 lint
        env:
          RULE_17_DIFF_BASE: origin/main
          RULE_17_PR_BODY_PATH: /tmp/rule-17-pr-body.md
        run: node scripts/check-rule-17-proactive-heal.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-rule-17-proactive-heal.test.mjs

  no-hardcoded-user-paths:
    # rule-#1 + rule-#17 deterministic gate against hardcoded user paths.
    # `MINSKY_HOME ?? "/Users/cbrwizard/…"` fallbacks broke the script for
    # every operator who isn't `cbrwizard` and were healed twice in PRs
    # #651 and #654. Without this lint, the same class returns the next
    # time someone hardcodes their own `$HOME` in a script. Comments are
    # exempt (audit trail); current-user, `ubuntu`, and `runner` are
    # exempt (CI / local-machine self-references).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: no-hardcoded-user-paths lint
        run: node scripts/check-no-hardcoded-user-paths.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-no-hardcoded-user-paths.test.mjs

  no-personal-paths-in-docs:
    # Markdown sibling of `no-hardcoded-user-paths`. The pure-prose lint blocks
    # personal-path leaks (`/Users/<other-user>`, `~/apps/<repo-on-fyodor's-mac>`,
    # `MINSKY_HOME=~/apps/tooling/minsky` defaults) from sneaking into READMEs
    # / docs / user-stories / changelogs / TASKS.md. Same enforcement shape as
    # the code-path version: comments exempt, current-user exempt, runs across
    # every tracked `*.md` and `*.markdown` file under the repo root.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: no-personal-paths-in-docs lint
        run: node scripts/check-no-personal-paths-in-docs.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-no-personal-paths-in-docs.test.mjs

  agents-md-coherence:
    # AGENTS.md is the agent runbook every agent reads first. When it drifts
    # from the actual repo state (broken relative links to renamed docs,
    # `vision.md § N` citations pointing to non-existent rules, missing
    # load-bearing section anchors that other scripts cite), agents follow
    # stale instructions. This gate pins three drift classes: required
    # sections, relative-link resolution, and `vision.md § N` citation
    # resolution. Same shape as `no-personal-paths-in-docs` — pure decision
    # function with the I/O at the edge.
    #
    # Anchor: rule #10 (vision.md § 10 — deterministic enforcement);
    # rule #17 (vision.md § 17 — proactive healing); operator directive
    # 2026-05-21 "Let's ensure agents.md is always updated too".
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: agents-md-coherence lint
        run: node scripts/check-agents-md-coherence.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-agents-md-coherence.test.mjs

  rule-9-tasksmd-fields:
    # Rule #9 (vision.md § "Pre-registered hypothesis-driven development
    # — iron rule"): every task block in TASKS.md must carry Hypothesis,
    # Success (or Acceptance), Pivot, Measurement, and Anchor. Without
    # all five the rule degrades to a wish-list. The 2026-05-19 audit
    # found 32 of 152 task blocks violating; those are grandfathered in
    # the lint's allowlist with a backfill task to drain the list. NEW
    # tasks added after 2026-05-19 are never grandfathered.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: rule-9-tasksmd-fields lint
        run: node scripts/check-rule-9-tasksmd-fields.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-rule-9-tasksmd-fields.test.mjs

  rule-6-let-it-crash:
    # rule #10: deterministic enforcement of rule #6 (let-it-crash). Walks
    # every novel/**/*.ts file added/modified in the PR; flags try/catch
    # blocks nested deeper than 1 level (`nested-try`) or catch clauses
    # whose body neither re-throws nor calls `supervise(...)`
    # (`swallowing-catch`). Per-catch opt-out: the line immediately above
    # the `catch` keyword is `// rule-6: handled-locally — <reason>`.
    # Anchor: rule #10; Armstrong, *Programming Erlang*, 2007 (let it
    # crash); Lampson 1983 (use exceptions only for exceptional conditions).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: fetch base ref
        run: git fetch origin main:refs/remotes/origin/main
      - name: rule-6 lint
        env:
          RULE_6_DIFF_BASE: origin/main
        run: node scripts/check-rule-6-let-it-crash.mjs

  pattern-index:
    # rule #10: deterministic enforcement of rule #8 (pattern conformance —
    # every artefact maps to a published pattern). Diff-based: every newly-
    # added top-level artefact (`novel/**`, root `*.md`, `setup.sh`,
    # `distribution/**`, `.github/workflows/**`) on the PR must be mentioned
    # by `vision.md` § "Pattern conformance index", unless the file carries
    # `<!-- pattern: not-applicable — <reason> -->` in its first ~20 lines.
    # Existing files are grandfathered until the file is renamed (same
    # precedent as rule-1 / rule-3 / rule-4).
    # Anchor: rule #10; rule #8 (pattern conformance); Beck 1999 (CI as
    # constraint enforcer); Alexander et al. 1977 (pattern catalogue).
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: fetch base ref
        run: git fetch origin main:refs/remotes/origin/main
      - name: pattern-index lint
        run: node scripts/check-pattern-index.mjs --diff-base=origin/main
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-pattern-index.test.mjs

  pr-self-grade:
    # AGENTS.md § "Orchestrator discipline" rule (2): every PR's description
    # carries a `Hypothesis self-grade` block (Predicted / Observed / Match /
    # Lesson). Closes the loop on rule #9 — pre-registration without
    # observation-vs-prediction is half a rule. Runs on pull_request events
    # only; on push-to-main this job is skipped (no PR to inspect).
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - name: fetch PR body
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json body --jq .body > /tmp/pr-body.md
          test -s /tmp/pr-body.md
      - name: lint self-grade block
        run: node scripts/check-pr-self-grade.mjs /tmp/pr-body.md
        # Unit tests for this script run in the broader `test` job (root
        # vitest config includes `scripts/**/*.test.mjs`). Keep this gate
        # narrow: read the PR body, lint the block, exit.

  secret-scan:
    # vision.md § 13.1 / TASKS.md `secret-scanning-precommit-and-ci` §
    # Measurement: full-scan of every tracked file rejects PR-introduced
    # credential shapes (`ghp_…`, `sk-…`, `xoxb-…`, `AKIA…`, `AIza…`, PEM
    # private-key headers). Slices 1-3 (PRs #258, #259, #261) shipped the
    # pure classifier, the multi-file walker, and the
    # `@scan-secrets-allowed: <reason>` annotation seam in
    # `scripts/scan-secrets.mjs`. This slice (4) wires the CLI into the
    # gate. Push + PR; security gates are NOT PR-only because a leak that
    # lands via direct push must still surface (and rotate).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: secret-scan lint
        run: node scripts/scan-secrets.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/scan-secrets.test.mjs

  sbom-shape:
    # vision.md § 13.5 / TASKS.md `supply-chain-hardening-lockfile-sbom-slsa` §
    # Measurement: every release-candidate's CycloneDX SBOM matches the 1.5/1.6
    # subset the consumer's gates depend on. Slices 1-4 (PRs #269, #270, #285,
    # #286) shipped the pure classifier, the aggregating walker, the JSON-text
    # parser, and the CLI driver in `scripts/check-sbom-shape.mjs`. This slice
    # (5) wires the CLI into the CI gate so a regression in `cyclonedx-cli`
    # output (missed `purl`, duplicated `bom-ref`, unsupported spec version)
    # surfaces in CI rather than silently shipping with the release.
    #
    # Fail-safe-defaults (Saltzer & Schroeder 1975): the CLI exits 0 when no
    # SBOM is on disk (`sbom.cdx.json` absent — the typical state until a
    # generation step is wired into the release workflow). The gate therefore
