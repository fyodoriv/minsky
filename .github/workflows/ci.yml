name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx -y markdownlint-cli2 "**/*.md" "#node_modules" "#.minsky" "#.obsidian" "#.claude"

  tasks-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx -y @tasks-md/lint@latest TASKS.md

  glossary-discipline:
    # vision.md § 5: every coined term has a glossary anchor.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          if ! grep -q '## Glossary — every term has a CS anchor' vision.md; then
            echo "vision.md is missing the Glossary section required by constitutional rule #5" >&2
            exit 1
          fi

  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome ci .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
        env:
          CI: "true"

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  ci:
    needs: [markdownlint, tasks-lint, glossary-discipline, biome, typecheck, test, hygiene]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: gate
        run: |
          if [ "${{ needs.markdownlint.result }}" != "success" ] \
              || [ "${{ needs.tasks-lint.result }}" != "success" ] \
              || [ "${{ needs.glossary-discipline.result }}" != "success" ] \
              || [ "${{ needs.biome.result }}" != "success" ] \
              || [ "${{ needs.typecheck.result }}" != "success" ] \
              || [ "${{ needs.test.result }}" != "success" ] \
              || [ "${{ needs.hygiene.result }}" != "success" ]; then
            echo "one or more required checks failed" >&2
            exit 1
          fi
          echo "all required checks green"
