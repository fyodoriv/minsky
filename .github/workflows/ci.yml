    # with a stderr advisory and re-arms the moment the config lands.
    # Anchor: rule #10 (vision.md § 10 — deterministic enforcement);
    # ARCHITECTURE.md § "MAPE-K cadence"; research.md § "MAPE-K cadence";
    # Beyer, Jones, Petoff, Murphy (eds.), *Site Reliability Engineering*,
    # O'Reilly 2016, Ch. 3 (error-budget enforcement).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: mape-k-budget-cap lint
