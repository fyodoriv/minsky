  pr-security-review:
    # vision.md § 13 / TASKS.md `security-privacy-priority-substrate` §
    # Measurement: every PR body carries either a `## Security & privacy`
    # section OR a typed `<!-- security: not-applicable — <reason> -->`
    # opt-out. Slice 2 of `pr-security-review` (slice 1 shipped the pure
    # classifier in `scripts/check-pr-security-review.mjs` as PR #253) wires
    # the classifier into the gate. PR-event only, like `pr-self-grade`.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - name: fetch PR body
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json body --jq .body > /tmp/pr-body.md
          test -s /tmp/pr-body.md
      - name: lint security-review marker
        run: node scripts/check-pr-security-review.mjs /tmp/pr-body.md

  cto-audit-pr-conventions:
    # TASKS.md `post-task-cto-audit` sub-step (e/f): audit PRs land on
    # `audit/<UTC-date>-<task-id>` branches AND carry the
    # `minsky:cto-audit` label. The pre-registered measurement query
    # (`gh pr list --label minsky:cto-audit ...`) keys on the label;
    # without this gate the metric silently undercounts when an audit
    # PR is missing the label or uses the wrong branch (Munafò et al.
    # 2017's pre-registration only works when the post-hoc query can
    # actually see the artefacts it was committed to count).
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - name: fetch PR shape
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json headRefName,labels > /tmp/pr-shape.json
          test -s /tmp/pr-shape.json
      - name: lint audit-branch ↔ label biconditional
        run: node scripts/check-cto-audit-pr-conventions.mjs /tmp/pr-shape.json

  linux-supervisor-integration:
    # supervisor-integration-tests (TASKS.md): empirically exercise rows
    # 1–4 of `distribution/README.md` § "Failure modes & chaos verification"
    # against systemd's user-mode supervisor. The driver SIGKILLs the
    # tick-loop and asserts respawn within 10 s; rows 2 / 3 / 4 are also
    # exercised. Anchors: Forsgren-Humble-Kim 2018 (Accelerate — test
    # reliability as DORA prerequisite); Armstrong 2007 (OTP supervision).
    #
    # Caveat (per TASKS.md "Risk" line): GitHub Actions Ubuntu runners run
    # as a non-login user, and `systemctl --user` requires either a
    # lingering session OR a wrapping `dbus-run-session`. The driver tries
    # both fallbacks; if neither produces a usable user-bus, it exits 77
    # (skipped). The job below installs `dbus-user-session` to maximise
    # the chance the driver finds one.
    #
    # Escape hatch: if the user-systemd plumbing in CI sandboxes proves
    # unfixable (>2 unrecoverable issues per the task brief), follow up
    # with `supervisor-integration-self-hosted-runner` and gate this job
    # behind `if: false` here. v0 ships with the gate ON to surface the
    # signal — drift to OFF is a deliberate Pivot, not a default.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install dbus-user-session + gettext (for envsubst)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dbus-user-session gettext-base
      - name: enable user lingering (best-effort)
        run: |
          # Linger lets systemd --user run without an active login session.
          # On GH-hosted runners this usually succeeds via passwordless sudo.
          sudo loginctl enable-linger "$USER" || true
      - name: run supervisor integration test (linux)
        # The driver itself decides whether to use dbus-run-session as the
        # final fallback; see distribution/test-supervisor.sh.
        run: bash distribution/test-supervisor.sh linux

  macos-supervisor-integration:
    # supervisor-integration-tests (TASKS.md): launchd half of the matrix.
    # macOS GH-hosted runners boot a per-user launchd LaunchAgent domain by
    # default (the runner's session has a usable `gui/$(id -u)` bootstrap),
    # so unlike Linux this side does not need a workaround.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: run supervisor integration test (macos)
        run: bash distribution/test-supervisor.sh macos

  measurement-inspects-output:
    # rule #10 ratchet applied to spec-monitor advisory rule A4 ("measurement
    # runs but doesn't actually inspect output"): the deterministic gate
    # promotes the allowlist (`test`, `[`, `[[`, `jq -e`, `grep -q`/`-c`,
    # `assert`, `vitest`, `pnpm test`/`typecheck`/`lint`, `@tasks-md/lint`,
    # `markdownlint-cli2`, `gh run list ... --jq`, `node scripts/check-*.mjs`)
    # and blacklist (`echo`, bare `true`, bare `curl`, bare `node`) from
    # SKILL.md into a CI lint over EXPERIMENT.yaml's `measurement` field.
    # Three-way verdict — pass / fail / advisory-warn. The matching
    # advisory rule (A4) is removed from `novel/spec-monitor/SKILL.md`
    # in the same PR.
    # Anchor: rule #10 (vision.md § 10 — deterministic enforcement);
    # Havelund & Goldberg, "Verify Your Runs", *VSTTE* 2008 (runtime
    # verification — the inspect-output check is the deterministic-monitor
    # layer); Beck 1999 (CI as the constraint enforcer).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: build @minsky/experiment-record
        run: pnpm --filter @minsky/experiment-record build
      - name: measurement-inspects-output lint
        # No path arg: walks experiments/*.yaml per
        # experiments-directory-migration. Backward-compat: passing an
        # explicit path (file) still works for explicit single-file lint.
        run: node scripts/check-measurement-inspects-output.mjs
      - name: unit tests for the linter
        run: pnpm exec vitest run scripts/check-measurement-inspects-output.test.mjs

