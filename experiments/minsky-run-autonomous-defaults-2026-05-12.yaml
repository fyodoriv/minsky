pivot: |
  Two pivot paths pre-registered:

    1. If the flipped defaults cause measurable harm — operators
       accidentally trigger live spawn against the wrong host >10 % of
       runs (`unintended_live_spawn_rate` from `host-runs.jsonl`
       cross-referenced with operator confirmations) — retire the
       aggregate and revert to the explicit-flag surface from
       slice B/C. The 3-second countdown banner survives as an
       opt-in `--countdown` flag. Decision boundary: > 0.10
       unintended-live-spawn rate over the trailing 30 days against
       ≥ 5 distinct operators.

    2. If `--hosts-dir` drain-then-advance produces tail latency on
       parents with many hosts (operator wants round-robin or
       priority-queue ordering instead of strict drain), fold a
       `--walk-mode={drain,round-robin}` flag into the walker and keep
       drain as the default. Decision boundary: ≥ 3 operator reports
       requesting round-robin within the first 14 days, OR the
       `host_starvation_p99_minutes` metric (defined as max time the
       last host in the queue waits before its first iteration) exceeds
       30 minutes for parents with ≥ 5 hosts.

  Margin: success threshold ≤ 0.10 unintended-live-spawn rate; pivot 1
  fires at > 0.20. The 10-percentage-point gap is the rule-#9 explicit
  pivot margin (Ries 2011 build-measure-learn).

measurement: |
  npx vitest run novel/cross-repo-runner --reporter=json | jq -e ".numPassedTests >= 161 and .numFailedTests == 0" && grep -q "applyAutonomousDefaults" novel/cross-repo-runner/bin/minsky-run.mjs && grep -q -- "--hosts-dir" novel/cross-repo-runner/bin/minsky-run.mjs && grep -q -- "--no-live" novel/cross-repo-runner/bin/minsky-run.mjs && grep -q "detectCwd" novel/cross-repo-runner/src/cwd-detect.ts && grep -q "walkHostsDir" novel/cross-repo-runner/src/host-walker.ts && grep -q "maybePrintCountdownBanner" novel/cross-repo-runner/bin/minsky-run.mjs

anchor: |
  Cooper, A., *About Face: The Essentials of Interaction Design*,
  Wiley, 4th edition, 2014 (sensible defaults — "the system should
  do the right thing without configuration in the common case";
  ISBN 978-1118766576). This is the literature anchor for flipping
  the autonomous-default aggregate.
  Norman, D. A., *The Design of Everyday Things: Revised and Expanded
  Edition*, Basic Books, 2013 (the "Gulf of Execution" — the distance
  between user intent and the action sequence required; the CLI's
  current cliff is exactly this gulf; ISBN 978-0465050659).
  Ries, E., *The Lean Startup*, Crown Business, 2011 (validated-
  learning + explicit pivot threshold — the unintended-live-spawn
  rate is the success metric, not "shipped a default flip";
  ISBN 978-0307887894).
  Martin, R. C., *Clean Architecture*, Prentice Hall, 2017 (I/O at
  the edge — `cwd-detect.ts` and `host-walker.ts` are pure functions
  over injected seams; the CLI bin wires the concrete fs / spawn
  strategies; ISBN 978-0134494166).
  Gamma, E., Helm, R., Johnson, R., Vlissides, J., *Design Patterns:
  Elements of Reusable Object-Oriented Software*, Addison-Wesley,
  1994 (Strategy — `runWalkLoop` in the walker is a Strategy seam
  injected with `runLoopAsResult` so the unit tests don't spawn real
  processes; ISBN 0-201-63361-2).
  rule #1 (vision.md § 1 — don't reinvent; `walkHostsDir` reuses
  `runHostLoop` from slice B + `runHostCtoAudit` from slice C via
