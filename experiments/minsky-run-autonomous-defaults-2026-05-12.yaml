id: minsky-run-autonomous-defaults-2026-05-12
hypothesis: |
  Slices A (PR #489 — live spawn), B (PR #490 — host-daemon loop), and C
  (PR #491 — CTO audit + seed-on-empty) build the *capability* surface
  for cross-repo autonomous operation. They are correct but ergonomically
  expert-only: to point the runner at a fresh repo for many hours the
  operator must remember `--host <dir> --live --loop --cto-audit
  --seed-on-empty --max-iterations=… --tick-interval-ms=…`. The cliff
  to first autonomous run is too steep — the system already does the
  right thing, the CLI is what's hiding it.

  This PR (slice D) flips the defaults toward autonomy without removing
  the safety latches:

  (a) `minsky-run --host <dir>` now implies
      `--live --loop --cto-audit --seed-on-empty` (the autonomous-default
      aggregate). The aggregate is *opt-out*: `--no-live`, `--once`,
      `--no-cto-audit`, `--no-seed-on-empty` restore the slice-A/B/C
      explicit-flag behaviour byte-for-byte.

  (b) A new `--hosts-dir <parent>` walks every bootstrapped subdirectory
      of `<parent>` in drain-then-advance order (one host runs until its
      queue is `empty-queue`, then the walker advances to the next host;
      `max-iterations` is shared across the whole walk). Mutually
      exclusive with `--host`. Files: `host-walker.ts`, `cwd-detect.ts`.

  (c) `minsky-run` invoked with neither `--host` nor `--hosts-dir`
      auto-detects from `process.cwd()`: a `.minsky/repo.yaml` →
      single-host; otherwise a `--hosts-dir` walk over the cwd. The
      operator's mental model collapses to "cd anywhere, run minsky-run".

  (d) Before flipping to live spawn, a 3-second countdown banner prints
      to TTY ("Starting autonomous run in 3 / 2 / 1… (Ctrl+C to abort)")
      so the operator who *did not* intend live spawn can abort.
      `--no-live`, `MINSKY_NON_INTERACTIVE=1`, or a non-TTY stdout
      (CI / piped invocation) skip the countdown entirely — never
      blocking automation.

  Pre-registered effect: paired tests for `cwd-detect.ts` (9 cases) +
  `host-walker.ts` (13 cases) + 5 new `aifn-840-shape` integration tests
  (slice-D autonomous defaults; cto-audit + no-seed-on-empty banner;
  --hosts-dir error on empty parent; --hosts-dir drain-then-advance;
  --host + --hosts-dir mutual exclusion) pass; the slice-A/B/C surfaces
  remain unchanged when the operator passes the explicit slice-B/C flags
  (the `--no-live --loop --cto-audit ...` invocations in the existing
  integration suite all still pass without modification beyond the
  expected default-change updates).

