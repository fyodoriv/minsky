id: cross-repo-runner-v1-live-spawn-2026-05-11
hypothesis: |
  `cross-repo-runner-v0` (PR #129) and the AIFN-840 integration test
  (PR #131) shipped a plan-only runner: `minsky-run <id> --host <dir>`
  synthesises the EXPERIMENT.yaml, builds a `RunnerPlan`, writes a
  `planned`-verdict iteration record. The `--live` flag printed a v0
  placeholder telling the operator to open Claude Code manually. Two
  chaos rows in the v0 READMEs deferred their substrate to a v1 task:
    (a) `novel/cross-repo-runner/README.md` row 7 ‚ÄĒ sandbox-leak
        detection requires a real spawn boundary;
    (b) `novel/sidecar-bootstrap/README.md` row 5 ‚ÄĒ read-only
        global-ignore fallback to per-clone `.git/info/exclude`.

  This PR graduates the runner to v1 by wiring `runLive` (pure
  orchestrator over `SpawnLike` + `GitLike` seams) to the real
  `ProcessSpawnStrategy` from `@minsky/tick-loop` (rule #1 ‚ÄĒ reuse, do
  not reinvent). The boundary captures `git rev-parse HEAD` ‚Üí
  `spawn claude --print` with the brief on stdin + `cwd: hostRoot` ‚Üí
  diff against baseline ‚Üí record one of three verdicts: `validated`,
  `scope-leak`, `spawn-failed`. Scope comes from the task block's
  `**Touches**:` (fallback `**Files**:`) globs; empty scope disables
  the leak check per rule #7 graceful-degrade. The sidecar-bootstrap's
  global-ignore append walks an EACCES fallback to per-clone
  `<host>/.git/info/exclude` via a new `decideIgnoreAppend` pure
  function ‚ÄĒ chaos row 5's "deferred" deferral becomes "covered by
  `ignore-write.test.ts`".

  Pre-registered effect: paired tests for both new modules
  (`runner.test.ts` + `ignore-write.test.ts`) pass; the integration
  test learns a `--live` skip-path gated on
  `MINSKY_LIVE_SPAWN_INTEGRATION=1 && which claude`; the rule-7
  chaos-coverage lint stays at zero violations after the README
  deferrals are replaced with real test paths.
