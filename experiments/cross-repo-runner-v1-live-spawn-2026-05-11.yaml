  - `node scripts/check-anchor-primary-source.mjs experiments/cross-repo-runner-v1-live-spawn-2026-05-11.yaml`
    exits 0.
  - `node scripts/check-pivot-success-margin.mjs experiments/cross-repo-runner-v1-live-spawn-2026-05-11.yaml`
    exits 0.
  - `node scripts/check-measurement-inspects-output.mjs experiments/cross-repo-runner-v1-live-spawn-2026-05-11.yaml`
    exits 0.
pivot: |
  Two pivot paths pre-registered:

    1. If `ProcessSpawnStrategy.spawn` against `cwd: hostRoot` proves
       brittle in practice (claude --print refuses to honour cwd,
       authentication state leaks across hosts, or
       `git diff --name-only` against the baseline misses tracked-but-
       untouched paths > 20 % of the time), retreat to the v0
       operator-driven mode ‚ÄĒ the CLI prints the plan and the operator
       opens Claude Code manually. The pure `runLive` function stays
       as a substrate the operator can re-use locally; the CLI just
       loses its automated path. Decision boundary: < 0.20 success
       rate (`validated` verdict / total `--live` invocations) over
       30 days against ‚Č• 10 real host PRs.
    2. If the chaos-row-7 scope-leak check has > 0.10 false-positive
       rate (legitimate config edits in a host's standard locations
       outside the declared `**Touches**:` globs that should be
       allowed), relax the verdict to `inconclusive` instead of
       `scope-leak` and surface a `scope-warning:` note for operator
       review. The hard scope-leak verdict stays available behind an
       opt-in `MINSKY_STRICT_SCOPE=1` env var.

  Margin: success threshold ‚Č• 0.80; pivot 1 fires at < 0.20. The
  60-percentage-point gap is the rule-#9 explicit pivot margin per
  Ries 2011 build-measure-learn (clear separation between "ship more
  of this" and "abandon the approach").
measurement: |
  bash -c 'cd /Users/fivanishche/apps/tooling/minsky/.worktrees/cross-repo-runner-v1-live-spawn && npx vitest run novel/cross-repo-runner novel/sidecar-bootstrap --reporter=json | jq -e ".numPassedTests >= 149 and .numFailedTests == 0" && node scripts/check-rule-7-chaos-coverage.mjs && grep -q "runner.test.ts" novel/cross-repo-runner/README.md && grep -q "ignore-write.test.ts" novel/sidecar-bootstrap/README.md && grep -q "ProcessSpawnStrategy" novel/cross-repo-runner/bin/minsky-run.mjs && echo "PASS" || (echo "FAIL" && exit 1)'
