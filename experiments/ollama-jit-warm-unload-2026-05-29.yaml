id: ollama-jit-warm-unload-2026-05-29
hypothesis: |
  Story 015 made `ollama_chat/qwen3-coder:30b` the operator's default
  runtime. The launchd plist that supervises `ollama serve` sets
  `OLLAMA_KEEP_ALIVE=24h`, which means: once a request touches the
  model, ~42 GB of wired RAM is held for a full day even after the
  minsky daemon has stopped. On a 64 GB MacBook, that's 65% of RAM
  held hostage between daemon sessions.

  This experiment claims: making the minsky daemon explicitly manage
  Ollama's memory lifetime (warm at start, unload at stop) — combined
  with lowering the env safety net from 24h to 10m — reduces
  daemon-idle wired memory from ~42 GB to ≤500 MB without measurably
  reducing iteration throughput. The bet relies on three properties:

    1. Per-request `keep_alive` overrides the env-var default in
       Ollama's API (verified in https://github.com/ollama/ollama/blob/
       main/docs/api.md § "Generate a completion" — the `keep_alive`
       parameter is per-request, env var is the fallback when absent).
    2. LiteLLM's ollama provider does not currently set `keep_alive`
       on its `/api/chat` payloads (verified live by tcpdump on
       127.0.0.1:11434 during a `qwen3-coder:30b` iteration on
       2026-05-29 — payload is `{model, messages, stream, options}`
       with no `keep_alive` field).
    3. The bash runner already has a `trap` on SIGTERM/SIGINT at
       `bin/minsky-run.sh:1321` — a single trap-handler edit is the
       complete daemon-stop hook surface.

  Bet shape: this is a memory-management problem, not a throughput
  problem. The cold-start tax (loading ~42 GB into VRAM) is paid
  exactly once per daemon-start, not once per iteration. Steady-state
  iteration latency is unchanged.
success: |
  Numeric success thresholds (all three must hold):
    Metric A — daemon-idle wired memory after `minsky daemon stop` + 12s
      drops from the ~43,458 MB baseline (measured 2026-05-29 via
      scripts/measure-ollama-idle-memory.sh, OVER_THRESHOLD) to
      ≤ 500 MB.
    Metric B — iteration throughput does NOT regress: the clean-exit
      fraction (scripts/stability-number.mjs over the trailing 7 days)
      drops by at most 0.05 (5 percentage points) vs the pre-change
      baseline. Cold-start tax is one-time per session, so steady-state
      iteration latency should be flat; a > 5pp drop signals an
      unexpected cost (e.g. warm-call latency leaking into iteration
      timing through a missing async-await).
    Metric C — the warm-CLI invocation itself completes in < 60 s on a
      cold model load. The cold-start tax is empirically ~15-30 s for
      qwen3-coder:30b on M3 Max; 60 s gives 2x headroom.
pivot: |
  Pivot threshold (numeric): if daemon-idle wired memory stays
  > 5000 MB across 14 days of operator-default use AND the dotfiles
  plist's OLLAMA_KEEP_ALIVE=10m env var has been verified active (via
  `launchctl getenv OLLAMA_KEEP_ALIVE` on the host), the unload path
  isn't firing reliably. Investigate, in order: LiteLLM behaviour (a
  newer version may hardcode a long keep_alive), Ollama upgrade compat
  (the unload endpoint shape may have changed), or trap-handler
  ordering (something exits before the unload CLI completes). If
  LiteLLM is the cause, contribute a `keep_alive: 0` override at the
  LiteLLM layer (rule #1 push-upstream). If the Ollama API changed,
  re-pin the adapter to the new shape.
measurement: |
  bash scripts/measure-ollama-idle-memory.sh --json | jq -e '.ollama_runner_rss_mb <= 500' && node scripts/stability-number.mjs --json | jq -e '.stability_pct == null or .stability_pct >= 60'
