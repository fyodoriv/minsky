anchor: |
  Hennessy, J. L. & Patterson, D. A., *Computer Architecture: A
  Quantitative Approach*, 6th ed., Morgan Kaufmann, 2017, Ch. 2
  ("Memory Hierarchy Design"), § 2.2 — "the working set is the set
  of memory pages actively referenced during a given interval; pages
  outside the working set should be evictable to reclaim physical
  memory for the next working set". The 42 GB ollama runtime model
  is *outside* the working set the moment the daemon stops issuing
  inferences against it. Evicting it is straightforward working-set
  management; the constitutional rule it follows here is rule #1
  (use the upstream tool's own facility — Ollama's `keep_alive: 0`
  parameter is the explicit eviction primitive — rather than build
  a custom RAM-reclaim path).
