pivot: |
  Two pivot paths pre-registered:

    1. If the observer's auto-PR-filing produces noise (operator
       gets > 3 PRs per hour during a flake-storm OR a false-positive
       rate > 0.30 over the trailing 7 days across ≥ 3 operators),
       tighten the escalation gate: require the same failure pattern
       ≥ 3 times across ≥ 2 distinct hosts before filing an upstream
       PR, and add a local rate-limit `observer.pr.per-hour.max=2`.
       The skill's Safe-heal + local-log surfaces (§4, §6) survive;
       only the Swift-PR trigger (§5) tightens.

    2. If the bash shim proves brittle across platforms (Linux +
       macOS + WSL — different `pgrep` / `pkill` flags, different
       `readlink` semantics, different `HOME` conventions), fold
       the resolver into the runner bin itself
       (`minsky-run --from-cwd` that does the same repo resolution)
       and retire the separate shim. The pure `resolveMinskyRepo`
       survives; only its shell wrapper changes.

  Margin: success threshold is < 0.10 false-positive-PR rate over
  trailing 7 days; pivot 1 fires at > 0.30. The 20-percentage-point
  gap is the rule-#9 explicit pivot margin (Ries 2011 build-measure-
  learn).

