id: minsky-observer-plugin-2026-05-12
hypothesis: |
  Slices A-D (PRs #489 / #490 / #491 / #492) built the cross-repo
  runner's capability surface + autonomous defaults. What's still
  missing is the *operator-side* layer:

  (a) no PATH-accessible CLI — the operator has to `cd ~/apps/tooling/
      minsky && pnpm minsky-run` to invoke the runner, even though
      slice D's cwd auto-detect means the runner itself works from
      any bootstrapped folder;
  (b) no observer protocol — nothing watches the autonomous loop
      from outside, so transient crashes / scope-leaks / rule-#9
      violations accumulate silently until the operator notices
      from the resulting PR chaos;
  (c) no agentbrew-distributed skill — agents in Claude Code / Cursor
      / Devin sessions can't reach for `/minsky` when the user asks
      to "run minsky here".

  This PR closes all three gaps with a single integrated deliverable:

  1. `bin/minsky` is a zero-dependency bash shim. It resolves the
     minsky repo via `MINSKY_REPO` → `~/apps/tooling/minsky` → common
     community fallbacks, then forwards all args to
     `novel/cross-repo-runner/bin/minsky-run.mjs`. The resolver logic
     is pure (`novel/cross-repo-runner/src/shim-resolve.ts`) with
     paired tests covering the env-var + fallback chain.

  2. `skill-plugins/observer/minsky/SKILL.md` documents the 5-section
     observer protocol for ANY calling agent: Watch / Restart /
     Safe-heal / Swift-PR / Log. The skill is triggered by natural-
     language phrases ("run minsky here", "observe minsky") so every
     agentbrew-synced agent reaches for it consistently.

  3. `commands/minsky.md` + `minsky-status.md` + `minsky-stop.md`
     are the slash-command surface. Installed into
     `~/.config/agentbrew/commands/` by `distribution/install-
     observer.sh`; agentbrew then syncs them to each agent's
     commandsDir on the next `agentbrew sync`.

  4. `Agentfile.yaml` at the repo root declares `skillSources:
     [{ label: minsky-observer, path: ./skill-plugins/observer }]`,
     giving agentbrew a single pointer to deploy the skill across
     every detected agent.

  Pre-registered effect: (i) the resolver's unit tests pass (≥8
  cases covering env-var hit/miss and the 4-step fallback chain);
  (ii) `agentbrew sync --agentfile ./Agentfile.yaml` (or the lint-
  only substitute) deploys the skill without frontmatter errors;
  (iii) running `minsky --help` from any cwd on a machine with a
  bootstrapped host prints the runner's usage (i.e., the shim
  forwards correctly); (iv) every public file carries the required
  literature anchor.

