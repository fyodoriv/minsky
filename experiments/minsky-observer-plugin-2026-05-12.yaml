anchor: |
  Perrow, C., *Normal Accidents: Living with High-Risk Technologies*,
  Princeton University Press, 1984 (the independent-monitor pattern:
  a safety supervisor outside the primary control loop catches
  failures the loop cannot see about itself; observer-as-safety-
  layer is the architectural spine of this plugin; ISBN 978-0691004129).
  Beyer, B., Jones, C., Petoff, J., Murphy, N., *Site Reliability
  Engineering: How Google Runs Production Systems*, O'Reilly, 2016
  (error-budget discipline: the observer's retry budget + swift-PR
  threshold (§3, §5 of SKILL.md) enforce the error budget; `stop
  restarting after N failures + file upstream` is the concrete
  enforcement rule; ISBN 978-1491929124).
  Martin, R. C., *Clean Architecture: A Craftsman's Guide to Software
  Structure and Design*, Prentice Hall, 2017 (I/O at the edge — the
  bash shim is the I/O boundary; `resolveMinskyRepo` is pure and
  unit-tested; ISBN 978-0134494166).
  Ries, E., *The Lean Startup*, Crown Business, 2011 (validated-
  learning discipline — the observer's success metric is *recurrence
  rate of handled failure classes*, not *number of PRs opened*;
  ISBN 978-0307887894).
  Gamma, E., Helm, R., Johnson, R., Vlissides, J., *Design Patterns:
  Elements of Reusable Object-Oriented Software*, Addison-Wesley,
  1994 (Strategy + Observer — the SKILL.md implements the Observer
  pattern over the `minsky-run` subject; the restart / heal / escalate
  branches are Strategy seams; ISBN 0-201-63361-2).
  rule #1 (vision.md § 1 — don't reinvent; the skill is the mechanism
  every agentbrew-synced agent already has; no new orchestration
  framework).
  rule #6 (vision.md § 6 — stay alive + operator escape hatch: the
  observer never silently degrades, it either heals visibly or
  escalates visibly; §3, §4 of SKILL.md).
  rule #7 (vision.md § 7 — chaos engineering discipline; the
  observer's failure-mode catalogue (§2 of SKILL.md) is the
  deterministic chaos substrate for the operator-side layer).
  rule #9 (vision.md § 9 — every change pre-registers; this slice's
  pivot threshold (> 0.30 false-positive rate) is the behavioural
  contract on the auto-PR-filing gate).
  TASKS.md task block `minsky-observer-plugin-via-agentbrew` — the
  operator directive that motivated this slice.
  novel/cross-repo-runner/src/shim-resolve.ts — the pure resolver.
  novel/cross-repo-runner/src/shim-resolve.test.ts — paired tests.
  skill-plugins/observer/minsky/SKILL.md — the 5-section observer
  protocol; rule-#9 requires explicit file-level citations.
  commands/minsky.md + commands/minsky-status.md +
  commands/minsky-stop.md — the slash-command surface.
  bin/minsky — the PATH shim.
  distribution/install-observer.sh — the idempotent installer.

