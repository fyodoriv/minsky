id: cross-repo-host-daemon-loop-2026-05-11
hypothesis: |
  After `cross-repo-runner-v1-live-spawn` (PR #489) ships the one-shot
  `--live` path, the next gap is the *continuous* path — a host
  operator wants to invoke
  `minsky-run --host ~/apps/oncall-hub --live --loop` once and have
  the runner keep ticking through the host's rule-#9-compliant queue
  until empty (or SIGTERM, or `--max-iterations` cap, or first
  scope-leak / spawn-failed verdict). This PR ships the smallest
  viable shape: a pure `runHostLoop` orchestrator
  (`novel/cross-repo-runner/src/host-loop.ts`) that walks the same
  `SpawnLike` / `GitLike` seams `runLive` already uses; a pure
  `pickHostTask` selector
  (`novel/cross-repo-runner/src/task-finder.ts`) that returns the
  first rule-#9-compliant `P0` / `P1` task in document order; and
  three new CLI flags on `minsky-run` (`--loop`,
  `--max-iterations=N`, `--tick-interval-ms=M`) with a SIGTERM /
  SIGINT bridge to an `AbortController` so the operator's
  normal-exit signal aborts the in-flight iteration cleanly.

  Reusing `runLive` per-iteration (rule #1) + a thin tick scheduler
  in the same CLI (rule #6 — let-it-crash AT the iteration boundary,
  not the loop body) is the minimal-change shape that closes the
  user-story-006 continuous surface. Long-running supervisor
  ergonomics (launchd / systemd-user unit templates, auto-restart on
  crash, log rotation) are explicit follow-ups so this PR stays
  reviewable.

  Pre-registered effect: paired tests for `host-loop.ts`
  (11 cases) + `pickHostTask` (7 cases) + the AIFN-840 integration
  test's 4 new `--loop` cases all pass; the existing v0 surface
  (one-shot dry-run / `--live`) is byte-identical for any invocation
  that doesn't pass `--loop`.
