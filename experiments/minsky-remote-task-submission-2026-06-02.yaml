#   - scripts/submit-finding.mjs
anchor: |
  Fowler, M., *Patterns of Enterprise Application Architecture*,
  Addison-Wesley, 2002, Ch. 15 ("Distribution Patterns") — the Data
  Transfer Object pattern: a projection object carries only the fields
  safe to cross a boundary, decoupled from the internal record. The
  `RawFinding` -> `AnonymizedFinding` projection is exactly this
  shape, with redaction as the boundary transform. Privacy grounding:
  GDPR Art. 25 (data protection by design and by default); opt-in
  telemetry precedent in the Mozilla Crash Reporter and VSCode
  telemetry (transparent + anonymized + approval-gated). Constitutional
  anchor: rule #13 (vision.md § 13.7 — privacy by default; redact
  before egress).
replay_windows_days: [7, 30]
