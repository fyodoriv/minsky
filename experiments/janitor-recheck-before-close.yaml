id: janitor-recheck-before-close
hypothesis: |
  the daemon-auto-rebase-dirty-prs janitor closes any daemon PR stuck DIRTY/CONFLICTING for >2h after gh pr update-branch reports a conflict, using the mergeStateStatus from a `gh pr list` snapshot taken minutes earlier. When a contributor (or the PR author's own rebase) fixes the branch between the snapshot and the close, the janitor destroys a now-mergeable PR on stale evidence (observed live 2026-06-11: PR #1213, rebased green by its author, auto-closed anyway). Re-fetching the PR's CURRENT mergeStateStatus immediately before the destructive close, and skipping the close when the fresh state is no longer a stuck state (or is UNKNOWN — fail safe), eliminates the stale-close class while leaving genuinely-stuck PRs closed as before.
success: "the recheck guard fires: in the executeDecisions unit suite a conflict whose fresh recheck returns MERGEABLE yields outcome=recovered-externally with closeFn never called; a conflict whose fresh recheck returns CONFLICTING still closes — both pinned green; 0 stale-evidence closes of externally-recovered PRs after the guard lands."
pivot: "if the extra per-PR `gh pr view` recheck doubles janitor cycle latency past 30s on a normal backlog, batch the recheck into the initial snapshot's freshness window instead (re-list right before the close pass) rather than per-PR."
measurement: "npx vitest run scripts/auto-rebase-dirty-prs.test.mjs 2>&1 | grep -cE 'recovered-externally|Tests +21 passed'"
timeout_seconds: 120
anchor: |
  Bernstein & Newcomer, *Principles of Transaction Processing* (2009), Ch. 6 — time-of-check-to-time-of-use: a destructive action must validate its precondition against fresh state at the moment of action, not a stale read.
