id: cross-repo-cto-audit-host-mode-2026-05-11
hypothesis: |
  Slices A (PR #489) and B (PR #490) close the cross-repo *execution*
  surface — a host operator can drain a rule-#9-compliant queue
  continuously. The remaining gap is the *generation* surface: when
  the queue empties, the daemon stops. The minsky-on-itself loop
  (`@minsky/tick-loop`) solves this with `post-task-cto-audit.ts` —
  a second `claude --print` invocation after each shipped iteration
  that proposes 1–3 follow-up rule-#9-compliant task blocks.

  This PR ships the cross-repo equivalent:
  `novel/cross-repo-runner/src/host-cto-audit.ts` exports
  `buildHostCtoBrief` (host-parameterised CTO prompt),
  `shouldRunHostCtoAudit` (gate predicate covering verdict / env /
  recursion-guard), and `runHostCtoAudit` (pure orchestrator over an
  injected `SpawnLike`). Two new boolean CLI flags
  (`--cto-audit`, `--seed-on-empty`) wire the audit into `runHostLoop`
  via the new `ctoAudit` + `buildCtoSignals` + `seedOnEmpty` seams
  on `RunHostLoopOpts`.

  Behavior: with `--cto-audit`, every `validated`-verdict iteration
  in `--loop` mode triggers a post-iteration audit; with
  `--cto-audit --seed-on-empty`, an empty queue also triggers a seed
  audit + one-shot re-pick so the loop self-seeds instead of exiting.
  Default behavior (no flags) is byte-identical to slice B — the
  seam is opt-in.

  Pre-registered effect: paired tests for `host-cto-audit.ts` (22
  cases) + extended `host-loop.test.ts` (6 new CTO-seam tests) + 2
  new integration tests pass; the slice B + slice A surfaces are
  unchanged when the new flags are absent.
