pivot: |
  Two pivot paths pre-registered:

    1. If the CTO audit's prompt produces vanity-metric task blocks
       (counts-go-up tasks per Ries 2011) or fabricates non-existent
       file paths > 20 % of the time on real hosts, retire the
       auto-fire from `--loop` and keep `--cto-audit-once` as a
       one-shot operator surface. The pure `runHostCtoAudit` survives
       as substrate. Decision boundary: < 0.40 of audit-PRs ship
       (`merged / opened`) over the trailing 60 days against ≥ 5
       distinct host repos.
    2. If `--seed-on-empty` produces flapping (audit proposes one
       task, daemon ships it, queue empties, audit re-proposes
       similar tasks ad infinitum), tighten the recursion guard or
       require a `**Pick-next**: cto-audit-seed` operator approval
       before seeding. The audit pure orchestrator survives.

  Margin: success threshold ≥ 0.80 ship-rate of audit PRs; pivot 1
  fires at < 0.40. The 40-percentage-point gap is the rule-#9
  explicit pivot margin (Ries 2011 build-measure-learn).
measurement: |
  npx vitest run novel/cross-repo-runner --reporter=json | jq -e ".numPassedTests >= 135 and .numFailedTests == 0" && grep -q "runHostCtoAudit" novel/cross-repo-runner/src/host-cto-audit.ts && grep -q "shouldRunHostCtoAudit" novel/cross-repo-runner/src/host-cto-audit.ts && grep -q -- "--cto-audit" novel/cross-repo-runner/bin/minsky-run.mjs && grep -q "ctoAudit" novel/cross-repo-runner/src/host-loop.ts
anchor: |
  Kephart, J. O., Chess, D. M., "The Vision of Autonomic Computing",
  *IEEE Computer* 36 (1), January 2003 (MAPE-K reference architecture
  — the CTO audit IS the Plan phase of cross-repo work; `runLive` is
  Execute; the audit identifies new work items the Execute phase
  ships).
  Goldratt, E. M., *The Goal: A Process of Ongoing Improvement*,
  North River Press, 1984 (Theory of Constraints — the CTO audit
  identifies the next constraint to lift; ISBN 978-0884271956).
  Ries, E., *The Lean Startup*, Crown Business, 2011 (validated-
  learning discipline — the audit's success metric is *PRs that ship*,
  not PRs that get filed; ISBN 978-0307887894).
  Gamma, E., Helm, R., Johnson, R., Vlissides, J., *Design Patterns:
  Elements of Reusable Object-Oriented Software*, Addison-Wesley,
  1994 (Strategy + Command — `ctoAudit` is a Strategy seam on
  `RunHostLoopOpts`; the audit's `HostCtoSignals` are Command-pattern
  data; ISBN 0-201-63361-2).
  Martin, R. C., *Clean Architecture*, Prentice Hall, 2017 (I/O at
  the edge — `host-cto-audit.ts` is pure; the CLI bin wires the
  concrete spawn strategy; ISBN 978-0134494166).
  rule #1 (vision.md § 1 — don't reinvent;
  `@minsky/tick-loop`'s `post-task-cto-audit.ts` is the existing
