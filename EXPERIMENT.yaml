id: mape-k-cost-schedule-from-vision
hypothesis: |
  Goldratt's flat product `violationCount × 1` over-collapses
  high-frequency low-severity rules (typo lints) against rare
  high-severity rules (rule-#9 pre-registration misses). A per-rule
  cost schedule sourced from a new `## Cost schedule` table in
  `vision.md` — parsed by `parseCostSchedule(visionMdContent)`
  (`novel/mape-k-loop/src/cost-schedule.ts`) and threaded through
  `tick({ ..., costs })` into `analyze({ snapshot, costs })` —
  restores the severity ordering without an API change. The `costs`
  seam was already designed in `mape-k-loop-v0` sub-task 2; this PR
  is the upstream parser plus the integration plumbing in `tick`.
  v0 weights (defensible, revisitable at the next quarterly review):
  `rule-9 = 100`, `rule-7 = 50`, `rule-typo = 1`. Rules absent from
  the schedule fall back to `DEFAULT_RULE_COST = 1` (rule #7
  graceful-degrade). The integration test asserts a 50× rule-typo
  violation count cannot outrank a single rule-#9 violation under
  the schedule (50 × 1 = 50 < 1 × 100 = 100), and that without the
  schedule the same input picks rule-typo (regression baseline).
  This PR is rule-#4 ratchet ("every constant in source") applied
  to the cost-weight schedule: the prose-only "use 100 / 50 / 1"
  recommendation in the task block becomes a numbered, parseable,
  deterministically-consumed table.
success: "`pnpm typecheck` exits 0; `pnpm vitest run novel/mape-k-loop/src/cost-schedule.test.ts user-stories/003-mape-k-improves-prompts.test.ts --reporter=json | jq -e '.numPassedTests >= 5 and .numFailedTests == 0'` exits 0; rule-N CI lints (rule-1 / rule-2 / rule-3 / rule-4 / rule-5 / rule-6 / rule-7 / skill-rule-cap / pattern-index / mape-k-budget-cap / mape-k-constraints-md-size) pass on this PR's diff; the `mape-k-cost-schedule-from-vision` task block is removed in the same PR (`grep -c '^  - \\*\\*ID\\*\\*: mape-k-cost-schedule-from-vision$' TASKS.md` returns 0); vision.md row 54 marks `costEstimate` full-conformance."
pivot: "If the schedule goes stale faster than expected (>5 % of PRs need to add a new ruleId row, i.e. the table cannot keep pace with new rules being introduced), pivot to a heuristic over rule severity ranges sourced from each rule's own README — the same long-tail-prose escape hatch the original task block called out. If the v0 weights (100 / 50 / 1) prove arbitrary in practice (the loop's first month of rollouts shows the per-rule rankings disagree with operator exampleion >25 % of ticks), recalibrate at the next quarterly review (`review-q3-2026`) rather than removing the schedule — removing it re-opens the high-volume-low-severity over-collapse failure mode this gate exists to close."
measurement: "pnpm typecheck && pnpm vitest run novel/mape-k-loop/src/cost-schedule.test.ts user-stories/003-mape-k-improves-prompts.test.ts --reporter=json | jq -e '.numPassedTests >= 5 and .numFailedTests == 0' && [ \"$(grep -c '^  - \\*\\*ID\\*\\*: mape-k-cost-schedule-from-vision$' TASKS.md)\" = '0' ]"
anchor: "Goldratt, E. M., *The Goal: A Process of Ongoing Improvement*, North River Press, 1984 (Theory of Constraints — `topConstraint = max(violationCount × cost)`); rule #4 (vision.md § 4 — every constant in source; the schedule's literal numbers live in the markdown table, not in code); rule #7 (vision.md § 7 — graceful-degrade; missing schedule → identity, misconfigured weight → fallback to `DEFAULT_RULE_COST`); Kephart, J. O., & Chess, D. M., \"The Vision of Autonomic Computing\", *IEEE Computer* 36(1), pp. 41-50, 2003 (the MAPE-K Analyze phase whose cost-weight upstream this lint is); Martin, R. C., *Clean Architecture: A Craftsman's Guide to Software Structure and Design*, Pearson, 2017 (pure-function decision module + thin I/O boundary — the parser is pure, the CLI wrapper is the I/O); vision.md § \"Cost schedule\" (the new table this PR adds); vision.md § \"Pattern conformance index\" row 54 (updated to mark `costEstimate` full-conformance)."
replay_windows_days: [7, 30]
