id: pre-2026-q3-dep-audit-2026-05-04
hypothesis: |
  Recording a 2026-05-04 dependency snapshot in research.md's
  "Quarterly review log" gives the upcoming Q3 2026 review
  (date-blocked, due 2026-08-03 per `review-q3-2026`) a 3-month-stable
  baseline to compare against. Without this snapshot, the Q3 review's
  first action would be a fresh `pnpm outdated` scan — losing the
  before/after delta that makes the review's findings falsifiable.
  Six dev deps are flagged today (biome, vitest, @vitest/coverage-v8,
  lefthook, typescript major-version-behind; markdownlint-cli2 minor
  drift); zero runtime deps are stale. The Q3 review should address
  markdownlint-cli2 first (smallest blast radius), then plan biome
  1→2 as a separate task before vitest/typescript.
success: |
  `### Pre-2026-Q3 audit findings (2026-05-04)` exists in research.md
  under the "Quarterly review log" section, with the 6-package table
  and a 2-3 sentence summary identifying the Q3 ordering recommendation.
pivot: |
  If any of the 6 packages ships a critical security advisory before
  2026-08-03, file an emergency-bump P1 task and skip the Q3 cadence
  for that package — the audit's standing assumption (quarterly
  cadence is sufficient) is falsified for that specific dep, not
  for the cadence as a whole. If ≥2 of the 6 packages ship critical
  CVEs in the same quarter, the cadence itself fails its purpose
  (quarterly is too slow); raise to bi-monthly until the rate
  normalises (mirrors the parent `review-q3-2026` task's pivot).
measurement: |
  [ "$(grep -c '^### Pre-2026-Q3' research.md)" -ge 1 ] \
    && pnpm typecheck && pnpm test && pnpm lint \
    && npx -y @tasks-md/lint@^0.7.0 TASKS.md \
    && pnpm exec markdownlint-cli2 "**/*.md" "#**/node_modules" "#.minsky" "#.obsidian" "#.claude"
anchor: |
  rule #1 (vision.md § 1 — don't reinvent; depend on stable upstream
  and review the choice quarterly); ARCHITECTURE.md § "Versioning &
  dependency evolution" (pin majors, batch minor/patch bumps);
  Forsgren, Humble, Kim, *Accelerate*, IT Revolution Press, 2018
  (DORA — low-risk, frequent, small bumps over big-bang upgrades;
  the Q3 ordering recommendation operationalises this for the 6
  flagged deps); Munafò et al., "A Manifesto for Reproducible
  Science", *Nature Human Behaviour* 1, 0021, 2017 (pre-registration —
  the snapshot is committed *before* the Q3 review observes its
  result, so the review's findings are falsifiable against today's
  baseline).
replay_windows_days: [90]
