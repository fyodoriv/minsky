id: observability-backend-deploy-2026-05-04
hypothesis: |
  Shipping `distribution/install-openobserve.sh` (pinned at OpenObserve
  v0.80.1, downloads the upstream binary into `${HOME}/.local/bin/`) +
  per-platform unit-file templates (`distribution/openobserve/{plist,
  service}`) + the `OtelObservability.endpoint` opt + the read-only
  `OpenObserveStrategy` (`fetchOpenObserveSnapshot` /
  `queryOpenObservePromql` / `parsePromqlInstantResponse` /
  `openObserveGetValue` over the Prometheus instant-query API) +
  `OBSERVABILITY_BACKEND=openobserve` wiring in `dashboard-web/start.ts`
  unblocks 5 of 10 vision.md success-criteria queries (rows 1, 2, 5, 6, 9
  — uptime, tokens/story, MTTR, wrist-dwell, token-budget) so the
  dashboard `/watch.json` route returns live values instead of `(stub)`.
  Per `research.md` § "Lighter OTEL backend" (PR #43, 2026-05-03),
  OpenObserve is the chosen v0 backend — single binary, parquet-on-disk,
  PromQL-compatible read API, ~250-800 MB / month at v0 emission rates.
success: |
  - `bash -n distribution/install-openobserve.sh` exits 0 (syntax valid).
  - `[ -x distribution/install-openobserve.sh ]` (executable bit set).
  - The 18 dashboard-web Strategy tests + the 9 OTEL adapter tests pass
    (≥6 dashboard-web Strategy tests + ≥3 endpoint-opt OTEL tests are
    new; total 27 passing in the two relevant files).
  - The dashboard's `/watch.json` route returns `OpenObserveStrategy`
    results when `OBSERVABILITY_BACKEND=openobserve` env var is set
    (verified by `start.ts`'s `resolveGetValue` returning the
    `openObserveGetValue` Strategy on that env-var branch).
  - The integration test `novel/adapters/observability/test/openobserve.integration.test.ts`
    is properly skipped in CI (no `OPENOBSERVE_INTEGRATION=1` set).
  - Concretely: `bash -n distribution/install-openobserve.sh && \
    pnpm vitest run novel/dashboard-web/test/strategy.test.ts \
      novel/adapters/observability/src/otel.test.ts \
      --reporter=json | jq -e '.numPassedTests >= 6 and .numFailedTests == 0'`
    exits 0 (today: 27 passed, 0 failed).
pivot: |
  If OpenObserve's single-binary install proves unreliable on macOS
  Sequoia (signing / sandbox policies refuse the binary) OR if the
  upstream tarball naming changes such that `install-openobserve.sh`
  cannot fetch a working binary for two consecutive quarterly reviews
  (`review-q3-2026` etc.) → fall back to **VictoriaMetrics triad** per
  `research.md` § "Lighter OTEL backend" (PR #43 — named runner-up).
  Migration cost is low: MetricsQL is a near-superset of PromQL, so the
  Strategy code requires only a base-URL + per-signal-endpoint swap;
  the OTEL adapter requires a per-signal endpoint swap on the
  `OtelObservability` constructor's `endpoint` opt. If both flake, ship
  the bare OTLP collector + Honeycomb-compatible exporter and document
  the cloud dependency in `research.md`.
measurement: |
  bash -n distribution/install-openobserve.sh \
    && [ -x distribution/install-openobserve.sh ] \
    && pnpm typecheck \
    && pnpm vitest run \
         novel/dashboard-web/test/strategy.test.ts \
         novel/adapters/observability/src/otel.test.ts \
         --reporter=json \
       | jq -e '.numPassedTests >= 6 and .numFailedTests == 0' \
    && pnpm lint \
    && node scripts/check-rule-4-otel-coverage.mjs --diff-base=origin/main \
    && node scripts/check-rule-6-let-it-crash.mjs --diff-base=origin/main \
    && node scripts/check-rule-7-chaos-coverage.mjs \
    && node scripts/check-pattern-index.mjs --diff-base=origin/main \
    && node scripts/check-rule-1-novel-justification.mjs --diff-base=origin/main \
    && npx -y @tasks-md/lint@^0.7.0 TASKS.md \
    && pnpm exec markdownlint-cli2 "**/*.md" "#**/node_modules" "#.minsky" "#.obsidian" "#.claude"
anchor: |
  research.md § "Lighter OTEL backend" (PR #43, 2026-05-03) — the v0
  backend selection, OpenObserve chosen over VictoriaMetrics + the
  SQLite-bespoke option; OpenTelemetry specification, CNCF (2020+) — the
  OTLP HTTP receiver contract OpenObserve implements (three-signal
  traces / metrics / logs); Prometheus HTTP API (Prometheus 2.x docs) —
  the read-side query contract OpenObserve mirrors (`status`,
  `data.resultType` ∈ `{scalar, vector, matrix}`, `data.result[].value =
  [ts, "value"]`); Armstrong, J., *Programming Erlang*, Pragmatic
  Bookshelf, 2007 — OTP supervision: the OpenObserve daemon is
  "permanent" restart, mirroring `minsky-budget-guard.service`'s policy;
  Gamma, Helm, Johnson, Vlissides, *Design Patterns*, Addison-Wesley,
  1994 — Adapter / Strategy: `OpenObserveStrategy` is one implementation
  behind the `GetValue` seam shipped by `dashboard-web-otel-wiring`;
  rule #2 (every dep behind interface), rule #4 (every measurement
  queryable — the PromQL endpoint is the queryability surface), rule #7
  (graceful-degrade on backend down: `OpenObserveStrategy` returns
  `null` → `(stub)`), rule #9 (pre-registered pivot to VictoriaMetrics),
  rule #10 (deterministic enforcement — install-script shape verified by
  `bash -n` + executable-bit check, no actual install runs in CI);
  Munafò et al., *Nature Human Behaviour* 1, 0021, 2017 —
  pre-registration (the pivot to VictoriaMetrics is committed *before*
  OpenObserve's install reliability is observed in the field, so a
  failure cannot be retroactively explained away as the chosen backend).
replay_windows_days: [90]
