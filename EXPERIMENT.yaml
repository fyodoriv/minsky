id: architecture-align-research-openobserve-claude-monitor
hypothesis: |
  Aligning ARCHITECTURE.md with research.md — naming OpenObserve as the
  primary OTEL backend recommendation (with VictoriaMetrics as runner-up,
  and Loki+Tempo+Prometheus+Grafana retained only as historical context),
  and fixing the `claude-monitor` install command from `npm install -g`
  to `pip install claude-monitor==3.1.0` — eliminates the doc drift
  surfaced by the multi-machine research-scout pass (PR #45). This is a
  glossary-discipline fix (rule #5 — same name across docs); the canonical
  recommendations live in research.md § "Lighter OTEL backend" (resolved
  2026-05-03) and § "Token monitor" (claude-monitor is a Python tool,
  pinned at 3.1.0 on PyPI).
success: "grep -c 'OpenObserve' ARCHITECTURE.md ≥ 1 AND grep -c 'pip install claude-monitor' ARCHITECTURE.md ≥ 1 AND grep -c 'Loki+Tempo' ARCHITECTURE.md ≤ 1 (allowed: historical-context note); pnpm typecheck && pnpm test && pnpm lint && npx @tasks-md/lint TASKS.md && pnpm exec markdownlint-cli2 all green."
pivot: "if a re-read of research.md reveals OpenObserve was a tentative recommendation rather than a decision, restore Loki+Tempo+Prometheus+Grafana as the primary in ARCHITECTURE.md and file a follow-up to make research.md's recommendation more authoritative."
measurement: "test \"$(grep -c 'OpenObserve' ARCHITECTURE.md)\" -ge 1 && test \"$(grep -c 'pip install claude-monitor' ARCHITECTURE.md)\" -ge 1"
anchor: "research.md § \"Lighter OTEL backend\" (resolved 2026-05-03; OpenObserve for v0, VictoriaMetrics triad as runner-up); research.md § \"Token monitor\" (`claude-monitor==3.1.0` on PyPI); constitutional rule #5 (glossary discipline — same name across docs)."
