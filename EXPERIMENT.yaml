id: omc-roundtrip-and-close-research
hypothesis: |
  Lifting PR #75's TASKS.md `Research` field for
  `research-omc-handoff-persistence` into a dedicated `research.md`
  section + shipping the round-trip parseability check at
  `scripts/omc-roundtrip.mjs` meets the research task's full
  Acceptance criteria — both parts of it: (a) `research.md` has an
  "OMC handoff persistence" subsection with a verdict line matching
  `^- \*\*Verdict\*\*: parseable$`, and (b) the round-trip check
  exists, exits 0 against the dormant default, and exits 0 against a
  real OMC checkout's task JSON (round-trip diff is whitespace-only).
  Three downstream consequences: (1) the research task block is
  removed from TASKS.md (Acceptance met); (2) `omc-tasksmd-bridge-v0`
  loses its `Blocked by` line and is unblocked for the next session;
  (3) `omc-persistence-proposal` is itself disqualified — its trigger
  was "non-parseable", and the verdict is parseable, so the task is
  removed (not completed). The bridge's v0 is now a thin reader
  OMC → tasks.md (the parseable verdict was the unblock).
success: |
  Three-part criterion. (a) Structural — `research.md` § "OMC handoff
  persistence" exists with the verdict line matching `parseable`:
  `[ "$(grep -c '^## OMC handoff persistence' research.md)" = '1' ] &&
  grep -q 'Verdict.*parseable' research.md`. (b) Tests — the new
  round-trip check passes its paired test file:
  `pnpm vitest run scripts/omc-roundtrip.test.mjs >/dev/null`.
  (c) Unblock — `omc-tasksmd-bridge-v0`'s task block has no
  `Blocked by:` line referencing `research-omc-handoff-persistence`,
  and the research + proposal blocks are removed entirely from
  TASKS.md. Exit 0 on the combined check = the close ships;
  non-zero = the close is incomplete.
pivot: |
  Trigger: if the round-trip check, when pointed at a real OMC
  checkout (`node scripts/omc-roundtrip.mjs --omc-checkout=<path>`),
  reveals a non-whitespace diff against any sample task file —
  i.e., OMC's serialization is not byte-deterministic at
  `JSON.stringify(_, null, 2)` — the parseable-thin-reader hypothesis
  is disproved. On trigger, restore the `research-omc-handoff-
  persistence` task block in TASKS.md (with a 2026-05-04 amendment
  noting the disproof), restore `omc-persistence-proposal`'s
  conditional trigger (now active), and re-investigate. Do not
  patch the diff comparison to ignore the divergence — that masks
  the disproof. Abandon-the-approach line: if a second sample also
  diverges with the same shape (e.g., key reordering), the bridge
  shifts from "thin reader" to "full reverse-engineering"; raise
  `omc-tasksmd-bridge-v0`'s estimate to ≥1 week and consider
  deprioritising the bridge entirely (mirrors the original research
  task's documented Pivot).
measurement: "[ \"$(grep -c '^## OMC handoff persistence' research.md)\" = '1' ] && grep -q 'Verdict.*parseable' research.md && pnpm vitest run scripts/omc-roundtrip.test.mjs >/dev/null"
anchor: |
  Aho, Sethi, Ullman, *Compilers: Principles, Techniques, and Tools*,
  Addison-Wesley, 1986 (round-trip property as the parseability
  test — the load-bearing literature anchor for the new gate);
  rule #2 (vision.md § 2 — every dep behind interface; the OMC
  bridge is exactly that, and the parseability test gates the
  interface contract before v0 ships); rule #7 (vision.md § 7 —
  graceful-degrade dormant short-circuit when no `--omc-checkout=`
  is supplied); rule #9 (vision.md § 9 — pre-registered Pivot: a
  non-whitespace divergence on any sample disproves the parseable-
  thin-reader hypothesis); rule #10 (vision.md § 10 — deterministic
  enforcement; the original research task's prose Acceptance now has
  a machine-readable counterpart); Munafò, Nosek, Bishop et al.,
  "A Manifesto for Reproducible Science", *Nature Human Behaviour* 1,
  0021, 2017 (rule-#9 pre-registration discipline — the Pivot is
  committed before any real OMC checkout is round-tripped, so a
  divergence cannot be retroactively explained away).
replay_windows_days: [30]
