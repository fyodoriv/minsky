id: budget-guard-publish-dry-run
hypothesis: |
  `@minsky/budget-guard` and `@minsky/token-monitor` already declare the
  correct release contract — `files`, `main`, `types`, `exports`, and a
  matching `README.md` — so a publish dry-run produces tarballs whose
  contents match the documented manifest (no `*.test.{js,d.ts}`, no
  `*.map`, no `tsconfig.json`, no source files) and whose total size is
  well under 100 KB each (rule of thumb: a Strategy/Adapter v0 with one
  `dist/` tree, one README, and one `package.json` should land near
  10 KB compressed).
success: |
  Both packages produce exactly one `.tgz` per dry-run; both tarballs are
  <102_400 bytes; neither tarball contains `*.test.js`, `*.test.d.ts`,
  `*.map`, `tsconfig.json`, or anything under `src/`; both READMEs carry
  a `Pre-publish dry-run` section that records tarball name, size, and
  file list. Measured by:

      cd novel/budget-guard && npm publish --dry-run --loglevel=info 2>&1 \
        | grep -c 'package size: [0-9.]\+ kB'
      cd novel/adapters/token-monitor && npm publish --dry-run --loglevel=info 2>&1 \
        | grep -c 'package size: [0-9.]\+ kB'

  Each must return ≥1.
pivot: |
  If either package's tarball exceeds 100 KB or includes files outside
  the documented manifest after a `files`-field audit, the package shape
  is wrong (too coarse, accidentally bundling tests, missing `!`-negation
  globs, or compiler emitting source maps) — split the package or
  tighten `tsconfig.json` (`sourceMap: false`, `declarationMap: false`)
  before re-running. The pivot is an *abandon-the-approach* line: don't
  loop on `files` tweaks if the package itself is too big — it's a
  decomposition signal (rule #9 — Munafò et al. 2017 pre-registration
  discipline).
measurement: "pnpm --filter @minsky/budget-guard build >/dev/null && pnpm --filter @minsky/token-monitor build >/dev/null && [ \"$(cd novel/budget-guard && npm pack --dry-run --json 2>/dev/null | jq -r '.[0].size')\" -lt 102400 ] && [ \"$(cd novel/adapters/token-monitor && npm pack --dry-run --json 2>/dev/null | jq -r '.[0].size')\" -lt 102400 ]"
anchor: |
  Wiggins, *The Twelve-Factor App*, 2011 (factor V — build, release, run;
  the published artifact is the release contract, and `npm publish
  --dry-run` is the smoke test for that contract before the registry
  push); Gamma, Helm, Johnson, Vlissides, *Design Patterns*, Addison-
  Wesley, 1994 (Adapter / Strategy — both packages are
  Adapter/Strategy v0s whose published surface is intentionally
  thinner than their source tree).
replay_windows_days: [7, 30]
