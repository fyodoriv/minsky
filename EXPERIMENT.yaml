id: mape-k-monitor-analyze-phases
hypothesis: |
  Shipping pure `monitor(...)` and `analyze(...)` decision functions under
  `novel/mape-k-loop/` ‚Äî implementing the M (Monitor) and A (Analyze) phases
  of the MAPE-K reference architecture (Kephart & Chess, *IEEE Computer* 2003)
  with Goldratt's Theory of Constraints (*The Goal*, 1984) as the
  constraint-ranking primitive (top constraint = max
  `violationCount √ó costEstimate(ruleId)`, alphabetical tie-break by ruleId)
  ‚Äî provides a deterministic substrate for sub-tasks 3 (Plan + Execute) and 4
  (Knowledge + integration) of `mape-k-loop-v0` to plan against. Pure decision
  module + thin I/O boundary (Martin, *Clean Architecture*, 2017): the CLI
  wrapper that runs `gh run list --json ‚Ä¶`, reads `spec-advisories/*.md`, and
  tails `experiment-store/*.jsonl` ships in sub-task 4; the pure functions
  ship now and accept already-parsed inputs (`MonitorInput.ciRuns`,
  `MonitorInput.advisories`, `MonitorInput.experimentRecords`). Corrupt input
  rows are dropped with `warnings` entries (graceful-degrade per rule #7)
  rather than thrown ‚Äî keeping the contract narrow per rule #2 and surfacing
  the upstream-malformed signal explicitly. The `costs` argument to `analyze`
  is the seam for the documented pivot (per-rule severity-weighted schedule)
  if Goldratt's flat product over-collapses distinct violations once
  sub-task 3 starts feeding non-test snapshots through the function.
success: "`pnpm typecheck` exits 0 and `pnpm vitest run novel/mape-k-loop/src/monitor.test.ts novel/mape-k-loop/src/analyze.test.ts` exits 0 with ‚â•6 tests passing across both files; `vision.md` ¬ß \"Pattern conformance index\" gains row 54 for `@minsky/mape-k-loop` (MAPE-K + ToC + pure-function decision module, conformance: partial ‚Äî only M+A phases shipped); the parent `mape-k-loop-v0` tracker's `Blocked by` list drops by 1 ‚Äî the `mape-k-monitor-analyze-phases` block is removed from `TASKS.md` in the same PR (`grep -c '^  - \\*\\*ID\\*\\*: mape-k-monitor-analyze-phases$' TASKS.md` returns 0); rule-N CI lints (rule-1 / rule-2 / rule-3 / rule-4 / rule-6 / rule-7 / pattern-index / skill-rule-cap / pivot-success-margin / measurement-inspects-output / anchor-primary-source) all pass on this PR's diff."
pivot: "If Goldratt's flat `violationCount √ó cost` framing over-collapses distinct violations on the first non-test snapshot fed through `analyze` in sub-task 3 ‚Äî concretely, if a high-frequency typo / formatting-lint cluster ends up dominating `topConstraint` over rare but expensive rule-#9 misses across ‚â•3 consecutive snapshots from real CI runs ‚Äî pivot the `costs` argument's default schedule from identity (every rule = 1) to a per-rule severity-weighted schedule sourced from `vision.md` ¬ß \"Pattern conformance index\" (rule-#9 weight ‚â•10√ó a typo-lint rule). The seam already exists (the `costs` parameter on `analyze`); the API does not change ‚Äî only the default. Document the weight schedule in `vision.md` ¬ß Pattern conformance index row 54 notes column. Lower-bound trip: if implementing the schedule requires changing the `analyze` signature (i.e., the `costs` argument cannot host the schedule cleanly), the M+A phase contract is wrong and the interface needs a redesign before sub-task 3."
measurement: "pnpm typecheck && pnpm vitest run novel/mape-k-loop/src/monitor.test.ts novel/mape-k-loop/src/analyze.test.ts --reporter=json | jq -e '.numPassedTests >= 6 and .numFailedTests == 0'"
anchor: "Kephart, J. O., & Chess, D. M., \"The Vision of Autonomic Computing\", *IEEE Computer* 36(1), pp. 41-50, 2003 (the MAPE-K reference architecture ‚Äî Monitor / Analyze / Plan / Execute over a Knowledge base; this PR ships the M+A phases); Goldratt, E. M., *The Goal: A Process of Ongoing Improvement*, North River Press, 1984 (Theory of Constraints ‚Äî the constraint is whatever currently bottlenecks throughput; operationalised as `topConstraint` in `analyze`); Martin, R. C., *Clean Architecture: A Craftsman's Guide to Software Structure and Design*, Pearson, 2017 (pure decision module + thin I/O boundary ‚Äî the M+A phases are pure, the CLI wrapper that ships in sub-task 4 owns I/O); Gregg, B., *Systems Performance: Enterprise and the Cloud*, Prentice Hall, 2014 (USE method ‚Äî the per-rule aggregate-counter shape carries the *utilisation* column; saturation + errors arrive in sub-task 3); rule #2 (vision.md ¬ß 2 ‚Äî every dep behind an interface; the parsed-input contract IS the wrapping for `gh`/filesystem); vision.md ¬ß \"Pattern conformance index\" row 54 (this PR's row)."
