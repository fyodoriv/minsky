id: notifier-adapter-v0-2026-05-04
hypothesis: |
  A thin `Notifier` interface (Adapter pattern, Gamma 1994) + a stub-backed
  test fake (Meszaros 2007) + a single `NtfyNotifier` HTTP Strategy
  (POST `https://ntfy.sh/<topic>` with Title / Priority / Tags headers)
  gives the (future) tick-loop daemon a push channel without coupling
  business logic to ntfy.sh. Today story-001 acceptance #6 ("a morning
  notification summarizes work done") has no implementation — there's no
  push channel at all. The Strategy seam keeps APNs / Pushover / webhook
  open as future Strategies (rule #1: don't reinvent the wheel — the
  daemon never owns push-channel infrastructure). A constructor-injected
  `fetch` is the only I/O; tests assert request shape against a fetch-mock
  so no network is touched in CI (Martin 2017 — DI at the edge).
success: |
  ≥6 paired tests pass across stub + ntfy (today: 18 passed —
  5 stub + 13 ntfy);
  selfTest() returns `green` against a mock 200, `yellow` on rate-limit
  (429 — service is up but throttled), `red` on a network error;
  README chaos table has ≥3 rows (today: 4 — ntfy.sh down,
  network partition, rate-limited, auth token revoked);
  measurement command exits 0:
  `pnpm vitest run novel/adapters/notifier --reporter=json |
   jq -e '.numPassedTests >= 6 and .numFailedTests == 0'`.
pivot: |
  If ntfy.sh proves unreliable in production — ≥1 outage / week sustained
  over 4 weeks, OR free-tier rate-limits the minsky topic within the
  documented 3-pushes/day budget, OR the iOS client adds friction the
  operator does not accept — pivot the *Strategy* to APNs (via a webhook
  bridge) or self-hosted ntfy on the user's Tailnet. The pivot is
  Strategy-level: the `Notifier` interface and consumers are unchanged
  (Munafò 2017 — the pivot threshold is pre-registered before code so
  a flaky ntfy can't retroactively redefine "reliable enough").
measurement: |
  pnpm typecheck \
    && pnpm vitest run novel/adapters/notifier --reporter=json \
       | jq -e '.numPassedTests >= 6 and .numFailedTests == 0' \
    && pnpm lint \
    && node scripts/check-rule-4-otel-coverage.mjs \
    && node scripts/check-rule-6-let-it-crash.mjs \
    && node scripts/check-rule-7-chaos-coverage.mjs \
    && node scripts/check-pattern-index.mjs \
    && node scripts/check-rule-1-novel-justification.mjs \
    && npx -y @tasks-md/lint@^0.7.0 TASKS.md \
    && pnpm exec markdownlint-cli2 "**/*.md" "#**/node_modules" "#.minsky" "#.obsidian" "#.claude"
anchor: |
  Gamma, E., Helm, R., Johnson, R., Vlissides, J., *Design Patterns:
  Elements of Reusable Object-Oriented Software*, Addison-Wesley, 1994
  (Adapter — interface over an external dependency; Strategy —
  swap-in-able implementations behind a stable seam); Hunt, A., Thomas, D.,
  *The Pragmatic Programmer*, Addison-Wesley, 1999, Tip 32 ("Crash Early
  — but the crash needs to reach the operator"; the notifier is the
  operator-facing channel that turns a let-it-crash event into actionable
  feedback); Meszaros, G., *xUnit Test Patterns*, Addison-Wesley, 2007
  (test fake — `StubNotifier` records calls in-memory and returns a fixed
  shape so tests assert the daemon's request behaviour without a network);
  Armstrong, J., *Programming Erlang*, Pragmatic Bookshelf, 2007
  (let-it-crash AT the right boundary — `push()`'s try/catch is the
  supervisor seam, returning a failure shape rather than swallowing the
  error inside the function); Martin, R. C., *Clean Architecture*,
  Pearson, 2017 (DI at the edge — the `fetch` seam is constructor-level,
  the only I/O); Basiri et al., "Principles of Chaos Engineering",
  *IEEE Software* 33 (3), 2016 (the README's failure-mode table —
  steady-state hypothesis, blast radius, operator escape hatch, 4 rows);
  rule #2 (vision.md § 2 — every dep behind interface; ntfy.sh is exactly
  that, behind `Notifier`); rule #4 (vision.md § 4 — every exported
  function carries `@otel adapters.notifier.<verb>` JSDoc, with
  `@otel-exempt <reason>` opt-outs on helpers); rule #6 (vision.md § 6 —
  let-it-crash; one `// rule-6: handled-locally —` opt-out at the fetch
  rejection boundary, the supervisor seam); rule #7 (vision.md § 7 —
  failure-mode discipline; the README's chaos table has 4 rows, exceeds
  the brief's ≥3); rule #9 (vision.md § 9 — pre-registered pivot
  threshold, success threshold, measurement command before code);
  rule #10 (vision.md § 10 — deterministic enforcement; the chaos table
  is checked by `scripts/check-rule-7-chaos-coverage.mjs`, the pattern
  index by `scripts/check-pattern-index.mjs`); Munafò et al., "A Manifesto
  for Reproducible Science", *Nature Human Behaviour* 1, 0021, 2017
  (rule-#9 pre-registration — the Strategy-level pivot was declared in
  this file *before* code so a flaky ntfy can't retroactively redefine
  "reliable enough").
replay_windows_days: [90]
