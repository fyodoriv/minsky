id: phase-1-finding-gates
hypothesis: |
  The four findings from the #22-#26 audit (rule-5 over-extraction, rule-5
  pattern-index recognition, vitest-config inconsistency, missing self-grade
  discipline) can each be converted to a deterministic gate or a clean
  delete-redundant-config. Bundled into one PR they ship without the
  shared-file conflict tax that broke the prior batch — the new
  pr-self-grade gate makes the orchestrator-discipline rule (2)
  mechanically unavoidable, not advisory.
success: "rule-5 lint exits 0; allowlist drops from 61 to ~10 entries; pr-self-grade gate fails on a synthetic missing-block PR; CI gate accepts skipped pr-self-grade on push events; 148 tests pass"
pivot: "if the pr-self-grade regex produces ≥3 false positives in its first month (PRs that reasonably skip the block — e.g., dependabot bumps), pivot to a YAML-block convention (fenced ```self-grade YAML``` parsed by a structured parser) or carve out an explicit auto-PR exemption"
measurement: "node scripts/check-rule-5-glossary-discipline.mjs && node scripts/check-pr-self-grade.mjs <(echo 'no block') ; test $? -eq 1 ; pnpm test"
anchor: "rule #9 (Munafò et al. 2017 — pre-registration plus observation closes the loop); rule #10 (Lampson 1983 — move the constraint to the cheapest point); AGENTS.md § Orchestrator discipline"
replay_windows_days: [7, 30, 90]
