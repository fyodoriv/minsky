id: tick-loop-picktask-honors-blocked-field-2026-05-04
hypothesis: |
  The v0 daemon's `pickTask` (`novel/tick-loop/src/daemon.ts`) only
  respects `**Blocked by**: <id>` (the dependency variant). Tasks marked
  `**Blocked**: <reason>` (the external-constraint variant — e.g.,
  `needs-user-approval`) are picked anyway. Pre-flight on 2026-05-04
  surfaced this: with the queue's only entries being `omc-tasksmd-issue`
  (Blocked: needs-user-approval) and dormant P3s, the daemon picked
  `omc-tasksmd-issue` in dry-run and would have spawned `claude --resume`
  to file a public GitHub issue once the safety guard flips. Adding the
  parallel skip rule for `**Blocked**:` in `pickTask` mechanically
  prevents the failure mode that `**Blocked**:` exists to prevent. Closes
  `tick-loop-picktask-honors-blocked-field`.
success: |
  - `pnpm vitest run novel/tick-loop --reporter=json | jq -e '.numPassedTests >= 34 and .numFailedTests == 0'` exits 0
    (one new pickTask test on top of the prior 33 in `novel/tick-loop`).
  - `pnpm typecheck` exits 0.
  - All pre-existing tests pass UNCHANGED.
  - A synthetic queue containing only `**Blocked**: needs-user-approval`
    items resolves to `pickTask(...) === undefined` (the daemon would
    return iteration status `no-task` and not spawn claude).
pivot: |
  Pre-registered: if `pickTask` is split across multiple parsers
  (`TasksMdReader` vs daemon-side filter) such that a single regex change
  cannot cover the failure mode, file a follow-up to centralise the skip
  rule in one parser; ship the immediate fix on the path the daemon
  actually walks. Today (post-PR-#103 daemon flip) `pickTask` in
  `novel/tick-loop/src/daemon.ts` is the sole consumer — `index.ts`
  re-exports symbols but does not duplicate parser logic — so the single
  regex addition is sufficient.
