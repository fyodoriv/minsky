id: daemon-otel-pipe-2026-05-04
hypothesis: |
  Surfaced by the 2026-05-04 standing-audit-gap-loop pass: the daemon's
  `emit` callback in `novel/tick-loop/bin/tick-loop.mjs` writes plain-text
  spans to `process.stdout` instead of forwarding them to the configured
  OTEL backend. OpenObserve is installed and serves `:5080/healthz`
  (post-#110), but the daemon emits zero spans there â€” every
  `tick-loop.iteration` event lives only in the operator's terminal. The
  dashboard's `OpenObserveStrategy` (PR #87) reads PromQL from OpenObserve
  and gets `(stub)` for every metric because the publisher side is
  missing.

  Two changes close the publisher half of the publish-then-read MAPE-K
  loop:
    (a) `Observability` interface grows `emitTickSpan(event)` (rule #2 â€”
        every external dep behind an interface; the OTEL SDK is the dep,
        the interface is the seam). `OtelObservability` implements it via
        `tracer.startSpan(name) â†’ setAttribute â†’ end` synchronously; the
        OTLP exporter ships asynchronously, so the call returns
        immediately. Fire-and-forget per rule #7 graceful-degrade.
    (b) `bin/tick-loop.mjs` constructs `OtelObservability({ endpoint:
        MINSKY_OTEL_ENDPOINT })` when the env var is set; the daemon's
        `emit` callback now writes the stdout line AND forwards the event
        through the adapter. When unset, the seam is `undefined` and only
        the stdout line fires â€” graceful-degrade.
success: |
  - `pnpm vitest run --reporter=json | jq -e '.numPassedTests >= 737 and
    .numFailedTests == 0'` exits 0 (no regressions to the 737 existing
    tests; the new gate path is exercised by the `MINSKY_OTEL_ENDPOINT`
    env in the smoke).
  - `pnpm typecheck` exits 0.
  - Smoke: `MINSKY_TICK_DRY_RUN=1 MINSKY_OTEL_ENDPOINT=http://localhost:5080
    bash distribution/systemd/run-tick-loop.sh --max-iterations=1
    --tick-interval-ms=1000` exits 0 AND prints
    `[tick-loop] OTEL wired (endpoint=http://localhost:5080)` AND does
    NOT throw on the `emitTickSpan` call.
pivot: |
  Two pivot paths pre-registered:
    1. If `OtelObservability`'s span shape doesn't match the daemon's
       `TickSpan` cleanly (different attribute restrictions, async
       semantics that block the loop), pivot to a thin adapter in the
       CLI that maps `TickSpan` â†’ OTEL Span before forwarding. Don't
       touch `@minsky/observability` itself.
    2. If `MINSKY_OTEL_ENDPOINT` is set but OpenObserve is unreachable
       (transport error), the OTEL SDK swallows the failure (graceful-
       degrade per rule #7) and the daemon keeps running with stdout-only
       output. The pivot is "no-op fallback to stdout" which is what
       happens already when `MINSKY_OTEL_ENDPOINT` is unset.
measurement: |
  grep -q 'observability\.emitTickSpan' novel/tick-loop/bin/tick-loop.mjs \
    && grep -q 'emitTickSpan(event: ObservabilityEvent)' novel/adapters/observability/src/otel.ts
anchor: |
  Kephart, J. O., Chess, D. M., "The Vision of Autonomic Computing",
  *IEEE Computer* 36(1), 2003 (MAPE-K â€” the *Monitor* surface must
  publish where the *Analyze* phase reads; this PR closes the publisher
  half).
  Beyer, B., Jones, C., Petoff, J., Murphy, N. R. (eds.), *Site
  Reliability Engineering*, O'Reilly, 2016, Ch. 6 (every emitted metric
  must be read; every read must have a publisher â€” today the publisher
  half is missing).
  Gamma, Helm, Johnson, Vlissides, *Design Patterns*, Addison-Wesley,
  1994 (Adapter â€” `OtelObservability` is the OTEL SDK's adapter; the
  daemon never imports `@opentelemetry/*` directly).
  Surfaced-by: 2026-05-04 standing-audit-gap-loop pass â€” the daemon's
  `emit` callback wrote to `process.stdout` instead of OpenObserve;
  OpenObserve was installed via #110 but received nothing; the
  dashboard's `OpenObserveStrategy` read `(stub)` because the publisher
  side never wired up. This PR closes the publisher half.
timeout_seconds: 60
