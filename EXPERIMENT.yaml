id: experiment-tracker-v0
hypothesis: |
  A scheduled job that re-runs each merged experiment's `measurement` at the
  configured `replay_windows_days` (default `[7, 30]`), compares against the
  declared `success` / `pivot` thresholds, and emits a verdict (validated /
  regressed / inconclusive) closes the weekly–monthly layer of rule #9.
  Within 90 days of landing, ≥1 experiment carries a non-`inconclusive`
  verdict against a real recorded measurement, proving the substrate works
  on production data not just synthetic fixtures.
success: "pnpm typecheck && pnpm vitest run scripts/replay-experiment.test.mjs exits 0 with ≥4 verdict cases (validated / regressed / inconclusive / idempotent re-run); the workflow YAML is parseable by GitHub Actions; ≥1 non-inconclusive verdict accrues within 90 days post-landing"
pivot: "if 90 days post-landing every replay verdict is `inconclusive` (signal-to-noise too low at 7d/30d), shorten the windows AND raise pre-declared success margins, OR gate eligibility by tag — pivot to declaration-only with quarterly batch review at 180 days if still all-inconclusive"
measurement: "pnpm typecheck && pnpm vitest run scripts/replay-experiment.test.mjs"
anchor: "rule #9 (vision.md § 9 — pre-registered hypothesis-driven development; weekly–monthly layer); Ries 2011 (build-measure-learn; sustained-gain discipline); Kohavi/Tang/Xu 2020 ch. 5–7 (trustworthy over fast; mid-term regressions); Kephart & Chess 2003 (MAPE-K Analyze phase scoped to rule #9)"
replay_windows_days: [7, 30]
