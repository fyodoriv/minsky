id: mape-k-prompt-optimizer-adapter
hypothesis: |
  Shipping `@minsky/prompt-optimizer` as a new novel adapter package
  under `novel/adapters/prompt-optimizer/` — exposing a `PromptOptimizer`
  interface (Adapter + Strategy per Gamma 1994), a `StubPromptOptimizer`
  fake (Meszaros 2007), and an `AnthropicPromptOptimizer` Strategy
  backed by `@anthropic-ai/sdk` with `cache_control` on the system
  prefix per ARCHITECTURE.md § "Token economy" — unblocks MAPE-K
  sub-tasks 2 / 3 / 4 (Monitor + Analyze, Plan + Execute, Knowledge +
  integration) and confirms `research.md` § "DSPy fit"'s
  fallback-interface shape is implementable in TypeScript without a
  Python sidecar. The two-method shape (`runABTest`, `structured`)
  covers the five canonical use cases listed in that section without
  any vendor mention in the interface, satisfying rule #2 (every dep
  behind an adapter). The interface is the DSPy fallback the research
  note pre-registered; this PR is the implementation step.
success: "≥8 tests pass against the new package (`pnpm vitest run novel/adapters/prompt-optimizer/` exits 0 with ≥8 cases); the package builds (`pnpm typecheck` exits 0 across the workspace); `AnthropicPromptOptimizer.selfTest()` returns `yellow` (graceful-degrade per rule #7) when no `ANTHROPIC_API_KEY` is set and no client is injected — verified by the `returns yellow when no API key is set` test case; rule-N CI lints (rule-1 / rule-2 / rule-3 / rule-4 / rule-6 / rule-7 / pattern-index) all pass on this PR's diff."
pivot: "If the Anthropic SDK shape doesn't fit the `runABTest` signature cleanly — i.e., `messages.create`'s request / response contract diverges materially from the `MessagesClient` interface declared in `anthropic.ts` (e.g., the SDK migrates to a streaming-only or tool-use-only call shape that cannot be inverted to the simple text-in / text-out contract `runABTest` consumes) — revisit `research.md` § \"DSPy fit\"'s fallback-interface specification, file an amendment that names the divergence concretely, and gate sub-task 3 (Plan + Execute) on the revised shape. Lower-bound trip: if implementing the strategy required >50 lines of impedance-matching code (counted in `anthropic.ts` excluding the public-API surface), the `MessagesClient` shape is wrong and the interface needs a redesign before sub-task 3."
measurement: "pnpm typecheck && pnpm vitest run novel/adapters/prompt-optimizer/ --reporter=json | jq '.numPassedTests' | grep -qE '^[0-9]+$' && [ \"$(pnpm vitest run novel/adapters/prompt-optimizer/ --reporter=json 2>/dev/null | jq '.numPassedTests')\" -ge 8 ]"
anchor: "Khattab et al., \"DSPy: Compiling Declarative Language Model Calls into Self-Improving Pipelines\", *ICLR* 2024 (the rejected baseline whose optimizer-shape lessons survive in the interface); Gamma, Helm, Johnson, Vlissides, *Design Patterns*, Addison-Wesley, 1994 (Adapter + Strategy); Kohavi, Tang, Xu, *Trustworthy Online Controlled Experiments*, Cambridge UP 2020, Ch. 3 (sustained-gain window operationalised by `ABResult.sustainedGainAt7d`); Meszaros, *xUnit Test Patterns*, Addison-Wesley, 2007 (`StubPromptOptimizer` as a fake with the contract-test discipline); `research.md` § \"DSPy fit\" (the pre-registered fallback shape this PR ships); rule #2 (`vision.md` § 2 — every dep behind an interface; the adapter IS the wrapping for `@anthropic-ai/sdk`)."
replay_windows_days: [7, 30]
