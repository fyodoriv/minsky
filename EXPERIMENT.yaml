anchor: |
  Wirfs-Brock, R., McKean, A., *Object Design: Roles, Responsibilities,
  and Collaborations*, Addison-Wesley, 2003 (the Strategy boundary; the
  spawn step is now bound to a Strategy whose two implementations swap
  in without touching `runDaemon`); Gamma, Helm, Johnson, Vlissides,
  *Design Patterns*, Addison-Wesley, 1994 (Strategy pattern; Adapter for
  the structural shape); Armstrong, J., *Programming Erlang*, Pragmatic
  Bookshelf, 2007 (let-it-crash AT the right boundary — the
  `ProcessSpawnStrategy` returns failure shapes via non-zero `exitCode`
  rather than throwing; the daemon's supervisor `Restart=on-failure` is
  the respawn unit, not the Strategy); rule #2 (vision.md § 2 — every
  dep behind interface; the spawn step is now seam'd, sub-task 2 will
  do the same for budget-guard); Munafò et al., "A Manifesto for
  Reproducible Science", *Nature Human Behaviour* 1, 0021, 2017 (rule-#9
  pre-registration — the production-stays-dry-run invariant is committed
  before the change, and the Pivot to temp-file-based handoff is
  pre-registered in the parent task).
