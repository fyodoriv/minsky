id: readme-global-install-claim-fix-2026-05-04
hypothesis: |
  The current README's "What this is *not*" section + Quickstart frames
  Minsky as if `./setup.sh` installs a `minsky` binary on `PATH` (the
  reasonable expectation a first-time user has from "install"). It does
  not — `setup.sh` installs three globals (`tasks`, `tasks-lint`,
  `tasks-mcp` from the tasks.md toolchain) and bootstraps
  `.minsky/state.json` repo-locally. A first-time-install user surfaced
  the gap on 2026-05-04 by typing `minsky --version` after `./setup.sh`
  and getting `command not found` — reasonably concluding the install
  failed. Adding one bullet to "What this is *not*" — "Not a global CLI.
  Minsky is a **repo-rooted stack**, not a single binary on your PATH" —
  closes the expectation gap without any code change. The fix is purely
  the framing of "install": signifier (Norman 1988) → affordance
  (the actual repo-rooted stack).
success: |
  - `grep -E "(repo-rooted stack|not a global CLI)" README.md` exits 0
    with at least one match (the disambiguation bullet).
  - `command -v tasks` AND `command -v tasks-lint` AND
    `command -v tasks-mcp` all exit 0 (the three globals `setup.sh`
    actually installs — the bullet's claim is true).
  - `./setup.sh --doctor` still exits 0 GREEN (the docs change doesn't
    break the self-test).
pivot: |
  If the disambiguation bullet gets reverted in a future docs-rewrite
  (it's short enough to lose in a wholesale rewrite), promote the
  disambiguation to a deterministic CI lint that fails when README.md
  adds the literal token "install minsky globally" without an adjacent
  "not a global CLI" paragraph (≤30 LoC linter — a one-time docs gate
  is cheaper than a recurring expectation gap).
measurement: |
  grep -qE "(repo-rooted stack|not a global CLI)" README.md
anchor: |
  Norman, D. A., *The Design of Everyday Things*, Basic Books, 1988
  (signifiers — the README is the affordance; "install" is a strong
  signifier of a CLI binary, so the docs need to disambiguate when
  there isn't one).
  Rule #1 (vision.md § 1 — don't reinvent the wheel; we don't ship a
  CLI, so the docs shouldn't claim one).
  Surfaced-by: 2026-05-04 fresh install — operator typed
  `minsky --version` after `./setup.sh`, got `command not found`,
  reasonably concluded the install failed.
timeout_seconds: 30
