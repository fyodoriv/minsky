id: scripts-ts-check-migration
hypothesis: |
  Adding `// @ts-check` + JSDoc types to each remaining `scripts/*.mjs`
  rule-enforcer (rule-1, rule-2, rule-5, rule-7, pr-self-grade) brings
  them under strict tsc enforcement (strict + noUncheckedIndexedAccess
  + exactOptionalPropertyTypes), so that the linters that enforce the
  constitutional rules are themselves type-checked at PR time. Once all
  scripts pass, flipping `scripts/tsconfig.json` from `checkJs: false`
  to `checkJs: true` and dropping the per-file `// @ts-check` directives
  catches type errors at PR time across all 7 `.mjs` scripts uniformly,
  hardening rule enforcement (rule #10 stability — "if rules checkers
  aren't stable then rules aren't stable as well").
success: "pnpm typecheck exits 0 with `checkJs: true` globally and zero `// @ts-check` directives across `scripts/*.mjs`; pnpm test exits 0 (231 tests pass); pnpm lint exits 0; npx @tasks-md/lint TASKS.md exits 0; `grep -c '// @ts-check' scripts/*.mjs` returns 0; `grep -c '\"checkJs\": true' scripts/tsconfig.json` returns 1"
pivot: "if any one script genuinely cannot pass strict typing in <30 minutes of typing work (e.g., heavy reliance on dynamic shapes that fight noUncheckedIndexedAccess), file a follow-up `scripts-ts-check-${name}-revert` task and revert that script's `// @ts-check` directive only — leave the global `checkJs: true` flip in place. Don't lower the strictness floor, don't fall back to `@ts-ignore`."
measurement: "pnpm typecheck && pnpm test && pnpm lint && grep -c '// @ts-check' scripts/*.mjs"
anchor: "rule #10 (deterministic enforcement — the linters that enforce constitutional rules must themselves be type-checked, otherwise the rules they enforce are only as stable as the linter's runtime behaviour); Microsoft TypeScript handbook on `// @ts-check` (the canonical incremental-strictness pattern)"
replay_windows_days: [7, 30]
