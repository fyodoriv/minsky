id: 4-dormant-ci-lints-tick-mape-k-cadence
hypothesis: |
  ARCHITECTURE.md L215 (`5s → 30s → 5min` tick-loop backoff), L218 (12 h
  MAPE-K watchdog cadence + 1000-tick backstop), and research.md L92 (8 %
  MAPE-K cadence-pivot threshold) carry prose-only numeric constants
  whose drift currently surfaces only via human re-reading. Filing 4
  dormant CI lints — same shape as PR #59
  (`ci-lint-mape-k-token-budget-cap`) and PR #60
  (`ci-lint-mape-k-constraints-md-size`) — extends rule-#10 ratchet
  coverage to this prose-anchor class. Each lint exits 0 today (configs
  missing — dormant by rule #7 graceful degrade) and activates the
  moment its `config/<file>.json` artifact lands.
success: |
  ≥16 tests pass (numPassedTests ≥ 16) and 0 tests fail across the 4
  paired test files; `pnpm exec vitest run
  scripts/check-tick-loop-backoff-schedule.test.mjs
  scripts/check-mape-k-tick-iteration-backstop.test.mjs
  scripts/check-mape-k-watchdog-cadence.test.mjs
  scripts/check-cadence-pivot-threshold.test.mjs --reporter=json
  | jq -e '.numPassedTests >= 16 and .numFailedTests == 0'`
  exits 0; all 4 lint CLIs exit 0 against the current state (configs
  missing — dormant); all 4 lints wired into `.github/workflows/ci.yml`
  as separate jobs and into the `ci` gate's `needs:` + bash gate-loop.
pivot: |
  If any of the 4 prose anchors moves before its corresponding config
  artifact lands (e.g., the `5s → 30s → 5min` ladder is replaced by
  exponential backoff, or the 12 h watchdog cadence is replaced by an
  adaptive formula after `mape-k-loop`'s monthly self-calibration
  extends T to 18 h per ARCHITECTURE L218, or the 8 % cadence-pivot
  threshold is replaced by a different overshoot envelope in
  research.md), retire that specific lint and write a new one against
  the replacement anchor — exactly the per-lint Pivot clause each
  script header carries. The retire-the-lint shape is fork-with-
  reissue per Helland 2007 (immutable log — derived data through
  reissue, not mutation), the same precedent established by
  `check-skill-rule-cap.mjs`'s retired-Skill terminal state.
measurement: |
  pnpm exec vitest run scripts/check-tick-loop-backoff-schedule.test.mjs scripts/check-mape-k-tick-iteration-backstop.test.mjs scripts/check-mape-k-watchdog-cadence.test.mjs scripts/check-cadence-pivot-threshold.test.mjs --reporter=json | jq -e '.numPassedTests >= 16 and .numFailedTests == 0'
anchor: |
  rule #10 (vision.md § 10 — deterministic enforcement; ratchet rule:
  every prose-only invariant in ARCHITECTURE.md / vision.md /
  research.md gets a deterministic linter as soon as the artefact it
  guards becomes machine-readable); ARCHITECTURE.md L215 (tick-loop
  backoff prose anchor); ARCHITECTURE.md L218 (1000-tick backstop +
  12 h watchdog prose anchors); research.md L92 (8 % cadence-pivot
  threshold prose anchor); Beyer, Jones, Petoff, Murphy (eds.), *Site
  Reliability Engineering*, O'Reilly 2016, Ch. 3 (error-budget
  enforcement — exceed-the-budget triggers a mechanical response, not
  a discussion); Armstrong, *Programming Erlang*, Pragmatic Bookshelf
  2007 (let-it-crash + supervised restart with backoff); Liu,
  *Real-Time Systems*, Prentice Hall 2000, § 6.4 (activity-coupled
  sampling bound); Ries, *The Lean Startup*, Crown Business 2011
  (pivot-or-persevere — pivot threshold as the falsifiable
  abandon-the-approach line).
replay_windows_days: [7, 30]
