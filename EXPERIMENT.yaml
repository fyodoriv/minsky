id: experiment-tracker-knowledge-ingestion-2026-05-03
hypothesis: |
  Wiring `.github/workflows/experiment-tracker.yml` (the weekly/monthly cron
  shipped in PR #38) to invoke `node novel/mape-k-loop/bin/mape-k-orchestrator.mjs
  --ingest-mode --experiment-store=experiment-store --tmp-dir=tmp` after the
  replay step, then opening a DRAFT pull request via `peter-evans/create-pull-request@v6`
  for any orchestrator-side writes (`novel/mape-k-loop/constraints.md` append +
  `tmp/proposed-rule-9-amendment.md` on calibration drift), closes the rule-#9
  quarterly automation loop without changing the orchestrator's contract or
  auto-merging any rule-#9 amendments. The orchestrator's `--ingest-mode` was
  already shipped in PR #90; this PR is the WIRING — connecting the workflow's
  verdict output to the orchestrator's ingest input. Drafts NEVER auto-merge —
  the operator review gate is the load-bearing safety property (Beyer SRE 2016
  Ch. 17 — operator escape hatch).
success: |
  - `pnpm typecheck` exits 0.
  - `pnpm vitest run novel/mape-k-loop/src/orchestrator.test.ts --reporter=json | jq -e '.numPassedTests >= 6 and .numFailedTests == 0'` exits 0 (today: 8 cases pass — the 6 shipped in PR #90 plus 2 new workflow-shaped fixtures: one for the calibration-drift positive path that produces a research-amendment proposal, one for the well-calibrated CI-quiet path that suppresses it).
  - `pnpm test` and `pnpm lint` both exit 0.
  - The 14+ deterministic linters all pass with `--diff-base=origin/main`.
  - `experiment-tracker-knowledge-ingestion` task block removed from TASKS.md in this PR.
  - `.github/workflows/experiment-tracker.yml` carries the `mape-k orchestrator (Knowledge phase)` step + the draft-PR step; permissions widened from `pull-requests: read` → `pull-requests: write` so `peter-evans/create-pull-request@v6` can open draft PRs.
pivot: |
  If the calibration-drift heuristic produces ≥3 false-positive amendment
  PRs in the first month after merge, raise the
  `DEFAULT_CALIBRATION_DRIFT_THRESHOLD` from 0.5 → 0.7 in
  `novel/mape-k-loop/src/knowledge.ts` (single-constant pivot, fully
  reversible) OR drop the draft-PR step entirely from this workflow and
  let the orchestrator emit only a logged proposal under `tmp/`. Both are
  reversible and pre-registered here (Munafò et al. 2017).
measurement: |
  pnpm install --no-frozen-lockfile \
    && pnpm typecheck \
    && pnpm vitest run novel/mape-k-loop/src/orchestrator.test.ts --reporter=json \
       | jq -e '.numPassedTests >= 6 and .numFailedTests == 0' \
    && pnpm test \
    && pnpm lint \
    && node scripts/check-rule-1-novel-justification.mjs --diff-base=origin/main \
    && node scripts/check-rule-2-dep-coverage.mjs --diff-base=origin/main \
    && node scripts/check-rule-3-doc-first.mjs --diff-base=origin/main \
    && node scripts/check-rule-4-otel-coverage.mjs --diff-base=origin/main \
    && node scripts/check-rule-5-glossary-discipline.mjs --diff-base=origin/main \
    && node scripts/check-rule-6-let-it-crash.mjs --diff-base=origin/main \
    && node scripts/check-rule-7-chaos-coverage.mjs \
    && node scripts/check-pattern-index.mjs --diff-base=origin/main \
    && node scripts/check-anchor-primary-source.mjs --diff-base=origin/main \
    && node scripts/check-cadence-pivot-threshold.mjs --diff-base=origin/main \
    && node scripts/check-pivot-success-margin.mjs --diff-base=origin/main \
    && node scripts/check-measurement-inspects-output.mjs --diff-base=origin/main \
    && node scripts/check-mape-k-budget-cap.mjs --diff-base=origin/main \
