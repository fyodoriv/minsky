id: supervisor-integration-tests
hypothesis: |
  Shipping a portable test driver (`distribution/test-supervisor.sh`) plus
  two CI matrix jobs (`linux-supervisor-integration` /
  `macos-supervisor-integration`) wired into the `ci` aggregator gate
  closes the "Integration test (deferred)" clause in
  `distribution/README.md` by exercising rows 1ŌĆō4 of the failure-mode
  table empirically against real systemd / launchd primitives, rather
  than by inspection. The driver renders the templates with `envsubst`,
  drops them into the user-level supervisor, SIGKILLs `minsky-tick-loop`,
  and asserts respawn within 10 s; cleanup is unconditional. If the
  Linux user-systemd plumbing in GH-hosted Ubuntu runners is unworkable
  (no user-bus reachable even under `dbus-run-session`), the driver
  exits 77 and the gate accepts the skip; the `linux-supervisor-integration`
  job consistently landing as `failure` (not `success` / `skipped`)
  triggers the documented Pivot to a self-hosted runner.
success: "All five artefacts ship in this PR ŌĆö `distribution/test-supervisor.sh` (executable), `linux-supervisor-integration` job, `macos-supervisor-integration` job, both wired into the `ci` aggregator's `needs:`, and the row in `vision.md` ┬¦ Pattern conformance index ŌĆö AND `distribution/lint-units.sh` continues to pass on every PR. The driver's row-1 assertion (SIGKILL respawn within 10 s) is what the merged jobs verify on every PR."
pivot: "If `linux-supervisor-integration` lands as `failure` (not `success` / `skipped`) on this PR or on the next 2 PRs, set the Linux job to `if: false`, file `supervisor-integration-self-hosted-runner` (already in TASKS.md as a dormant scout entry), and rely on `distribution/lint-units.sh` plus the macOS integration job alone until the self-hosted runner ships. The escape clause is committed in `distribution/README.md` ┬¦ Integration test so the Pivot is operational, not aspirational."
measurement: "test -x distribution/test-supervisor.sh && grep -q 'linux-supervisor-integration:' .github/workflows/ci.yml && grep -q 'macos-supervisor-integration:' .github/workflows/ci.yml && grep -q 'linux-supervisor-integration' .github/workflows/ci.yml && bash distribution/lint-units.sh >/dev/null"
anchor: "Forsgren, Humble, Kim, *Accelerate*, 2018 (test reliability as a DORA prerequisite ŌĆö a CI gate that doesn't run reliably teaches the team to ignore failure); Armstrong, *Programming Erlang*, 2007 (OTP supervision tree ŌĆö the pattern under empirical test); Basiri et al., \"Principles of Chaos Engineering\", *IEEE Software*, 2016 (controlled-fault chaos test methodology); rule #7 (failure-mode discipline)."
replay_windows_days: [7, 30]
