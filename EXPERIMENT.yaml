id: markdownlint-nested-node-modules
hypothesis: |
  Replacing `#node_modules` with `#**/node_modules` in the `lint:md` script
  (and the matching markdownlint invocation in `.github/workflows/ci.yml`)
  ignores both top-level and workspace-nested `node_modules/`, taking the
  markdownlint error count from N (currently ≥2 from vendored READMEs in
  `novel/adapters/observability/node_modules/@opentelemetry/semantic-conventions`)
  to 0 without silencing any in-tree docs. Anchor: rule #2 (every external
  dep behind interface — vendor README content is not ours to lint);
  markdownlint-cli2 docs (glob ignore semantics).
success: "`pnpm lint:md` exits 0 on a clean `pnpm install` checkout; CI's markdownlint job stops failing on third-party READMEs; total .md files linted decreases by exactly the count of nested-`node_modules` README files (no in-tree docs silenced)"
pivot: "if `**/node_modules` glob is honored differently across markdownlint-cli2 versions, pin the version (covered by `ci-pin-tooling-versions`) and codify the working glob in a comment"
measurement: "pnpm lint:md exits 0; `markdownlint-cli2 ... | grep -E '^Linting: [0-9]+ file' | awk '{print $2}'` shows the same in-tree count as before (no false-negatives), Summary line reads `0 error(s)`"
anchor: "rule #2 (every external dep behind interface); markdownlint-cli2 docs (glob ignore semantics)"
