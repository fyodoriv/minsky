id: first-integration-test-coverage-manifest-2026-05-04
hypothesis: |
  A coverage manifest test mapping user-story 001's 12 chaos-table rows to
  existing repo tests achieves the parent `first-integration-test` task's
  Acceptance ("≥80 % coverage of failure-mode rows declared in the
  user-story file") via the documented Pivot path — both `covered` (existing
  repo test) and `self-hosted` (deferred to nightly self-hosted runner,
  sub-task 3) statuses count toward the threshold. Inventory test runs
  in <1 s on any CI runner; no OS-level fault injection.
success: |
  4 vitest test cases pass; `COVERAGE_MANIFEST.length === 12`;
  `(covered + self-hosted) / 12 >= 0.80` (today the ratio is 11/12 = 0.917);
  2 sub-tasks (`first-integration-test-mock-tick-loop`,
  `first-integration-test-nightly-self-hosted`) queued in TASKS.md with full
  rule-#9 fields. Concretely: `pnpm vitest run user-stories/001-coverage-manifest.test.ts --reporter=json | jq -e '.numPassedTests >= 4 and .numFailedTests == 0'` exits 0.
pivot: |
  If <80 % of rows can be inventoried as covered+self-hosted (i.e., genuinely
  uncovered with no OS-level deferral path), the user-story 001 spec is
  over-broad and the *story* needs splitting — not the manifest reframed.
  Numerically: ratio < 0.50 over the 12 rows fires the spec-split pivot;
  0.50 ≤ ratio < 0.80 fires a milder pivot (file additional `ci-lint-*` or
  smoke-test sub-tasks to cover the gap before re-asserting Acceptance).
measurement: |
  pnpm typecheck \
    && pnpm vitest run user-stories/001-coverage-manifest.test.ts --reporter=json \
       | jq -e '.numPassedTests >= 4 and .numFailedTests == 0' \
    && pnpm lint \
    && npx -y @tasks-md/lint@^0.7.0 TASKS.md \
    && pnpm exec markdownlint-cli2 "**/*.md" "#**/node_modules" "#.minsky" "#.obsidian" "#.claude" \
    && grep -c '\*\*ID\*\*: first-integration-test-mock-tick-loop' TASKS.md \
    && grep -c '\*\*ID\*\*: first-integration-test-nightly-self-hosted' TASKS.md
anchor: |
  Basiri, A., Blohowiak, A., Hosseini, L., et al., "Principles of Chaos
  Engineering", *IEEE Software* 33 (3), 2016 (steady-state hypothesis —
  coverage of declared failure modes is the precondition for fault-injection
  itself; an uncovered row is a steady-state assumption that hasn't been
  verified); Beck, K., *Extreme Programming Explained*, Addison-Wesley,
  1999, Ch. 17 (CI as the constraint enforcer — the manifest's existence
  is mechanically asserted on every PR, not honour-system); rule #7
  (vision.md § 7 — failure-mode discipline); rule #10 (vision.md § 10 —
  deterministic enforcement; the manifest is a vitest assertion suite,
  not prose); Munafò et al., "A Manifesto for Reproducible Science",
  *Nature Human Behaviour* 1, 0021, 2017 (rule-#9 pre-registration —
  the parent task's documented Pivot ("reframe as a pair: 10-min smoke
  in CI + nightly self-hosted") is what justifies counting `self-hosted`
  toward the ≥80 % Acceptance, not a post-hoc reframing).
replay_windows_days: [90]
