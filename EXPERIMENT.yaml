id: dashboard-web-otel-wiring
hypothesis: |
  Adding an optional synchronous Strategy seam `getValue?: (m:
  SuccessMetric) => string | null` to `createServer` / `render` (default
  `() => null`) reduces the count of `(stub)` tokens in the rendered
  HTML from 10 to 0 when a live Strategy is wired, while the no-arg
  default still renders 10 `(stub)` tokens (backward-compatible). Per
  rule #2 the value source is data passed in, not a hard import; per
  rule #7 the renderer HTML-escapes Strategy output (XSS guard) and
  falls back to `(stub)` on a `null` return (graceful-degrade, explicit
  not silent). Async I/O is moved off the per-render hot-path: the
  runner pre-fetches a JSON snapshot
  (`DASHBOARD_METRICS_SNAPSHOT`) and `start.ts` constructs
  `snapshotGetValue` once at boot, so the per-render path stays
  synchronous and within the parent task's 500-ms budget without any
  per-request fan-out. Property name is `getValue` (not `valueOf`)
  deliberately — `valueOf` is inherited from `Object.prototype`, so
  `args.valueOf ?? defaultFn` would silently pick up
  `Object.prototype.valueOf` and crash with "Cannot convert undefined or
  null to object" at call time; the rename costs four characters and
  avoids a class of latent bug.
success: |
  `pnpm typecheck && pnpm vitest run novel/dashboard-web/
  --reporter=json | jq -e '.numPassedTests >= 9 and .numFailedTests
  == 0'` exits 0 (today: 25 tests pass, 0 fail across `render`,
  `metrics`, `server`, `strategy`); the new "live values replace
  `(stub)` when Strategy returns strings" test renders 0 `(stub)`
  tokens and 10 `>42<` value-cells; the default-Strategy path still
  renders exactly 10 `(stub)` tokens (backward-compat regression
  guard); the HTML-escape test ensures Strategy output cannot inject
  `<script>`; the partial-Strategy test renders 1 live value + 9
  `(stub)` tokens (mixed fallback); `wc -l
  novel/dashboard-web/src/*.ts | tail -1 | awk '{print $1}'` ≤ 300
  (today: 297); the `dashboard-web-otel-wiring` task block is removed
  from `TASKS.md` (`grep -c '^  - \\*\\*ID\\*\\*:
  dashboard-web-otel-wiring$' TASKS.md` returns 0).
pivot: |
  If a per-metric Strategy at request time exceeds 500 ms on >5 % of
  requests over 24 h sustained operation, pivot to a server-side cache
  snapshot refreshed once per minute — the dashboard becomes a
  read-through over a refreshed snapshot rather than a per-request
  fan-out. Quantitative trigger: `histogram_quantile(0.95,
  dashboard_render_duration_seconds_bucket[24h]) > 0.5` for >5 % of
  requests. If the Strategy shape needs ≥3 distinct backends
  (Prometheus + journalctl + GH API), keep it as a Strategy but add a
  per-row dispatch table; do not collapse into a single backend client.
measurement: |
  pnpm typecheck && pnpm vitest run novel/dashboard-web/
  --reporter=json | jq -e '.numPassedTests >= 9 and .numFailedTests
  == 0'; [ "$(wc -l novel/dashboard-web/src/*.ts | tail -1 | awk
  '{print $1}')" -le 300 ]; [ "$(grep -c '^  - \\*\\*ID\\*\\*:
  dashboard-web-otel-wiring$' TASKS.md)" = '0' ]
anchor: |
  rule #2 (vision.md § 2 — every dep behind interface; the value
  source is a Strategy parameter, not a hard dependency on
  Prometheus/OpenObserve); Wilkie, "RED Method", *Weave Works blog* /
  *USENIX SREcon EMEA* 2018 (rate / errors / duration as the
  service-level lens — live values surface the duration/rate
  components); Card, Mackinlay, Shneiderman, *Readings in Information
  Visualization*, Morgan Kaufmann, 1999 (live readings are the
  dashboard's purpose; placeholder is a transitional state); rule #7
  (vision.md § 7 — graceful-degrade: Strategy returning `null` falls
  back to `(stub)` rather than crashing; HTML-escape guards against a
  hostile backend).
replay_windows_days: [7, 30]
