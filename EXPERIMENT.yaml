anchor: |
  Beyer, B., Jones, C., Petoff, J., Murphy, N. R., *Site Reliability
  Engineering*, O'Reilly, 2016, Ch. 17 (operator escape hatches — the
  `**Blocked**:` field IS the operator's escape hatch from autonomous
  pickup; honoring it is the difference between safe automation and a
  runaway loop). Vision.md rule #2 (the `**Blocked**:` field is the
  documented safety surface for blocked-by-default actions per the
  `/next-task` skill — the daemon was the lagging implementation).
  Munafò et al., "A Manifesto for Reproducible Science", *Nature Human
  Behaviour* 1, 0021, 2017 (rule-#9 pre-registration — this experiment
  block was committed before the fix landed, so the success/pivot
  thresholds are not retrofitted). Risk + mitigation: a too-broad regex
  could match unrelated lines (e.g., `**Blocked by**:` overlaps the
  string "Blocked"); the chosen pattern `\*\*Blocked\*\*:` requires the
  closing asterisks before the colon, which `**Blocked by**:` does not
  satisfy, so the two skip rules are disjoint.
replay_windows_days: [7, 30, 90]
