id: phase-2-rule-3-and-script-stability
hypothesis: |
  Adding rule-#3 as a deterministic gate (doc-first enforcement on every
  PR diff) plus opt-in `// @ts-check` strict typing on the rule-3 source
  brings the script's failure mode under static-type enforcement: the
  linter that enforces a constitutional rule is itself type-checked.
  An incremental migration path (file-by-file `// @ts-check`, flip global
  switch when all six scripts opt in) avoids the 131-error cliff that
  flipping `checkJs: true` globally would produce.
success: "rule-3 lint passes against this PR; rule-3 task block removed; tsconfig allows opt-in checking; rule-3 source + test both pass strict tsc; 19 tests for rule-3 logic; 167 total tests green"
pivot: "if the per-file `// @ts-check` directives drift (some scripts opt out and stay opted out for ≥30 days), the incremental approach has stalled — flip `checkJs: true` globally and absorb the migration cost as a single big PR (rule #10's ratchet rule applied)"
measurement: "pnpm typecheck && pnpm test && node scripts/check-rule-3-doc-first.mjs"
anchor: "rule #3 (test/metric/doc-first); rule #10 (deterministic enforcement); Knuth 1984 (literate programming); Beck 1999 (CI as constraint enforcer); Microsoft TypeScript handbook on `// @ts-check`"
replay_windows_days: [7, 30]
