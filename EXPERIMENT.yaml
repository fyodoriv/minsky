anchor: |
  Beyer, B., Jones, C., Petoff, J., Murphy, N. R. (eds.), *Site Reliability
  Engineering*, O'Reilly, 2016, Ch. 3 (error-budget gating with a real
  monitor — burn-rate alerting against a token budget is the canonical
  application of SRE error-budget thresholding to a non-availability
  signal); Gamma, Helm, Johnson, Vlissides, *Design Patterns*,
  Addison-Wesley, 1994 (Adapter — the facade adapts the real
  `BudgetGuard.tick()` surface to the daemon's `BudgetGuardLike.decide()`
  surface without coupling either side to the other's evolution); Munafò
  et al., "A Manifesto for Reproducible Science", *Nature Human Behaviour*
  1, 0021, 2017 (rule-#9 pre-registration — the Pivot to a facade was
  declared in the task block *before* the real `BudgetGuard`'s public
  surface was inspected, so the swap is not post-hoc); rule #2 (vision.md
  § 2 — every dep behind interface; the daemon depends on `BudgetGuardLike`,
  the facade is the one-line bridge to `@minsky/budget-guard`); Armstrong,
  J., *Programming Erlang*, Pragmatic Bookshelf, 2007 (let-it-crash AT the
  right boundary — the facade does not catch; if `monitor.snapshot()`
  rejects, the rejection bubbles to the daemon's per-iteration boundary
  and onto the supervisor's `Restart=on-failure` policy).
