id: mape-k-prompt-rollout-orchestrator-2026-05-03
hypothesis: |
  Adding `novel/mape-k-loop/src/orchestrator.ts` (pure orchestrator above
  `tick(...)` that emits a `RolloutDraft` shape: `{variantId, branchSlug,
  experimentYaml}`) + the CLI `novel/mape-k-loop/bin/mape-k-orchestrator.mjs`
  (reads `experiment-store/*.jsonl` + `constraints.md` tail + `.claude/skills/*/SKILL.md`,
  writes results to disk, NEVER auto-merges) + the daemon-integration seam
  (optional `mapeKOrchestratorIntervalTicks` parameter on `runDaemon`) closes
  the rule-#9 self-improvement-velocity loop without auto-merging anything.
  The orchestrator wraps the existing `tick(...)` cycle (PR #58 — sub-task 4
  of mape-k-loop-v0) and produces the operator-actionable surfaces a human
  reviewer needs (a draft branch + a draft EXPERIMENT.yaml + the
  constraints.md append + the conditional research.md amendment).
  The injected `PromptOptimizer` Strategy is the seam (rule #2) — tests use
  `StubPromptOptimizer`; production uses `AnthropicPromptOptimizer` (PR #58
  row 53). Drafts NEVER auto-merge — the operator review gate is the
  load-bearing safety property (Beyer SRE 2016 Ch. 17).
success: |
  - `pnpm typecheck` exits 0.
  - `pnpm vitest run novel/mape-k-loop/src/orchestrator.test.ts --reporter=json | jq -e '.numPassedTests >= 4 and .numFailedTests == 0'` exits 0 (today: 6 cases pass — happy-path rollout draft, oscillation guard suppression, sustained-gain failure abstention, no-op cold-start, --ingest-mode skip-rollout, --max-rollouts=0 cap).
  - The CLI `node novel/mape-k-loop/bin/mape-k-orchestrator.mjs --dry-run --experiment-store=<synthetic-dir>` exits 0 against a synthetic verdict store and prints the rollout state.
  - Draft-rollout shape recorded: `RolloutDraft.experimentYaml` includes top-level `id` / `hypothesis` / `success` / `pivot` / `measurement` / `anchor` / `replay_windows_days` keys; the predicted gain (mean A/B score) is rendered at 4-decimal precision.
  - The `mape-k-prompt-rollout-orchestrator` task block is removed from TASKS.md in this PR; the `experiment-tracker-knowledge-ingestion`'s `Blocked by` field is removed (this task was its only blocker).
  - vision.md row 69 added pointing at `novel/mape-k-loop/src/orchestrator.ts` + `.test.ts` + `bin/mape-k-orchestrator.mjs` with `full` conformance.
pivot: |
  If 90 days of orchestrator runs produce zero rollouts (the gain threshold
  is unreachable in practice), drop the sustained-gain check from 7 d → 3 d
  OR widen the variant catalogue past v0's 3 mutations
  (`enumerate-failure-modes`, `direct-answer`, `tighten-scope`). Both pivots
  are reversible — the sustained-gain window is a single
  `DEFAULT_WINDOW_DAYS` constant in `novel/mape-k-loop/src/sustained-gain.ts`,
  and the catalogue is the `MUTATIONS` array in `novel/mape-k-loop/src/plan.ts`.
  If THAT still produces zero rollouts after another 90 d, the orchestrator
  itself is wrong — escalate to the rule-#9 quarterly review and reconsider
  the MAPE-K Plan + Execute primitives (rule-#9 itself is the meta-pivot).
measurement: |
  pnpm install --no-frozen-lockfile \
    && pnpm typecheck \
    && pnpm vitest run novel/mape-k-loop/src/orchestrator.test.ts --reporter=json \
       | jq -e '.numPassedTests >= 4 and .numFailedTests == 0' \
    && pnpm test \
    && pnpm lint \
    && node scripts/check-rule-4-otel-coverage.mjs --diff-base=origin/main \
    && node scripts/check-rule-6-let-it-crash.mjs --diff-base=origin/main \
    && node scripts/check-rule-7-chaos-coverage.mjs \
    && node scripts/check-pattern-index.mjs --diff-base=origin/main \
    && node scripts/check-rule-1-novel-justification.mjs --diff-base=origin/main \
    && npx -y @tasks-md/lint@^0.7.0 TASKS.md \
    && pnpm exec markdownlint-cli2 "**/*.md" "#**/node_modules" "#.minsky" "#.obsidian" "#.claude"
anchor: |
  Kephart, J. O., Chess, D. M., "The Vision of Autonomic Computing",
  *IEEE Computer* 36(1) 2003 (MAPE-K loop — the orchestrator is the layer
  that turns a tick into operator-actionable artefacts: a draft branch +
  a constraints.md append + a research.md amendment proposal); Khattab,
  O., et al., "DSPy: Compiling Declarative Language Model Calls into
  Self-Improving Pipelines", *ICLR* 2024 (the rejected baseline whose
  "compile-time variant catalogue → A/B → winner picks" cycle survives
  in this orchestrator's flow, minus DSPy's runtime); Kohavi, R., Tang,
  D., Xu, Y., *Trustworthy Online Controlled Experiments*, Cambridge UP
  2020, Ch. 3 (sustained-gain window — the rollout-draft only fires when
  the underlying `execute()` passes the 7 d sustained-gain guard); Beyer,
  B., Jones, C., Petoff, J., Murphy, N. R. (eds.), *Site Reliability
  Engineering*, O'Reilly 2016, Ch. 17 (operator escape hatch — drafts
  never auto-merge); Munafò et al., "A Manifesto for Reproducible
  Science", *Nature Human Behaviour* 1, 0021, 2017 (rule-#9
  pre-registration — the predicted gain is committed in the draft
  EXPERIMENT.yaml *before* merge so a future replay window can falsify
  or confirm it).
replay_windows_days: [7, 30, 90]
