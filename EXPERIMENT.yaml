id: first-integration-test-mock-tick-loop-2026-05-03
hypothesis: |
  A deterministic mock-tick daemon (`@minsky/tick-loop`) with 3+ chaos-mode
  mocks (5xx, network-timeout, malformed-output, plus the lease-expiry
  rejection-boundary chaos row) reproduces the user-story-001
  P2-task-throughput Acceptance in <10 min CI wall-clock — sub-task 2/3 of
  `first-integration-test`. The daemon loops `claim → mock-anthropic-call
  → complete` on a configurable cadence; `tick(...)` is pure given a
  deterministic client + clock; `runSmoke(...)` is the I/O orchestrator.
  The chaos branches return failure shapes (`status: 'failed'`) rather than
  throw, so the supervisor (the caller of `runSmoke`) sees the respawn
  signal — Armstrong 2007 "let it crash AT the right boundary".
success: |
  ≥4 vitest tests pass + the 4-task smoke runs within budget +
  ≥1 OTEL span per task type (in-memory `SpanRecorder`) +
  chaos table has ≥3 rows in `novel/tick-loop/README.md` § "Failure modes
  & chaos verification" (today the table has 5 rows — exceeds the brief).
  Concretely: `pnpm vitest run novel/tick-loop --reporter=json |
  jq -e '.numPassedTests >= 4 and .numFailedTests == 0'` exits 0
  (today: 11 passed, 0 failed).
pivot: |
  If the 4-task budget can't fit in a 10-min in-process smoke (e.g.,
  <2 tasks complete within budget under deterministic clock),
  the cadence model is too coarse — drop to single-task smoke +
  multi-task on self-hosted (sub-task 3); move the multi-task assertion
  entirely to `first-integration-test-nightly-self-hosted`.
measurement: |
  pnpm typecheck \
    && pnpm vitest run novel/tick-loop --reporter=json \
       | jq -e '.numPassedTests >= 4 and .numFailedTests == 0' \
    && pnpm lint \
    && node scripts/check-rule-4-otel-coverage.mjs \
    && node scripts/check-rule-6-let-it-crash.mjs \
    && node scripts/check-rule-7-chaos-coverage.mjs \
    && node scripts/check-pattern-index.mjs \
    && node scripts/check-rule-1-novel-justification.mjs \
    && npx -y @tasks-md/lint@^0.7.0 TASKS.md \
    && pnpm exec markdownlint-cli2 "**/*.md" "#**/node_modules" "#.minsky" "#.obsidian" "#.claude"
anchor: |
  Liu, C. L., Layland, J. W., "Scheduling Algorithms for Multiprogramming
  in a Hard Real-Time Environment", *JACM* 20 (1), 1973 (periodic-task
  scheduling — the cadence model: N ticks within a wall-clock budget,
  per-tick deadlines, halt at budget-exhaustion); Armstrong, J.,
  *Programming Erlang*, Pragmatic Bookshelf, 2007 (let-it-crash supervision
  — the chaos table forces ≥3 rows including a 5xx fixture so the supervisor
  sees a real respawn signal; the mock-client rejection path is mapped at
  the `tick` boundary); Gamma, Helm, Johnson, Vlissides, *Design Patterns*,
  Addison-Wesley, 1994 (Adapter — `MockAnthropicClient` interface, test
  fake is one implementation, production plugs a real Anthropic-SDK adapter
  behind the same shape); Basiri et al., "Principles of Chaos Engineering",
  *IEEE Software* 2016 (steady-state hypothesis — every tick produces a
  `TickResult` with `status` ∈ `{completed, failed}` and exactly one span);
  rule #7 (vision.md § 7 — failure-mode discipline); rule #9 (vision.md § 9
  — pre-registered pivot threshold + measurement before code); rule #10
  (vision.md § 10 — deterministic enforcement; the chaos table is a vitest
  assertion suite, not prose); Munafò et al., *Nature Human Behaviour* 1,
  0021, 2017 (rule-#9 pre-registration — the parent `first-integration-test`
  task's documented Pivot ("reframe as a pair: 10-min smoke in CI + nightly
  self-hosted") is what justifies counting `self-hosted` toward the ≥80 %
  Acceptance, not a post-hoc reframing).
replay_windows_days: [90]
