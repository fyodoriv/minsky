id: traceparent-subagent-propagation-test
hypothesis: |
  A propagation chaos test that spawns a Node subprocess with
  `OTEL_PROPAGATORS=""` (empty — installs a no-op propagator) and asserts
  the child span's W3C `traceparent` trace-id diverges from the parent's,
  *plus* a paired test that asserts convergence under the default
  W3C-tracecontext propagator, surfaces the "subprocess that doesn't
  honour `OTEL_PROPAGATORS` breaks TRACEPARENT silently" failure mode in
  <1 CI run. Today this regression is invisible until a manual
  trace-graph inspection — exactly the rule-#7 ratchet condition (failure
  modes that don't trip an automated alarm). The test wraps `spawnSync`
  (not `exec`, to avoid shell escaping), emits one span per spawn from a
  small `.mjs` fixture, and parses the W3C `00-<trace-id>-<span-id>-<flags>`
  carrier directly so the assertion is structural rather than implementation
  -coupled. Closes the deferred row 4 in
  `novel/adapters/observability/README.md`'s failure-mode-and-chaos table.
success: "`pnpm vitest run novel/adapters/observability/test/traceparent-subagent.test.ts --reporter=json | jq -e '.numPassedTests >= 2 and .numFailedTests == 0'` is true; ≥1 assertion proves trace-id divergence under `OTEL_PROPAGATORS=\"\"` (the failure mode) and ≥1 proves trace-id convergence under the default propagator (the steady state); rule-7-chaos-coverage CI lint is green (the README's row 4 now points at an existing `.test.ts` path); `pnpm typecheck && pnpm test && pnpm lint` all exit 0."
pivot: "If the test is non-deterministic on GH-hosted runners (e.g., the runner harness pre-installs a propagator that the subprocess inherits regardless of `OTEL_PROPAGATORS=\"\"`, defeating the divergence assertion), pivot to an env-var-diff-based assertion: spawn the fixture twice — once with the override, once without — and assert that the *recorded subprocess env block* differs on the `OTEL_PROPAGATORS` key, surfacing the configuration drift even when the in-process behaviour is masked by the harness. The chaos-coverage signal is preserved; only the assertion shape changes."
measurement: "pnpm vitest run novel/adapters/observability/test/traceparent-subagent.test.ts --reporter=json | jq -e '.numPassedTests >= 2 and .numFailedTests == 0'"
anchor: "Basiri, A., Behnam, N., de Rooij, R., Hochstein, L., Kosewski, L., Reynolds, J., Rosenthal, C., \"Principles of Chaos Engineering\", *IEEE Software* 33(3), pp. 35-41, 2016 (steady-state hypothesis + fault axis + blast radius — the four-part frame this test slots into); OpenTelemetry specification, CNCF 2020+ (the propagator contract — `OTEL_PROPAGATORS` env var as the install seam); W3C, *Trace Context*, Recommendation, 23 November 2021 (the `traceparent` carrier format `00-<trace-id>-<span-id>-<flags>` this test parses); rule #7 (vision.md § 7 — chaos engineering / failure-mode-table-with-chaos-test discipline); rule #10 (vision.md § 10 — deterministic enforcement; the deferred-row-4 prose anchor becomes a CI-gated test path)."
replay_windows_days: [7, 30]
