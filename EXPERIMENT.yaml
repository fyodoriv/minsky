id: tick-loop-spawn-args-fresh-session-2026-05-04
hypothesis: |
  `ProcessSpawnStrategy` in `novel/tick-loop/src/spawn-strategy.ts` defaults
  its args to `["--resume"]`. `claude --resume` opens an interactive session
  picker (TTY) and resumes the previous conversation — it does NOT start a
  fresh session reading the brief from stdin. The daemon's contract is
  "feed the task brief in, get a result out"; `--resume` violates that.
  Switching the default to `["--print"]` (Claude Code's documented headless
  flag per `claude --help` — "Print response and exit (useful for pipes).
  … workspace trust dialog is skipped when Claude is run in non-interactive
  mode (via -p, or when stdout is not a TTY)") and continuing to write the
  brief to stdin makes the contract honest. A new `it.skipIf(!hasClaude)`-
  gated integration test in `novel/tick-loop/src/spawn-strategy.test.ts`
  spawns the real binary with a 1-line brief and asserts the response is
  non-empty and is NOT an interactive "Select a session to resume" UI
  string. Closes `tick-loop-spawn-args-fresh-session`.
success: |
  - `pnpm vitest run novel/tick-loop --reporter=json | jq -e '.numPassedTests >= 34 and .numFailedTests == 0'` exits 0
    (one new test on top of the current 33 — the `tick-loop-spawn-args-fresh-session` integration smoke; gated on `claude` being on PATH so CI without `claude` skips cleanly while local runs assert the real wiring).
  - `pnpm typecheck` exits 0.
  - All pre-existing tick-loop tests pass UNCHANGED.
  - Default args for `ProcessSpawnStrategy` are `["--print"]`; `--resume` is no longer the default.
pivot: |
  Pre-registered: if Claude Code had no non-interactive headless mode (no
  flag found in `claude --help`), we would NOT ship a broken default;
  instead `ProcessSpawnStrategy` would write the brief to
  `state/inbox/<taskId>.md` and return immediately with `exitCode: 0` /
  `stdoutTail: 'inbox-handoff'`, with a follow-up session consuming the
  inbox. This pivot was NOT taken — `claude --help` documents `-p` /
  `--print` as the headless flag and a smoke (`echo "reply: ok" | claude
  --print --max-turns 1` → `ok`) confirmed it works, so we shipped the
  real-spawn fix. Documented here so the pivot path is discoverable if a
  future Claude Code release retires `--print`.
measurement: |
  pnpm vitest run novel/tick-loop --reporter=json \
    | jq -e '.numPassedTests >= 34 and .numFailedTests == 0'
anchor: |
  Armstrong, J., *Programming Erlang*, Pragmatic Bookshelf, 2007 (let-it-
  crash AT the right boundary — the Strategy must produce a *correct*
  result shape, not just any result; a `--resume` invocation that opens a
  TTY picker is a wrong-shape result that the daemon cannot reason about);
  rule #2 (vision.md § 2 — the Strategy seam is honest only when its real
  implementation matches the contract the daemon expects); Munafò et al.,
  "A Manifesto for Reproducible Science", *Nature Human Behaviour* 1,
  0021, 2017 (rule-#9 pre-registration — this experiment block was
  committed before the test was written, so the success/pivot thresholds
  are not retrofitted to the result; the pivot path was identified before
  surveying `claude --help`, so a missing `--print` would have triggered
  the file-based-handoff path instead of an ad-hoc kludge); Claude Code
  CLI documentation (`claude --help`, 2026-05 — `-p, --print`: "Print
  response and exit (useful for pipes). Note: The workspace trust dialog
  is skipped when Claude is run in non-interactive mode (via -p, or when
  stdout is not a TTY, e.g. piped or redirected output).").
replay_windows_days: [7, 30, 90]
