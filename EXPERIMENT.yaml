id: docs-drift-fixes-batch-2026-05-04
hypothesis: |
  Four small docs-only fixes (research.md OMC handoff entry strikethrough,
  research.md cross-language-port answer, ARCHITECTURE.md open-questions
  resolution annotations, ARCHITECTURE.md versioning sub-list) close
  4 P3 tasks without code change. Each fix is independently verifiable
  via grep; total PR diff < 100 lines; no scripts/CI/code touched.
success: |
  All 4 P3 tasks removed from TASKS.md and the 4 measurement assertions
  pass:
  (a) `grep -c 'OMC handoff persistence' research.md` ≤ 1 (only the
      canonical § "OMC handoff persistence" header remains; the
      open-questions duplicate is struck).
  (b) ARCHITECTURE.md § "Versioning & dependency evolution" contains
      the sub-list with `@tasks-md/lint@^0.7.0`, `markdownlint-cli2@0.15.0`,
      `lighthouse@12.4.0`.
  (c) ARCHITECTURE.md open-questions items 1–4 each carry a
      `**Resolved**: PR #N — <one-line>` annotation.
  (d) research.md cross-language entry has a one-line answer
      ("no cross-language port as of 2026-05-04").
pivot: |
  If ≥1 of the "resolved" claims turns out to be wrong (e.g., a PR
  cited as resolving an open question did not in fact resolve it on
  inspection), file a follow-up task to re-investigate that specific
  claim and revert the strikethrough for the affected item.
  Abandon-the-approach: if more than 25 % (i.e., ≥2 of the 4)
  claimed-resolutions fail verification on read, the underlying audit
  (PR #79) was wrong shape — switch to a deterministic CI lint that
  machine-checks "resolved by PR #N" annotations against
  `gh pr view N` titles before allowing the strikethrough to land.
measurement: |
  [ "$(grep -c 'OMC handoff persistence' research.md)" -le 1 ] \
    && [ "$(grep -c '@tasks-md/lint@\^0\.7\.0' ARCHITECTURE.md)" -ge 1 ] \
    && [ "$(grep -c 'markdownlint-cli2@0\.15\.0' ARCHITECTURE.md)" -ge 1 ] \
    && [ "$(grep -c 'lighthouse@12\.4\.0' ARCHITECTURE.md)" -ge 1 ] \
    && ! grep -q 'docs-drift-research-md-open-questions' TASKS.md \
    && ! grep -q 'docs-drift-architecture-md-open-questions' TASKS.md \
    && ! grep -q 'docs-drift-architecture-md-versioning-pins' TASKS.md \
    && ! grep -q 'docs-drift-tasksmd-cross-language-followup' TASKS.md \
    && pnpm typecheck && pnpm test && pnpm lint \
    && npx -y @tasks-md/lint@^0.7.0 TASKS.md \
    && pnpm exec markdownlint-cli2 "**/*.md" "#**/node_modules" "#.minsky" "#.obsidian" "#.claude"
anchor: |
  Hunt, A., Thomas, D., *The Pragmatic Programmer*, Addison-Wesley,
  1999, Ch. 2 (DRY — a question resolved by shipped code should not
  remain "open" in two doc surfaces; the strikethrough + resolution
  pointer is the canonical reconciliation); rule #5 (vision.md § 5 —
  glossary discipline; "open" / "resolved" are status fields whose
  value is empirical); rule #8 (vision.md § 8 — pattern conformance;
  shipped state must be reflected back into the architecture doc);
  Munafò et al., "A Manifesto for Reproducible Science", *Nature
  Human Behaviour* 1, 0021, 2017 (pre-registration — the hypothesis
  that all 4 fixes are mechanical was declared before the read).
replay_windows_days: [30]
