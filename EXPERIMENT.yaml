id: dspy-fit-eval
hypothesis: |
  DSPy's compiler/optimizer idiom (`dspy.Module` + `dspy.Signature` +
  `dspy.MIPROv2` / GEPA) maps cleanly onto Minsky's `PromptOptimizer`
  adapter shape across ≥3 of 5 canonical Minsky use cases (persona prompt
  tuning, MAPE-K rollout, post-hoc fault explanation, drift-report
  rephrasing, persona handoff) without contortion. If frictions
  outnumber wins ≥2:1, OR DSPy assumes a Python runtime Minsky won't
  ship, the fallback minimal `PromptOptimizer` TypeScript interface
  ships in the same doc instead.
success: "grep -c '^## DSPy fit' research.md returns 1 AND the section enumerates ≥3 wins AND ≥3 frictions (each with a code citation linked to a specific file in stanfordnlp/dspy at tag 3.2.0) AND ends with an explicit recommendation (adopt / partial-adopt / reject + fallback); pnpm typecheck && pnpm test && pnpm lint && npx @tasks-md/lint TASKS.md && pnpm exec markdownlint-cli2 all green."
pivot: "if DSPy turns out to be a perfect fit (>4 wins AND no Python-runtime disqualifier), upgrade the recommendation from `reject` to `adopt DSPy` and file a follow-up `mape-k-prompt-optimizer-impl` task wrapping DSPy in a Python sidecar with a TypeScript-side adapter. If, conversely, the fallback interface itself surfaces a use case it cannot serve in ≤20 lines (e.g., online-learning loop that doesn't fit `runABTest` + `structured`), the adapter shape is wrong and rule-#2's interface design needs revision before any implementation lands."
measurement: "test \"$(grep -c '^## DSPy fit' research.md)\" = 1 && test \"$(awk '/^## DSPy fit/{flag=1; next} /^## /{flag=0} flag' research.md | grep -c '^### ')\" -ge 3 && test \"$(awk '/^### Wins/{flag=1; next} /^### /{flag=0} flag' research.md | grep -cE '^[0-9]+\\.')\" -ge 3 && test \"$(awk '/^### Frictions/{flag=1; next} /^### /{flag=0} flag' research.md | grep -cE '^[0-9]+\\.')\" -ge 3"
anchor: "Khattab et al., \"DSPy: Compiling Declarative Language Model Calls into Self-Improving Pipelines\", ICLR 2024 (the Module/Signature/Optimize idiom evaluated); Gamma et al., *Design Patterns*, 1994 (Adapter — the shape rule #2 demands of the fallback); Kohavi/Tang/Xu 2020 ch. 3 (offline-online divergence — friction #3); rule #1 (don't reinvent the wheel — DSPy was the existing-tool candidate; this section is the documented \"why not\")."
replay_windows_days: [7, 30, 180]
