id: budget-guard-maciek-impl
hypothesis: |
  MaciekTokenMonitor's parser + 5h SessionBlock aggregation + plan-cap
  subtraction matches Maciek's `claude-monitor --view realtime` reported
  value to within 1 % on a synthetic fixture, without invoking the
  upstream CLI. Re-implementing the parser shape directly against
  `~/.claude/projects/<cwd>/<session>.jsonl` (the file Claude Code writes;
  the same data Maciek reads) is the only deterministic path because
  `claude-monitor==3.1.0` has no `--json` mode (only `--view {realtime,
  daily, monthly}` and `--version`).
success: |
  ≥6 tests pass against committed synthetic fixtures
  (`single-block`, `two-blocks`, `empty`, `malformed`, `dedup`); parser
  handles every fixture case; `PLAN_CAPS = { pro: 19_000, max5: 88_000,
  max20: 220_000, custom: 44_000 }` is locked by paired plan-cap-variance
  tests; `pnpm vitest run novel/adapters/token-monitor/src/maciek.test.ts
  --reporter=json | jq -e '.numPassedTests >= 6 and .numFailedTests == 0'`
  exits 0.
pivot: |
  If Anthropic's JSONL format changes more than once in a 90-day window
  (a structural break — new top-level field shapes, renamed
  `message.usage` keys, or removed timestamps), file an upstream feature
  request for a `--json` mode in `claude-monitor` (rule #1 — push
  upstream first). Only as a last resort write our own cache-tap by
  hooking the Claude Code API client. The pivot is an *abandon-the-
  approach* line, not a one-line schema-update PR (rule #9 — Munafò
  et al. 2017 pre-registration discipline).
measurement: |
  pnpm vitest run novel/adapters/token-monitor/src/maciek.test.ts --reporter=json | jq -e '.numPassedTests >= 6 and .numFailedTests == 0'
anchor: |
  Gamma, Helm, Johnson, Vlissides, *Design Patterns*, Addison-Wesley,
  1986 (Adapter / Strategy — `MaciekTokenMonitor` is a Strategy of
  `TokenMonitor`); Aho, Sethi, Ullman, *Compilers: Principles,
  Techniques, and Tools*, Addison-Wesley, 1986 (recursive-descent parser
  shape over JSONL — line-by-line `JSON.parse` with graceful skip on
  malformed input); Meszaros, *xUnit Test Patterns*, Addison-Wesley,
  2007 (real-implementation contract test — the parser test verifies
  determinism against committed fixtures rather than depending on a
  live Maciek install at test time); Beyer, Jones, Petoff, Murphy
  (eds.), *Site Reliability Engineering*, O'Reilly 2016, Ch. 3
  (error-budget framing — token economy is the budget contract);
  rule #2 (vision.md § 2 — every dep behind interface; the adapter
  wraps the JSONL on-disk format Anthropic writes).
replay_windows_days: [7, 30]
