id: pattern-conformance-audit-existing-docs
hypothesis: |
  Every existing `user-stories/*.md` (5 files) and `competitors/*.md`
  (6 files) maps cleanly to ≥1 published pattern with a primary-source
  citation (book, journal, conference proceedings) — i.e., zero
  artifacts in the audited set need an `audit-pending` conformance
  level for lack of a primary source. Annotating each file with a
  "## Pattern conformance" subsection and adding the matching row to
  `vision.md` § "Pattern conformance index" (rows 41–51, eleven new
  rows) operationalises rule #8's "every artifact maps to a published
  pattern" commitment for the full pre-existing corpus. Per Alexander
  et al. 1977 (*A Pattern Language*), a pattern catalogue is only
  load-bearing when it indexes *every* artifact, not just new ones;
  the audit closes the corpus for user-stories and competitors. If
  >30 % of files (≥4 of 11) genuinely cannot map to a primary source
  the approach is wrong — rule #8's scope is over-broad and should
  be narrowed to top-level architectural artifacts.
success: |
  All 11 audited files (5 user-stories + 6 competitors) carry a
  "## Pattern conformance" subsection citing ≥1 primary source AND
  `vision.md` § "Pattern conformance index" has ≥11 new rows
  (numbered 41–51) AND zero rows carry the placeholder
  `audit-pending` conformance level. Measured by the bracketed
  shell command below; exit 0 means the conditions hold.
pivot: |
  If ≥4 of the 11 audited files cannot be mapped to a primary-source
  pattern (best-faith mapping resolves only to a blog post, a
  Wikipedia article, or fabricated framing), the audit reveals
  rule #8's "every artifact" scope is over-broad. File follow-up
  task `narrow-rule-8-scope-to-top-level` proposing rule #8 apply
  only to top-level architectural artifacts (packages, scripts,
  named decisions) and *not* to user-story / competitor narratives.
  Threshold ≥4 of 11 sits well above the success threshold (0 of 11)
  — non-trivial margin.
measurement: '[ "$(for f in user-stories/*.md competitors/*.md; do grep -q ''^## Pattern conformance'' "$f" || echo "missing in $f"; done | wc -l | tr -d '' '')" = "0" ] && [ "$(grep -cE ''^\| (4[1-9]|5[01]) \|'' vision.md)" = "11" ]'
anchor: "Alexander, Ishikawa, Silverstein, *A Pattern Language*, Oxford University Press, 1977 (a pattern catalogue is load-bearing only when it indexes every artifact, not a subset); Gabriel, *Patterns of Software*, Oxford University Press, 1996 (named-pattern catalogues in software architecture); rule #8 (vision.md § 8 — pattern conformance for every artifact); rule #10 (vision.md § 10 — the catalogue is the authoritative index)."
replay_windows_days: [7, 30]
