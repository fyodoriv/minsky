id: tick-loop-daemon-budget-guard-real-2026-05-04
hypothesis: |
  Replacing the v0 stub `BudgetGuardLike` with the real `BudgetGuard` from
  `@minsky/budget-guard` (wrapped behind the daemon's structural
  `BudgetGuardLike.decide()` shape via a thin facade —
  `novel/tick-loop/src/budget-guard-facade.ts`) makes the daemon's
  behaviour under real budget pressure observable (Beyer SRE 2016 Ch. 3 —
  error-budget gating is now the production gate, not a stub). Sub-task
  2/3 of `tick-loop-daemon-real-spawn`'s decomposition: wires the real
  `BudgetGuard` into both the CLI (`bin/tick-loop.mjs` — `MaciekTokenMonitor`
  in production, `StubTokenMonitor` for `--dry-run`) and a new daemon test
  that drives the real `BudgetGuard.tick()` against a fixture
  `StubTokenMonitor` and asserts the circuit-break (≥85 %) flips the
  iteration to `budget-paused`, while a fresh window completes normally.
  Pivot was pre-registered: the real `BudgetGuard`'s public surface is
  `tick(): Promise<BudgetDecision>`, not `decide()`, so the facade is the
  pre-registered Pivot path (rule #9, Munafò et al. 2017).
success: |
  - `pnpm vitest run novel/tick-loop --reporter=json | jq -e '.numPassedTests >= 18 and .numFailedTests == 0'` exits 0
    (today: 31 tests pass — 14 daemon + 11 index + 6 spawn-strategy).
  - `pnpm typecheck` exits 0.
  - All pre-existing daemon dry-run tests (13) + spawn-strategy tests (6) +
    `tick-loop` index tests (11) pass UNCHANGED — the facade is observably
    equivalent to the prior stub on the happy path.
  - `bin/tick-loop.mjs` constructs a real `BudgetGuard` (production:
    `MaciekTokenMonitor`; `--dry-run`: `StubTokenMonitor`) and the daemon's
    `BudgetGuardLike` consumer is unchanged structurally (rule #2).
pivot: |
  Pre-registered in the task block: if the real `BudgetGuard` constructor
  signature drifts mid-flight, pivot to a thin facade in
  `novel/tick-loop/src/budget-guard-facade.ts` wrapping the real
  `BudgetGuard.tick()` behind the existing `BudgetGuardLike.decide()`
  shape. EXECUTED: the real `BudgetGuard` exposes `tick()` (the watchdog
  idiom — Beyer SRE 2016 Ch. 3) rather than `decide()`, so the facade
  ships. The pure `decide(snapshot, thresholds)` function from
  `@minsky/budget-guard` is invoked transitively inside `BudgetGuard.tick()`
  — the daemon never imports it directly, keeping rule #2's seam intact.
