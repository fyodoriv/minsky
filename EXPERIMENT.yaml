id: spec-monitor-q2-2026-audit
hypothesis: |
  The Q2 2026 quarterly audit of `novel/spec-monitor/SKILL.md`'s 5 advisory
  rules (per the `audit-spec-monitor-coverage` task and rule #10's ratchet)
  either confirms compliance or produces actionable follow-ups. Specifically:
  rule count is mechanically verified ≤5 by `scripts/check-skill-rule-cap.mjs`;
  each of A1–A5 receives a kept-advisory or promoted-to-deterministic-candidate
  decision with a written rationale; any promoted candidates are filed as P3
  `ci-lint-*` follow-up tasks with full Hypothesis/Success/Pivot/Measurement/
  Anchor; and the next-quarter (Q3 2026, due 2026-08-03) audit task is filed
  to preserve the cadence per the original task's Risk-mitigation note.
success: "test -f spec-advisories/2026-05-03-quarterly-audit.md && grep -q 'Rule count' spec-advisories/2026-05-03-quarterly-audit.md && grep -q 'audit-spec-monitor-coverage-q3-2026' TASKS.md"
pivot: "if every quarterly audit (this one and prior, once a baseline of ≥2 audits exists) finds ≥1 advisory-to-deterministic candidate AND the candidates filed in earlier audits remain open at the next audit, the Skill is leaking scope — reduce the hard cap from 5 to 3 in `novel/spec-monitor/SKILL.md` AND update `scripts/check-skill-rule-cap.mjs`'s threshold in the SAME PR. Q2 2026 is the first audit, so the cap-reduction does not fire yet — but if Q3 2026 also promotes ≥1 rule with the Q2 candidates still open, fire it then."
measurement: "test -f spec-advisories/2026-05-03-quarterly-audit.md && grep -q 'Rule count' spec-advisories/2026-05-03-quarterly-audit.md && grep -q 'audit-spec-monitor-coverage-q3-2026' TASKS.md"
anchor: "rule #10 (vision.md § 10 — deterministic enforcement; the ratchet rule that drives the audit's promote-or-keep decision); Munafò et al., \"A Manifesto for Reproducible Science\", Nature Human Behaviour 1, 0021, 2017 (pre-registration: this audit's pivot threshold is committed BEFORE the result is observed, not chosen post-hoc); Ries, *The Lean Startup*, 2011 (pivot-or-persevere — the cap-reduction trigger)."
replay_windows_days: [90, 180]
