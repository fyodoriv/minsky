id: watch-shortcuts-tailscale-host-substitution-2026-05-04
hypothesis: |
  The Shortcut runbook in `distribution/shortcuts/README.md` currently
  asks the operator to substitute `<tailscale-host>` into each Shortcut's
  URL field by hand (5 substitutions × 5 Shortcuts = 25 manual edits).
  Apple Shortcuts' "Ask Each Time" / "Get Variable" actions can
  parameterise the host once at first run and remember it, dropping
  operator overhead from 25 substitutions to 1 input + 0-touch reuse.
  This PR ships a 6th `setup-host.shortcut.json` whose only purpose is
  "Ask for input" → "Set Variable: host", and rewires the 5 polling
  Shortcuts (tokens-remaining, last-task-status, constraint-of-the-week,
  pause, resume) to read that variable at run time via Get-Variable +
  Combine-Text instead of carrying a literal Tailscale host. A smoke-test
  assertion enforces that no `*.shortcut.json` may contain a literal
  Tailscale host in any URL field — it must be either the
  `<tailscale-host>` placeholder OR a Get-Variable reference, so the
  parameterisation cannot silently regress.
success: |
  - `pnpm vitest run distribution/shortcuts/test/shortcuts-json.test.mjs --reporter=json | jq -e '.numPassedTests >= 17 and .numFailedTests == 0'` exits 0 (today: 16 cases; this PR brings it to ≥17 — 20 actual, +1 setup-host coverage, +1 no-literal-host assertion, +2 setup-host JSON-validity / schema-conformance checks).
  - 0 literal Tailscale hosts (`*.tailscale.ts.net`, `*.tail-scale.ts.net`) in any `*.shortcut.json` URL field — enforced by the new smoke-test assertion.
  - `setup-host.shortcut.json` ships and is documented in the runbook (`distribution/shortcuts/README.md` step 0); the 5 polling Shortcuts' runbook entries (steps A.2 and B.1) document the Get-Variable + Combine-Text prelude.
  - `watch-shortcuts-tailscale-host-substitution` task block removed from TASKS.md in this PR.
pivot: |
  If the "Ask Each Time" / Variable actions don't compose across
  separate Shortcuts (each Shortcut has its own scope on real hardware),
  retire this task — the operator pays the 1-time substitution cost
  once and the runbook stays as-is. The cap is bounded (5 substitutions,
  5 minutes), so the cost-of-status-quo is not high. The fallback is
  documented in `distribution/shortcuts/README.md` step 0 (Risk
  section): hand-edit each polling Shortcut's "Get Contents of URL"
  action to use a literal host, file a follow-up to retire the variable
  approach.
measurement: |
  pnpm vitest run distribution/shortcuts/test/shortcuts-json.test.mjs --reporter=json | jq -e '.numPassedTests >= 17 and .numFailedTests == 0'
anchor: |
  Norman, *The Design of Everyday Things*, 1988 (affordance — make the
  parameterisation visible); Card, S. K., Mackinlay, J., Shneiderman, B.,
  *Readings in Information Visualization*, Morgan Kaufmann, 1999 (calm
  tech — bounded operator cognitive load); Munafò et al., "A Manifesto
  for Reproducible Science", *Nature Human Behaviour* 1, 0021, 2017
  (pre-registered acceptance gate — the smoke-test assertion is the
  literal-host regression-prevention contract committed before merge).

  Risk (per the parent task block, copied here for the audit trail):
  Apple Shortcuts variables don't survive Shortcut deletion / reinstall;
  the "Ask Each Time" UX may prompt every run if the variable doesn't
  persist. Mitigation: test on a real device first; if persistence is
  lost, fall back to the 25-substitution status quo and retire the task.
  Fallback flow is documented in `distribution/shortcuts/README.md`
  step 0.
