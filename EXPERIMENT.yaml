id: omc-tasksmd-bridge-v0
hypothesis: |
  A read-only OMC → tasks.md bridge against synthetic fixtures parses,
  maps, and syncs deterministically — validating PR #77's parseable
  verdict (research.md § "OMC handoff persistence"). The bridge ships
  as `@minsky/omc-tasksmd-bridge` at `novel/bridges/omc-tasksmd/`,
  with three layers: `OmcReader.list({ repoRoot, teamName? })` (the
  only I/O boundary), `mapOmcToTasksMd(task)` (pure projection to a
  tasks.md task block), and `syncOmcToTasksMd({ omcTasks,
  existingTasksMd, mode: 'replace-section' })` (pure section-replace
  idempotency over a TASKS.md document). v0 is intentionally read-only
  — the reverse direction (tasks.md → OMC) is deferred to v1+ as
  `omc-tasksmd-bridge-v1-watcher` because OMC's optimistic-concurrency
  `version` field needs a CRDT story (Shapiro et al. 2011) before
  reverse-sync is safe.
success: |
  Three-part criterion. (a) Tests — ≥11 paired tests pass under the
  bridge's three modules: `pnpm vitest run novel/bridges/omc-tasksmd/`
  exits 0 with ≥11 cases. (b) Determinism — `syncOmcToTasksMd` is
  byte-equal idempotent: re-running with the same input produces
  byte-equal output (the load-bearing property for a bridge that may
  run on a v1+ watch loop). (c) Chaos coverage — the reader handles
  the four declared failure modes (cold-start missing
  `.omc/state/team/`, malformed JSON skip with stderr advisory,
  unknown-team filter, forward-compat unknown fields drop) per the
  rule-#7 chaos table in `novel/bridges/omc-tasksmd/README.md`.
  Combined check: `pnpm typecheck && pnpm vitest run
  novel/bridges/omc-tasksmd/` exits 0 — the test count + idempotency
  asserts + chaos-row-paired tests are all in the same vitest run.
pivot: |
  Trigger: if any field in the OMC schema cannot be losslessly mapped
  to the documented tasks.md projection (e.g., `metadata` is arbitrary
  JSON; `claim.token` and `claim.leased_until` are not naturally
  surfaceable as a single bold-labelled line), the parseable-thin-
  reader hypothesis is partially disproved. On trigger, document the
  lossy projection in `novel/bridges/omc-tasksmd/README.md` § "Lossy
  projection" with the explicit field-by-field map and ship anyway
  with a "lossy v0" note in vision.md row 62. Abandon-the-approach
  line: if a *required* field (`id` / `subject` / `status` /
  `created_at`) cannot be mapped — i.e., the OMC schema has drifted
  from the read-only verdict — restore the `research-omc-handoff-
  persistence` task block in TASKS.md, restore `omc-persistence-
  proposal`'s conditional trigger (now active), and re-investigate.
  Pivot pre-fired: the lossy projection is already declared (claim
  token, claim leased_until, blocks, depends_on, result, error,
  requires_code_change, metadata are all dropped in v0), with the
  field-by-field map in `novel/bridges/omc-tasksmd/README.md` —
  rule-#9 pre-registration discipline (Munafò 2017).
measurement: "pnpm typecheck && pnpm vitest run novel/bridges/omc-tasksmd/"
anchor: |
  research.md § "OMC handoff persistence" (the parseable verdict that
  unblocked v0; the canonical OMC write site `src/team/state/tasks.ts:90`
  is `writeAtomic(path, JSON.stringify(updated, null, 2))`); Helland,
  P., "Life beyond Distributed Transactions", *CIDR* 2007 (the
  load-bearing pattern: a bridge converges through eventual
  consistency; v0 ships only the read direction because that's the
  safe half until the write-side has a CRDT story); Hewitt, Bishop,
  Steiger, "A Universal Modular Actor Formalism for Artificial
  Intelligence", *IJCAI* 1973 (TASKS.md as the message store; each
  emitted block is one message addressed to whoever picks it next);
  Aho, Sethi, Ullman, *Compilers: Principles, Techniques, and Tools*,
  Addison-Wesley, 1986 (parser shape — `JSON.parse` is the only
  parser; the format is the round-trip-parseable verdict from
  `scripts/omc-roundtrip.mjs` per vision.md row 61); Martin, R. C.,
  *Clean Architecture*, Pearson, 2017 (I/O at the edge — `OmcReader.
  list` is the only filesystem touch; mapper + sync are pure);
  Shapiro et al., "Conflict-free Replicated Data Types", *SSS* 2011
  (the CRDT story `omc-tasksmd-bridge-v1-watcher` waits on); Munafò
  et al., *Nature Human Behaviour* 1, 0021, 2017 (rule-#9 pre-
  registration — the lossy-projection pivot was declared *before*
  code so a fielddrop cannot retroactively redefine "lossless");
  rule #2 (vision.md § 2 — every dep behind interface; OMC's task
  store is exactly that, behind `OmcReader.list`); rule #6 (vision.md
  § 6 — let-it-crash; the v1+ `merge-by-id` mode throws with a `v1+`
  reference so the caller decides next step); rule #7 (vision.md § 7
  — graceful-degrade on missing `.omc/state/team/`, on malformed
  JSON, on unknown `teamName` filter); rule #10 (vision.md § 10 —
  deterministic enforcement; the read-only-first pattern is gated by
  the existing `scripts/omc-roundtrip.mjs` parseability check at
  vision.md row 61, so the bridge ships only after the gate is
  green).
