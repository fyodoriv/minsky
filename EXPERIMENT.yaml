id: tick-loop-daemon-spawn-strategy-2026-05-04
hypothesis: |
  Introducing a `SpawnStrategy` interface (`novel/tick-loop/src/spawn-strategy.ts`)
  with two implementations — `DryRunSpawnStrategy` (synthetic, mirrors v0)
  and `ProcessSpawnStrategy` (`node:child_process.spawn` with bounded
  last-4KB stdout/stderr tails + AbortSignal) — decouples the daemon from
  `child_process` (rule #2 — every dep behind interface, Wirfs-Brock &
  McKean 2003 Strategy boundary). The interface is the seam that test-mode
  + production-mode share. Sub-task 1/3 of `tick-loop-daemon-real-spawn`'s
  decomposition: this PR ships ONLY the interface + both Strategies +
  dispatch wiring in `runDaemon`. Production stays defaulted to the legacy
  dry-run `tick(...)` path (no Strategy injected → `dryRun: false` still
  throws) so the existing 13 dry-run tests pass UNCHANGED and ≥4 new
  spawn-strategy tests pass. The flag-flip to make `ProcessSpawnStrategy`
  the default is the explicit Pivot of sub-task 3
  (`tick-loop-daemon-real-spawn-flip`).
success: |
  - `pnpm vitest run novel/tick-loop --reporter=json | jq -e '.numPassedTests >= 17 and .numFailedTests == 0'` exits 0
    (13 daemon dry-run tests + 11 index tests + ≥4 new spawn-strategy tests; today: 30 tests pass).
  - `pnpm typecheck` exits 0.
  - All 13 pre-existing daemon dry-run tests pass UNCHANGED — the dispatch
    wiring is observably equivalent when no Strategy is injected.
  - `ProcessSpawnStrategy` is reachable via the `spawnStrategy?` opt but
    NOT wired as the daemon's production default.
pivot: |
  If `node:child_process.spawn` proves unable to forward stdin to the
  child without a controlling TTY (deadlock — e.g. `claude --resume`
  refuses non-interactive stdin), drop `ProcessSpawnStrategy` and pivot
  to a temp-file-based `claude --resume` chain (write the brief to
  `state/inbox/<id>.md`, spawn `claude --resume <file>` on it). This
  Pivot is already pre-registered in the parent task's Pivot field
  (Munafò et al. 2017 — the Pivot was committed *before* the experiment).
