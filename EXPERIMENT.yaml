id: mape-k-plan-execute-phases
hypothesis: |
  Shipping pure `plan(...)` and `execute(...)` decision functions plus two
  independently-testable guards (`sustainedGain(...)` per Kohavi-Tang-Xu 2020
  Ch. 3, default 7-day window; `oscillation(...)` per Ries 2011, default
  10-iteration lookback) under `novel/mape-k-loop/` — implementing the P
  (Plan) and E (Execute) phases of the MAPE-K reference architecture
  (Kephart & Chess, *IEEE Computer* 2003) — drives prompt rollouts
  deterministically through the `@minsky/prompt-optimizer` adapter (sub-task
  1's `PromptOptimizer` interface) without a separate orchestration runtime.
  Pure-function decision module + thin I/O boundary (Martin, *Clean
  Architecture*, 2017): `execute` takes the optimizer + an injected `now: Date`
  + the rollout history as named arguments, allowing tests to drive the guards
  with deterministic clocks and synthetic histories. Plan emits ≤3 variants
  from a fixed v0 mutation catalogue (`enumerate-failure-modes`,
  `direct-answer`, `tighten-scope`); Execute applies both guards and returns
  `decision: 'rollout' | 'abstain'` with a reason. Empty/blank `ruleId` →
  `plan` throws (let-it-crash on caller-contract violation per rule #6); empty
  variants list / unknown winner / cold-start history → `execute` returns a
  graceful `abstain` (rule #7).
success: "`pnpm typecheck` exits 0 and `pnpm vitest run novel/mape-k-loop/src/plan.test.ts novel/mape-k-loop/src/execute.test.ts novel/mape-k-loop/src/oscillation.test.ts novel/mape-k-loop/src/sustained-gain.test.ts` exits 0 with ≥10 tests passing collectively; the parent `mape-k-loop-v0` tracker's `Blocked by` list drops by 1 — the `mape-k-plan-execute-phases` block is removed from `TASKS.md` in the same PR (`grep -c '^  - \\*\\*ID\\*\\*: mape-k-plan-execute-phases$' TASKS.md` returns 0); rule-N CI lints (rule-1 / rule-2 / rule-3 / rule-4 / rule-5 / rule-6 / rule-7 / skill-rule-cap / pattern-index / pivot-success-margin / measurement-inspects-output / anchor-primary-source) all pass on this PR's diff."
pivot: "If `oscillation`-guard refusal rate exceeds 50 % over 30 iterations on synthetic histories (the v0 variant pool of 3 mutations is too small to satisfy a 10-iteration lookback — every third proposal would necessarily revisit a previously-rejected variant), pivot the v0 mutation catalogue from 3 templates to ≥6 — OR shorten `DEFAULT_LOOKBACK_ITERATIONS` from 10 to 5. Declare the deviation in `research.md` § \"DSPy fit\" so the calibration trail stays auditable. Lower-bound trip: if the 7-day sustained-gain default emits <1 winner per month sustained 3 months even with valid candidates on the Max5 personal-tier cadence, pivot to a per-tier configurable `windowDays` (the seam already exists — `sustainedGainWindowDays` is a named argument on `execute`)."
measurement: "pnpm typecheck && pnpm vitest run novel/mape-k-loop/src/plan.test.ts novel/mape-k-loop/src/execute.test.ts novel/mape-k-loop/src/oscillation.test.ts novel/mape-k-loop/src/sustained-gain.test.ts --reporter=json | jq -e '.numPassedTests >= 10 and .numFailedTests == 0'"
anchor: "Kohavi, R., Tang, D., & Xu, Y., *Trustworthy Online Controlled Experiments: A Practical Guide to A/B Testing*, Cambridge University Press, 2020, Ch. 3 (the sustained-gain window — 7-day default — operationalised by `sustainedGain`); Kephart, J. O., & Chess, D. M., \"The Vision of Autonomic Computing\", *IEEE Computer* 36(1), pp. 41-50, 2003 (the MAPE-K reference architecture — this PR ships the P+E phases); Ries, E., *The Lean Startup: How Today's Entrepreneurs Use Continuous Innovation to Create Radically Successful Businesses*, Crown Business, 2011 (build-measure-learn — the oscillation guard is the \"don't re-pivot to a previously-rejected variant\" guardrail); Martin, R. C., *Clean Architecture: A Craftsman's Guide to Software Structure and Design*, Pearson, 2017 (pure decision module + thin I/O boundary — `execute` takes `now: Date` as a named argument so tests inject deterministic clocks); rule #2 (vision.md § 2 — every dep behind an interface; reuses `@minsky/prompt-optimizer`'s `PromptOptimizer` interface); vision.md § \"Pattern conformance index\" row 54 (updated to mark M+A+P+E shipped, K phase + integration deferred to sub-task 4)."
