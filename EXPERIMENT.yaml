anchor: |
  Kephart, J. O., Chess, D. M., "The Vision of Autonomic Computing",
  *IEEE Computer* 36(1) 2003 (MAPE-K — the Knowledge phase closes the loop;
  this PR wires the workflow that feeds it); Munafò et al., "A Manifesto for
  Reproducible Science", *Nature Human Behaviour* 1, 0021, 2017 (rule-#9
  calibration as a pre-registered audit — the orchestrator's MAE check is
  this manifesto operationalised); Beyer, B., Jones, C., Petoff, J.,
  Murphy, N. R. (eds.), *Site Reliability Engineering*, O'Reilly 2016,
  Ch. 17 (operator escape hatch — the draft PR NEVER auto-merges; the
