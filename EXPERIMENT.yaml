id: ci-rule-4-otel-coverage
hypothesis: |
  A TypeScript-AST diff-based lint that requires every newly-added or
  modified `export`-ed function/method/class-method/arrow under
  `novel/**/*.ts` (non-test) to carry a JSDoc `@otel <span-name>` OR
  `@otel-exempt <reason>` annotation enforces rule #4 ("everything
  measurable, everything visible") at PR time, before the runtime trace
  reveals the gap. Existing un-annotated code is grandfathered until the
  file is touched again — same rule-1 / rule-3 precedent.
success: "scripts/check-rule-4-otel-coverage.test.mjs exits 0 with ≥21 cases covering every export shape (function decl, default export, arrow, function expr, class method, accessors); the script exits 1 on the synthetic-missing fixture and 0 on the synthetic-annotated fixture; the new CI job is wired into the ci gate; pnpm typecheck && pnpm lint && pnpm test all exit 0"
pivot: "if more than 30% of currently-exported functions need @otel-exempt to pass (i.e., the rule is over-broad for low-level helpers), narrow the scope to public-API surface only — functions exported from a package's top-level index.ts, not from internal modules"
measurement: "pnpm typecheck && pnpm vitest run scripts/check-rule-4-otel-coverage.test.mjs"
anchor: "rule #10 (vision.md § 10 — every constitutional rule has a deterministic CI lint); OpenTelemetry specification (CNCF 2020+); Gregg Systems Performance 2014 (USE method — instrumentation as a structural property)"
replay_windows_days: [7, 30]
