id: tick-loop-daemon-real-spawn-flip-2026-05-04
hypothesis: |
  Once the `SpawnStrategy` interface (sub-task 1) and the real `BudgetGuard`
  (sub-task 2) have landed, flipping the daemon's default Strategy from
  `DryRunSpawnStrategy` to `ProcessSpawnStrategy` is a one-line constructor
  swap. The flip ships together with: dropping the hard-coded `--dry-run`
  argv flag from `bin/tick-loop.mjs` + `distribution/systemd/run-tick-loop.sh`;
  gating dry-run via the `MINSKY_TICK_DRY_RUN=1` env-var control surface
  instead; one integration test that drives `runDaemon` against a real
  subprocess via `ProcessSpawnStrategy` (gated on `which claude`; skipped
  on hosts where `claude` isn't installed). The supervisor unit files
  (`distribution/systemd/minsky-tick-loop.service`,
  `distribution/launchd/com.minsky.tick-loop.plist`) ship with
  `MINSKY_TICK_DRY_RUN=1` set during the safe rollout window — an operator
  must drop that line to flip to full real spawn (the production default).
  Closes `tick-loop-daemon-real-spawn` and unblocks
  `user-story-001-integration-test-real`.
success: |
  - `pnpm vitest run novel/tick-loop --reporter=json | jq -e '.numPassedTests >= 19 and .numFailedTests == 0'` exits 0
    (today: 33 tests pass — 16 daemon (incl. 2 new + 1 gated integration) + 11 index + 6 spawn-strategy).
  - `pnpm typecheck` exits 0.
  - All pre-existing daemon dry-run tests + spawn-strategy tests +
    `tick-loop` index tests pass UNCHANGED — the dry-run path is now
    opt-in via env, the env-default-false test was rewritten to inject
    `DryRunSpawnStrategy` explicitly, and the v0 production guardrail
    (`dryRun: false` without a Strategy throws) is preserved.
  - `bin/tick-loop.mjs` reads `MINSKY_TICK_DRY_RUN`; `--dry-run` argv flag
    is retired; `ProcessSpawnStrategy` is the production default.
pivot: |
  Pre-registered in the parent task block: if `claude --resume` deadlocks
  on stdin without a TTY (the brief is written to stdin and the child is
  expected to consume it), pivot to a temp-file-based brief handoff
  (`spawn('claude', ['--resume', '--brief-file', tmpPath])` with the
  brief written to a `mktemp` path). The Strategy interface is the
  bounded change surface; the daemon and CLI never touch the brief
  shape directly.
