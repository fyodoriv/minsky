id: extract-adapter-types
hypothesis: |
  Hoisting `SelfTestStatus`, `SelfTestResult`, and `aggregateStatus()` into
  a leaf `@minsky/adapter-types` package eliminates the latent dependency
  cycle (`@minsky/budget-guard → @minsky/observability` for a base type)
  without breaking observability's public API; future adapter packages then
  depend on `@minsky/adapter-types` directly. Per Martin's acyclic
  dependency principle (*Clean Architecture*, 2017) and Wiggins' factor II
  (*The Twelve-Factor App*, 2011 — explicit dependencies).
success: "pnpm typecheck && pnpm test && pnpm lint && pnpm publish --dry-run --filter @minsky/adapter-types all exit 0; new types-package tests cover aggregateStatus 100%; existing observability tests pass unchanged; the runtime smoke check `aggregateStatus([{status:'green',...},{status:'red',...}])` returns 'red'"
pivot: "if extraction breaks observability's downstream consumers (the @minsky/observability re-export turns out not to preserve type identity across declaration files, e.g., consumers see two distinct SelfTestStatus types and refuse to unify them), revert and instead inline the contract per-adapter with a CI lint that asserts the inline copies are byte-equal"
measurement: "pnpm typecheck && pnpm test && pnpm lint && pnpm publish --dry-run --filter @minsky/adapter-types"
anchor: "Martin, *Clean Architecture*, 2017 (acyclic dependency principle); Wiggins, *The Twelve-Factor App*, 2011 (factor II — explicit dependencies); Avizienis et al., *IEEE TDSC* 2004 (status-lattice meet)"
