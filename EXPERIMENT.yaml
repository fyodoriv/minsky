id: watch-shortcuts-2026-05-03
hypothesis: |
  Five Apple-Shortcuts JSON config manifests under
  `distribution/shortcuts/` (3 watch readings — `tokens-remaining`,
  `last-task-status`, `constraint-of-the-week` — plus `pause` and
  `resume`) together with a new `GET /watch.json` route on
  `@minsky/dashboard-web` deliver the data the Apple Shortcuts need to
  render <2 s p95 on Watch (vision.md success #6 — wrist dwell). The
  v0 ships the **autonomously-verifiable upstream half** (URL / port /
  path consistency, schema fidelity, metric-id mapping to
  `SuccessMetric.id`, server returning the right JSON shape); the
  on-device build is operator runbook in `distribution/shortcuts/README.md`
  per the documented pivot (Apple's `.shortcut` is signed binary plist
  since iOS 15 — hand-authoring is unsafe, the brief authorised this
  pivot path explicitly).
success: |
  All of:
    - `pnpm vitest run distribution/shortcuts/test
       novel/dashboard-web/test/server.test.ts --reporter=json |
       jq -e '.numPassedTests >= 7 and .numFailedTests == 0'` exits 0
       (today: 33 passed, 0 failed — 16 shortcuts smoke + 17 server
       tests, well above the ≥7 threshold);
    - `GET /watch.json` returns 200 + `application/json` with the four
       fields `tokens-remaining`, `last-task-status`,
       `constraint-of-the-week`, `paused`;
    - all five `*.shortcut.json` files parse as JSON and conform to
       `distribution/shortcuts/schema/minsky-shortcut.schema.json`;
    - `pnpm typecheck && pnpm test && pnpm lint` all green;
    - `node scripts/check-pattern-index.mjs` passes (vision.md row 65
       added in the same PR);
    - `node scripts/check-pr-self-grade.mjs` passes (PR body has the
       four `Predicted/Observed/Match/Lesson` lines).
pivot: |
  If Apple Shortcuts JSON format had been authorable (i.e., research
  showed iOS 17 accepts hand-authored JSON manifests), the v0 would
  have shipped native importable manifests and skipped the runbook
  entirely. Research disconfirmed that path: iOS 15+ uses signed
  binary plist (`.shortcut`), there is no documented public JSON
  import path, and Apple's signing format is closed. **Pivot fired
  before code: shipped JSON config + manual on-device runbook**, per
  the brief's authorised pivot ("IF the research reveals the format is
  too proprietary/binary to safely author by hand, PIVOT: ship a
  `distribution/shortcuts/README.md` with a step-by-step 'build these
  in Shortcuts.app' runbook + JSON-schema-validatable config files").
  The pivot is documented in this EXPERIMENT.yaml's `lesson` field
  below and in `distribution/shortcuts/README.md` § "Why this pivot".
  Pivot threshold for the *deliverable* (rule-#9 next-tier pivot): if
  the rebuild rate exceeds 1 / month sustained 90 days (operator
  abandons the Watch surface), escalate to `native-watchos-app`
  (already filed as the parent task's documented pivot).
measurement: |
  pnpm install --no-frozen-lockfile \
    && pnpm typecheck \
    && pnpm vitest run distribution/shortcuts/test novel/dashboard-web/test/server.test.ts --reporter=json \
       | jq -e '.numPassedTests >= 7 and .numFailedTests == 0' \
    && pnpm test \
    && pnpm lint \
    && node scripts/check-pattern-index.mjs \
    && npx -y @tasks-md/lint@^0.7.0 TASKS.md \
    && pnpm exec markdownlint-cli2 "**/*.md" "#**/node_modules" "#.minsky" "#.obsidian" "#.claude"
anchor: |
  Card, S. K., Mackinlay, J., Shneiderman, B., *Readings in Information
  Visualization*, Morgan Kaufmann, 1999 (glanceable three-number display
  — the cap on the watch surface is 3 readings); Weiser, M., Brown, J. S.,
  "Designing Calm Technology", *PowerGrid Journal* 1995 (calm tech: the
  wrist surface is ambient; the dwell metric is the friction lens);
  Beyer, B., Jones, C., Petoff, J., Murphy, N. R. (eds.), *Site
  Reliability Engineering*, O'Reilly, 2016, Ch. 17 (operator escape
  hatch / kill switch — the pause/resume control surface); Gamma, Helm,
  Johnson, Vlissides, *Design Patterns*, Addison-Wesley, 1994 (Adapter —
  the `/watch.json` route + JSON envelope IS the adapter between Minsky
  internals and Apple's Shortcuts UI runtime; rule #2 of vision.md);
  Munafò et al., "A Manifesto for Reproducible Science",
  *Nature Human Behaviour* 1, 0021, 2017 (rule-#9 pre-registration —
  the pivot to JSON-config-plus-runbook was committed in the brief
  *before* implementation, not post-hoc); rule #2 (vision.md § 2 —
  every dep behind interface; the JSON envelope is the adapter); rule
  #10 (vision.md § 10 — deterministic enforcement; the smoke test is
  pure-validator + filesystem dispatcher).
