id: setup-doctor-ntfy-check-2026-05-04
hypothesis: |
  `./setup.sh --doctor` checks `git`, `node`, `npx`, `claude`, `jq` ‚Äî but
  not `curl` and not `ntfy`, even though `setup.sh` seeds `ntfy.topic`
  into `.minsky/state.json` on first install and `@minsky/notifier`'s
  `NtfyNotifier` shells out to either `curl` (HTTP POST to
  `https://ntfy.sh/<topic>`) or the `ntfy` CLI to deliver the
  budget-paused push (P1 `daemon-budget-pause-observability`). A
  first-time operator with neither tool on PATH gets a silent failure:
  `--doctor` prints GREEN, then the daemon's exactly-once notify hook
  lands a no-op the first time the budget gets paused.

  Adding two `command -v` lines to the `--doctor` block (and matching
  warnings in the install-mode prereqs) closes the silent-failure path.
  Both fall back to YELLOW (graceful-degrade) ‚Äî neither tool is
  critical, since the channel is opt-in via `MINSKY_NTFY_TOPIC`. The
  fix is purely additive: callers with both tools see two new ‚úì lines;
  callers with neither see two new ‚öÝ lines and the existing YELLOW
  bucket; nobody sees a behavioural regression.
success: |
  - `./setup.sh --doctor 2>&1 | grep -E "(curl|ntfy)" | wc -l` ‚â• 2 on
    any host (the two new lines are present).
  - `./setup.sh --doctor` exits 0 GREEN on a host with `curl` AND
    `ntfy` AND all existing GREEN deps; exits 0 YELLOW on a host with
    `curl` but without `ntfy` (the surfaced-by case ‚Äî fresh install on
    macOS without `brew install ntfy`).
  - `pnpm typecheck` exits 0 (no TS regressions; this PR is shell-only
    + docs).
  - `pnpm vitest run --reporter=json | jq -e '.numFailedTests == 0'`
    exits 0 (no test regressions).
pivot: |
  Two pivot paths pre-registered:
    1. If curl proves to be universally present on every supported
       host AND `ntfy` CLI is never the fallback we actually invoke
       (curl-only is sufficient for ntfy.sh's HTTP API), drop the
       `ntfy` check and only verify `curl`. The `ntfy` CLI check is a
       YAGNI candidate per Beck *Extreme Programming Explained* 1999
       once the empirical data shows curl-only is complete.
    2. If a future `NtfyNotifier` revision drops the curl shell-out
       in favour of `node:fetch` (no external dep), retire BOTH
       checks. The `--doctor` surface tracks the actual fault axis,
       not historical artefacts (Beyer SRE 2016 ch. 6 ‚Äî health checks
       must cover the real failure surface, not the convenient one).
measurement: |
  node -e 'const o=require("child_process").execSync("./setup.sh --doctor 2>&1").toString(); require("assert").ok(/curl/.test(o) && /ntfy/.test(o), "doctor output must mention both curl and ntfy");'
anchor: |
  Beyer, B., Jones, C., Petoff, J., Murphy, N. R. (eds.), *Site
  Reliability Engineering*, O'Reilly, 2016, Ch. 6 ("Monitoring
  Distributed Systems" ‚Äî health checks must cover the actual fault
  axes, not just the convenient ones; a silent push-failure is the
  exact gap this rule warns about).
  Armstrong, J., *Programming Erlang*, Pragmatic Bookshelf, 2007
  (let-it-crash discipline only works when the failure surfaces;
  silent push-channel failure is the opposite of let-it-crash ‚Äî
  --doctor must make the dependency visible).
  Norman, D. A., *The Design of Everyday Things*, Basic Books, 1988
  (signifiers ‚Äî `--doctor`'s output is the affordance; an unchecked
  dependency teaches the operator the channel is wired when it isn't).
  Surfaced-by: 2026-05-04 fresh install ‚Äî operator ran
  `./setup.sh --doctor` GREEN, then noticed `ntfy` not on PATH and
  state.json's ntfy.topic was seeded but unverified end-to-end.
timeout_seconds: 30
