id: dashboard-web-lighthouse-ci
hypothesis: |
  A new `.github/workflows/lighthouse.yml` workflow — pinned `lighthouse@12.4.0`,
  triggered on `pull_request` and `push: branches: [main]` — that builds
  `@minsky/dashboard-web`, starts the SSR server via `distribution/run-dashboard-web.sh`,
  waits for HTTP 200 on port 8080, runs Lighthouse Mobile against `/`, and
  asserts `jq -e '.categories.performance.score >= 0.9' lighthouse.json`,
  fails the merge gate when the dashboard's mobile performance score drops
  below 0.9. This operationalises the parent `dashboard-web-v0` epic's
  prose-only "Lighthouse Mobile score ≥90 in CI" verification cell into a
  deterministic, machine-readable rule-#10 gate (Wilkie 2018 RED Method's
  duration component; Forsgren-Humble-Kim 2018 DORA fast feedback). The
  parent `dashboard-web-v0` tracker block is removed in this PR — all 4
  sub-tasks are closed, and the parent's acceptance criteria are now
  enforced mechanically (one criterion per shipped sub-task) rather than
  prose-tracked.
success: "The lighthouse workflow runs on this PR; the Lighthouse JSON is uploaded as a workflow artifact (`lighthouse-report`); the performance-score assertion passes (`jq -e '.categories.performance.score >= 0.9' lighthouse.json` exits 0); the parent `dashboard-web-v0` tracker block is removed (`grep -c '^  - \\*\\*ID\\*\\*: dashboard-web-v0$' TASKS.md` returns 0); this sub-task's block is removed (`grep -c '^  - \\*\\*ID\\*\\*: dashboard-web-lighthouse-ci$' TASKS.md` returns 0); `vision.md` § \"Pattern conformance index\" row 58 lands; the runner script `distribution/run-dashboard-web.sh` is executable (`test -x distribution/run-dashboard-web.sh` exits 0); the post-merge measurement `test \"$(gh run list --workflow lighthouse.yml --limit 1 --json conclusion --jq '.[0].conclusion')\" = 'success'` exits 0 (a missing run-id surfaces as empty-string ≠ 'success' rather than a false-pass)."
pivot: "If Lighthouse runs are flaky on GH-hosted runners (>1 false-positive failure per 10 runs sustained over 30 days — i.e., the same commit on `main` flips between `success` and `failure` without intervening source change), pivot per the TASKS.md brief: (a) move the job to a self-hosted runner per `supervisor-integration-self-hosted-runner`'s precedent, OR (b) drop the threshold from 0.9 to 0.85 and document the deviation in `vision.md` § \"Pattern conformance index\" row 58. The 0.85 threshold is itself bounded — if it also proves flaky, the gate is the wrong shape (e.g., Lighthouse Mobile is unsuitable for shared CI infra) and we pivot to a synthetic-load-time check (Server-Timing header against a fixed budget) instead. The pivot's quantitative trigger (≥1 false-positive per 10 runs over 30 days) is materially distinct from the success threshold (a single first-run pass at ≥0.9), so the experiment is falsifiable in either direction."
measurement: "test \"$(gh run list --workflow lighthouse.yml --limit 1 --json conclusion --jq '.[0].conclusion')\" = 'success' && test -x distribution/run-dashboard-web.sh && [ \"$(grep -c '^  - \\*\\*ID\\*\\*: dashboard-web-v0$' TASKS.md)\" = '0' ] && [ \"$(grep -c '^  - \\*\\*ID\\*\\*: dashboard-web-lighthouse-ci$' TASKS.md)\" = '0' ] && grep -q '^| 58 |' vision.md"
anchor: "rule #10 (vision.md § 10 — deterministic enforcement; the parent `dashboard-web-v0`'s prose-only Lighthouse verification cell now has a machine-readable counterpart); Wilkie, T., \"The RED Method: How To Instrument Your Services\", *Weave Works blog* / *USENIX SREcon EMEA* 2018 (the duration component of RED is the user-perceived latency Lighthouse measures); Forsgren, N., Humble, J., Kim, G., *Accelerate*, IT Revolution Press, 2018 (DORA — fast feedback on performance regressions; the pre-merge cadence is the load-bearing property); Beck, K., *Extreme Programming Explained*, Addison-Wesley, 1999, Ch. 17 (CI as the constraint enforcer); ARCHITECTURE.md § \"Versioning & dependency evolution\" (Lighthouse pin)."
replay_windows_days: [7, 30]
