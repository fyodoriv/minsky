id: daemon-budget-pause-observability-2026-05-04
hypothesis: |
  Surfaced by the first 2h live-on-itself run on 2026-05-04 11:13 local:
  the daemon's `iteration.status: "budget-paused"` emitted an OTEL span and
  log line, but no operator-facing signal ŌĆö the user had to `tail` the log
  to know the daemon was self-paused on budget exhaustion. Adding two
  changes closes the operator-informing loop:
    (a) `runDaemon` accepts an optional `notifier?: NotifierLike` (rule #2
        ŌĆö structural subset of `@minsky/notifier`'s `Notifier`) and fires
        exactly ONE `push({ tags: ["pause", "budget"] })` per *transition*
        into `budget-paused`. Recovery (any non-budget-paused status)
        re-arms the trigger, so a second pause event fires a second push.
        Without the debounce, the operator would get a push every 5min for
        as long as the 5h budget window stays exhausted (catastrophic).
    (b) `/watch.json` envelope grows a `pauseReason: "operator" | "budget"
        | null` field alongside the existing `paused: boolean`. Apple
        Shortcuts that don't care about the reason keep using `paused`;
        richer renderers (the dashboard HTML route, future tiles) read the
        new field. The boolean stays for backwards compat.
success: |
  - `pnpm vitest run novel/tick-loop novel/dashboard-web --reporter=json
    | jq -e '.numPassedTests >= 60 and .numFailedTests == 0'` exits 0.
    Today: 38 in tick-loop (+3 new debounce tests on top of 35) + 28 in
    dashboard-web (+2 new pauseReason tests). Total = 66.
  - Full suite stays green: `pnpm vitest run` exits 0 with Ōēź737 passing.
  - `pnpm typecheck` exits 0.
  - rule-N lints clean against `origin/main`.
pivot: |
  Two pivot paths pre-registered:
    1. If Apple Shortcuts can't render the new `pauseReason` channel
       cleanly given vision row 12's "three numbers, no chrome" calm-tech
       cap, this PR ships just the Ntfy push + the JSON envelope field;
       Shortcut visualization is deferred to a P3 follow-up
       (`watch-paused-tile`). The push alone closes the operator-informing
       gap (the wrist surface keeps the existing boolean tile).
    2. If the structural `NotifierLike` subtype proves too narrow (the
       daemon needs more than `push()` from a real `Notifier`), pivot to
       importing `@minsky/notifier`'s full `Notifier` ŌĆö at the cost of
       coupling the daemon to the package directly. Today's narrow shape
       is sufficient because the daemon only needs `push`.
measurement: |
  grep -q 'inBudgetPause' novel/tick-loop/src/daemon.ts \
