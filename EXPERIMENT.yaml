id: otel-lite-backend
hypothesis: |
  A lightweight OTEL-compatible backend exists that satisfies (a) on-disk
  footprint <1 GB / month at the v0 emission rate, (b) install steps ≤3
  commands from a clean machine, and (c) the three success-criteria query
  shapes from vision.md (rows 2, 5, 9) — making it preferable to the
  current Loki+Tempo+Prometheus+Grafana stack for the solo-dev tier.
  Evaluate ≥3 candidates and recommend one in research.md.
success: "grep -c '^## Lighter OTEL backend' research.md returns 1 AND the section contains a 4-column markdown table (Backend | Disk/month | Install steps | Query) with ≥3 candidates evaluated and exactly one recommended; pnpm typecheck && pnpm test && pnpm lint && npx @tasks-md/lint TASKS.md && npx markdownlint-cli2 all green."
pivot: "if no candidate satisfies <1 GB/month AND ≤3 install commands AND can answer the success-criteria queries from vision.md, keep Loki+Tempo+Prometheus+Grafana and file a follow-up `otel-signal-volume-reduction` task to lower OTEL signal volume instead."
measurement: "test \"$(grep -c '^## Lighter OTEL backend' research.md)\" = 1 && test \"$(awk '/^## Lighter OTEL backend/,/^## How to read this file/' research.md | grep -c '^|.*|.*|.*|.*|')\" -ge 5"
anchor: "OpenTelemetry specification (CNCF 2020+); Gregg, Systems Performance, 2014 (USE method as the lens for what a backend must support); rule #1 (vision.md § 1, don't reinvent the wheel)."
replay_windows_days: [7, 30, 180]
