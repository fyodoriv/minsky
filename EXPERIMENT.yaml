id: spec-monitor-prose-sweep
hypothesis: |
  Every remaining mention of `spec-monitor` / `claude-spec-monitor` in
  vision.md and ARCHITECTURE.md now correctly attributes the deterministic
  share to its actual linter (rule-6 -> `scripts/check-rule-6-let-it-crash.mjs`
  for silent-retry; `@minsky/experiment-record`'s `VANITY_PHRASES` for vanity
  metrics; the rule-#10 lint set for runtime specification monitoring) and
  explicitly tags the residual judgement share as advisory-only `novel/spec-
  monitor/` (vision.md row 35), never gating CI. Success-criterion #3
  (`Specification alignment`) is rewired from the non-existent
  `claude-spec-monitor --report --json` CLI to a deterministic linter
  green-ratio over a 30-day window via `gh run list`, restoring the row to
  rule-#9-compliant runnability.
success: "grep -nE 'spec-monitor.*flag|spec-monitor.*report|spec-monitor.*runs find' vision.md ARCHITECTURE.md | wc -l returns 0; pnpm typecheck && pnpm test && pnpm lint && npx @tasks-md/lint TASKS.md all green; pattern-index lint stays green."
pivot: "if a spec-monitor mention cannot be cleanly mapped to either a deterministic linter or an advisory-only tag (i.e., the prose describes a load-bearing capability that no linter currently provides), file a follow-up `ci-rule-N-*` task to ship the missing deterministic linter rather than papering over with advisory framing; revert the prose change for that mention until the linter lands."
measurement: "grep -nE 'spec-monitor.*flag|spec-monitor.*report|spec-monitor.*runs find' vision.md ARCHITECTURE.md | wc -l"
anchor: "rule #10 (vision.md § 10 — deterministic enforcement, ratchet rule); Havelund & Goldberg, 'Verify Your Runs', VSTTE 2008 (runtime verification — split here by mechanisability per rule #10); Munafò et al. 2017 (pre-registration as the falsifiability discipline)."
