id: ci-lint-pivot-success-margin
hypothesis: |
  Promoting spec-monitor advisory rule A2 ("pivot threshold reuses the
  success threshold or has zero margin") to a deterministic CI lint at
  `scripts/check-pivot-success-margin.mjs` makes the zero-margin failure
  mode unmissable on every PR. The pure decision function reads `success`
  and `pivot` from EXPERIMENT.yaml via `@minsky/experiment-record`'s
  parser, regex-extracts the leading signed numeric token from each, and
  fails when |Δ|/max(|success|,1) < 1 % (or when both sides are
  identical binary prose). Per Ries 2011 (pivot-or-persevere), a
  zero-margin pivot is theatre — it carries no information beyond the
  success threshold and should fail mechanically, not advisorially.
  Per rule #10's ratchet, A2 is retired from SKILL.md in the same PR;
  the active advisory count drops by 1 (A4 already retired in PR #51).
  If numeric-token extraction proves brittle (>10 % false-positive rate
  on prose-heavy records), the approach is wrong and A2 stays advisory
  — the deterministic candidate is abandoned, not iterated on.
success: "≥19 unit tests pass in `scripts/check-pivot-success-margin.test.mjs` (covering the zero-margin / 10-pt-margin / exact-equality / binary-equal / binary-differing / mixed / skip-comment branches), the lint exits 0 against this PR's own EXPERIMENT.yaml (numeric margin ≥1 %), the lint exits 1 against a synthetic `success: \">= 95 %\"` / `pivot: \"< 95 %\"` fixture, AND `scripts/check-skill-rule-cap.mjs` reports ≤4 active advisory rules in `novel/spec-monitor/SKILL.md` (A2 retired)."
pivot: "If the lint produces ≥1 false positive against any of the next 2 EXPERIMENT.yaml records merged into main (i.e., the numeric-token regex captures a non-threshold number — the leading `2` in '2024-01-01' or similar — and triggers a spurious zero-margin failure), revert the CI wiring on `pivot-success-margin`, keep `### A2.` as an active advisory heading in SKILL.md (raising the count back to its pre-PR value), and close the `ci-lint-pivot-success-margin` task as pivoted-not-validated."
measurement: "pnpm exec vitest run scripts/check-pivot-success-margin.test.mjs && node scripts/check-pivot-success-margin.mjs EXPERIMENT.yaml && node scripts/check-skill-rule-cap.mjs"
anchor: "Ries, *The Lean Startup*, 2011 (build-measure-learn / pivot-or-persevere — a meaningful pivot threshold must carry information distinct from the success threshold); rule #10 (vision.md § 10 — deterministic enforcement; ratchet rule: when an advisory rule is promoted to a deterministic linter, the advisory counterpart is removed in the same PR); `spec-advisories/2026-05-03-quarterly-audit.md` (audit decision to promote A2)."
replay_windows_days: [7, 30]
