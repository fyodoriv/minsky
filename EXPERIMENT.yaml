id: ci-lint-anchor-primary-source
hypothesis: |
  Promoting spec-monitor advisory rule A3 ("anchor citation is not a
  primary source") to a deterministic CI lint at
  `scripts/check-anchor-primary-source.mjs` makes blog-decay anchor
  citations unmissable on every PR. The pure decision function reads the
  `anchor` field from EXPERIMENT.yaml via `@minsky/experiment-record`'s
  parser and runs an allowlist + deny-list classifier: deny-list of known
  non-primary sources (`medium.com`, `*.substack.com`, `wikipedia.org`,
  `twitter.com`, `x.com`, `reddit.com`, `stackoverflow.com`, `chatgpt.com`,
  `claude.ai`, "ChatGPT said", "tweet by", "blog post") fails when matched
  and no allowlist token is present; allowlist of primary-source patterns
  (italicised book/journal title `*…*`, `Ch. <n>`, `pp. <n>`, ISBN, DOI,
  conference `<VENUE> <YEAR>`, internal cross-ref `vision.md §` / `rule
  #<n>` / `spec-advisories/<date>.md`) passes when matched. Three-way
  verdict — pass / fail / advisory-warn (short prose without signal). Per
  rule #5 / rule #8 the constitution must outlive any single source —
  blog URLs rot, Wikipedia edits, tweets vanish. Per rule #10's ratchet,
  A3 is retired from SKILL.md in the same PR; the active advisory count
  drops by 1 (only A1 and A5 remain advisory; A2 and A4 already retired).
  If the deny-list grows past 15 entries to cover legitimate variations
  (arxiv preprints sometimes primary, sometimes not) OR >10 % of historical
  anchors fall through to `warn`, the rule is judgement-bound and this
  lint is retired — A3 stays advisory in SKILL.md.
success: "≥8 unit tests pass in `scripts/check-anchor-primary-source.test.mjs` (covering the deny-list cases medium / wikipedia / tweet / chatgpt, the allowlist cases book+chapter / cross-ref / DOI, and the short-prose warn case), the lint exits 0 against this PR's own EXPERIMENT.yaml (allowlist hit on `*The Lean Startup*` / `rule #10` / `vision.md §` / `spec-advisories/`), the lint exits 1 against a synthetic `anchor: \"https://medium.com/some-blog/post\"` fixture, AND `scripts/check-skill-rule-cap.mjs` reports ≤2 active advisory rules in `novel/spec-monitor/SKILL.md` (A3 retired, only A1 and A5 remaining)."
pivot: "If the deny-list grows past 15 entries to cover legitimate variations (e.g., `arxiv.org` is sometimes primary, sometimes preprint-only) OR >10 % of historical anchors fall through to the `warn` channel within 30 days of merge (i.e., the lint is producing noise rather than signal), revert the CI wiring on `anchor-primary-source`, restore `### A3.` as an active advisory heading in SKILL.md (raising the count back to its pre-PR value), and close the `ci-lint-anchor-primary-source` task as pivoted-not-validated."
measurement: "pnpm exec vitest run scripts/check-anchor-primary-source.test.mjs && node scripts/check-anchor-primary-source.mjs EXPERIMENT.yaml && node scripts/check-skill-rule-cap.mjs"
anchor: "rule #10 (vision.md § 10 — deterministic enforcement; ratchet rule: when an advisory rule is promoted to a deterministic linter, the advisory counterpart is removed in the same PR); rule #5 / rule #8 (vision.md § 5 / § 8 — named, decades-tested pattern; the constitution must outlive any single source); Havelund & Goldberg, *VSTTE* 2008 (runtime verification — the primary-source check is the deterministic-monitor layer carved out from the residual advisory share); `spec-advisories/2026-05-03-quarterly-audit.md` (audit decision to admit a deterministic deny-list + allowlist for A3)."
replay_windows_days: [7, 30]
