id: ci-lint-measurement-inspects-output
hypothesis: |
  Promoting spec-monitor advisory rule A4 ("measurement runs but doesn't
  actually inspect output") to a deterministic CI lint
  (`scripts/check-measurement-inspects-output.mjs`) catches the
  false-confidence trap — measurements that shell out without inspecting
  output (`echo done`, `true`, bare `curl URL`, bare `node script.mjs`) —
  on every PR, deterministically. The lint reads EXPERIMENT.yaml's
  `measurement` field via `@minsky/experiment-record`, classifies the
  command three ways: `pass` (allowlist token present — `test`, `[`, `[[`,
  `jq -e`, `grep -q`/`-c`, `assert`, `vitest`, `pnpm test`/`typecheck`/
  `lint`, `@tasks-md/lint`, `markdownlint-cli2`, `gh run list ... --jq`,
  `node scripts/check-*.mjs`); `fail` (blacklist token present and no
  allowlist hit — `echo`, bare `true`, bare `curl`, bare `node`); `warn`
  (neither — residual judgement scope, exit 0 with stderr advisory).
  Word-boundary matching prevents `latest` from hitting `test`. The same
  PR removes A4 from `novel/spec-monitor/SKILL.md` per the rule-#10
  ratchet — a deterministic gate replaces the matching advisory rule.
success: "8+ unit tests pass (`pnpm vitest run scripts/check-measurement-inspects-output.test.mjs`); the lint exits 0 on this repo's own EXPERIMENT.yaml; the lint exits 1 on synthetic `measurement: \"echo done\"` and `measurement: \"true\"`; A4 removed from `novel/spec-monitor/SKILL.md` (rule count drops by ≥1 vs. main); `scripts/check-skill-rule-cap.mjs` continues to pass."
pivot: "If the inspector allowlist proves too narrow — i.e. >10 % of the repo's existing EXPERIMENT.yaml records emit `warn` after this lint ships AND those `warn` cases are reviewed-OK by the maintainer (legit measurements consistently land in the residual channel) — the rule is judgement-bound. Retire `scripts/check-measurement-inspects-output.mjs` and restore A4 to SKILL.md as advisory."
measurement: "pnpm vitest run scripts/check-measurement-inspects-output.test.mjs && node scripts/check-measurement-inspects-output.mjs EXPERIMENT.yaml"
anchor: "rule #10 (vision.md § 10 — deterministic enforcement; ratchet rule); Havelund & Goldberg, \"Verify Your Runs\", *VSTTE* 2008 (runtime verification — the inspect-output check is the deterministic-monitor layer); spec-advisories/2026-05-03-quarterly-audit.md (audit decision: A4 admits a deterministic allowlist + blacklist)."
replay_windows_days: [7, 30]
