anchor: |
  rule #2 (vision.md § 2 — every dep behind interface; the `SpawnStrategy`
  is the seam, the flip swaps one implementation for another with no
  consumer-side change); Armstrong, J., *Programming Erlang*, Pragmatic
  Bookshelf, 2007 (let-it-crash AT the right boundary — `ProcessSpawnStrategy`
  surfaces non-zero exit codes in the result; the daemon's supervisor
  `Restart=on-failure` is the respawn policy, not the Strategy); Kephart,
  J. O., Chess, D. M., "The Vision of Autonomic Computing", *IEEE Computer*
  36 (1), 2003 (MAPE-K — after this flip the daemon's Execute phase runs
  against a real subprocess, raising the row-67 conformance from `partial`
  to `partial-real-spawn`); Beyer, B., Jones, C., Petoff, J., Murphy, N. R.
  (eds.), *Site Reliability Engineering*, O'Reilly, 2016, Ch. 3 (the
  burn-rate budget gate stays in place across the flip; the env-var
  control surface is the operator escape hatch — Ch. 17); Munafò et al.,
  "A Manifesto for Reproducible Science", *Nature Human Behaviour* 1,
  0021, 2017 (rule-#9 pre-registration — the env-var rollout default
  `MINSKY_TICK_DRY_RUN=1` was committed in the parent task block *before*
  implementation, so the safety net is mechanical, not policy).
