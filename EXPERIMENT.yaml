id: watch-control-endpoint-2026-05-03
hypothesis: |
  Adding a `POST /control` route to `@minsky/dashboard-web` with a pure
  `parseControlBody` validator + a `setPaused: (v: boolean) => void`
  Strategy seam (mirroring the existing `getPauseState` shape from PR
  #68) closes the round-trip on the Apple-Shortcuts pause/resume pair
  shipped by `watch-shortcuts` (PR #84): a `POST /control {paused:true}`
  is observed in the next `GET /watch.json` body's `paused` field within
  one HTTP round-trip. This closes the parent `watch-shortcuts` task's
  verification cell ("Pause Shortcut writes a sentinel file the
  supervisor honors within 1 scheduler iteration") on the dashboard
  side; supervisor-side wiring (the *consumer* of the paused sentinel)
  remains a follow-up. The `setPaused` Strategy is the seam (rule #2)
  the supervisor will plug into in the next task — v0 ships an
  in-memory pair (`createMemoryPauseState`) so tests + dev round-trip
  end-to-end without any external state.
success: |
  - `pnpm typecheck` exits 0.
  - `pnpm vitest run novel/dashboard-web/test/server.test.ts --reporter=json | jq -e '.numPassedTests >= 21 and .numFailedTests == 0'` exits 0 (today: 17 → 24, +7 new server-test cases for `POST /control`).
  - `pnpm vitest run novel/dashboard-web/test/control.test.ts` adds ≥4 cases for the pure validator + memory-pair Strategy (today: 12).
  - Round-trip: a `POST /control {paused:true}` against `createServer()` (default in-memory pair) is observed as `paused: true` in the next `GET /watch.json` body; the inverse round-trip (POST `{paused:false}` → `paused: false` on the next GET) is also asserted.
  - 400 graceful-degrade on (a) missing body, (b) body without `paused`, (c) non-boolean `paused`, (d) non-JSON body — verified by call-counter assertions that `setPaused` is NEVER called on the malformed branch.
  - `distribution/shortcuts/test/shortcuts-json.test.mjs` is tightened: post-control shortcuts must have `request_body` whose key-set is exactly `["paused"]` and whose `paused` value is a boolean (closing drift between Shortcut and server).
  - The chaos table in `novel/dashboard-web/README.md` carries a new row 5 for "Malformed control payload" → `graceful-degrade` 400.
  - The `watch-control-endpoint` task block is removed from TASKS.md in the same PR.
  - Concretely: `pnpm typecheck && pnpm vitest run novel/dashboard-web/test/server.test.ts --reporter=json | jq -e '.numPassedTests >= 21 and .numFailedTests == 0'` exits 0.
pivot: |
  If supervisor-side wiring (the *consumer* of the paused sentinel — a
  file the tick loop honors) proves materially harder than the
  dashboard-web side (>1d of integration work), retire `/control`
  entirely and ship pause/resume as a launchctl-only operator action
  documented in `distribution/launchd/README.md`. The Watch surface
  stays read-only — the user-story 002 Acceptance is preserved by the
  iPhone Shortcut still working at the OS level (`launchctl stop` /
  `launchctl start` on the supervisor unit). The `setPaused` Strategy
  seam is the migration boundary: the dashboard route + tests stay
  intact; only the production wiring in `start.ts` flips from the
  in-memory pair to a no-op + supervisor-managed unit-file flag.
measurement: |
  pnpm install --no-frozen-lockfile \
    && pnpm typecheck \
    && pnpm vitest run \
         novel/dashboard-web/test/server.test.ts \
         --reporter=json \
       | jq -e '.numPassedTests >= 21 and .numFailedTests == 0' \
    && pnpm vitest run novel/dashboard-web/test/control.test.ts \
    && pnpm vitest run distribution/shortcuts/test/shortcuts-json.test.mjs \
    && pnpm test \
    && pnpm lint \
    && node scripts/check-rule-4-otel-coverage.mjs --diff-base=origin/main \
    && node scripts/check-rule-6-let-it-crash.mjs --diff-base=origin/main \
    && node scripts/check-rule-7-chaos-coverage.mjs \
    && node scripts/check-pattern-index.mjs --diff-base=origin/main \
    && node scripts/check-rule-1-novel-justification.mjs --diff-base=origin/main \
    && npx -y @tasks-md/lint@^0.7.0 TASKS.md \
    && pnpm exec markdownlint-cli2 "**/*.md" "#**/node_modules" "#.minsky" "#.obsidian" "#.claude"
anchor: |
  Beyer, Jones, Petoff, Murphy, *Site Reliability Engineering*, O'Reilly,
  2016 — Ch. 17 (operator escape hatch / kill switch: a pause-able loop
  is a load-bearing safety property of any autonomous system, especially
  one that mutates a code repository); Gamma, Helm, Johnson, Vlissides,
  *Design Patterns*, Addison-Wesley, 1994 — Strategy: the `setPaused`
  Strategy is the writer half of the pause seam, mirroring the existing
  `getPauseState` (reader) shape — a single in-memory cell backs both in
  v0 (`createMemoryPauseState`); rule #2 (every dep behind interface —
  `setPaused` is the supervisor seam, not a hard import); rule #7
  (chaos engineering — malformed payload is the upstream fault axis;
  `parseControlBody` returns a discriminated `{ok:false, error}` and the
  route maps it to a 400, never crashing); Munafò et al., *Nature Human
  Behaviour* 1, 0021, 2017 — pre-registration (the pivot to a
  launchctl-only operator action is committed *before* supervisor-side
  wiring is observed in the field, so a failure cannot be retroactively
  explained away as the chosen mechanism).
replay_windows_days: [90]
