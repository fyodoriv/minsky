# Pre-commit + pre-push hooks. Run only on changed files for speed.
# Install with: pnpm dlx lefthook install
pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,js,json,jsonc,md}"
      run: pnpm biome check --error-on-warnings --no-errors-on-unmatched {staged_files}
    typecheck:
      glob: "*.ts"
      run: pnpm typecheck
    test:
      glob: "*.ts"
      run: pnpm vitest related --run {staged_files}
    scan-secrets:
      # rule #13 item 3: block secrets at commit time.
      # Install gitleaks: brew install gitleaks (macOS) / see docs/security/secret-scanning.md.
      # Emergency local bypass (CI remains non-bypassable): MINSKY_SKIP_SECRET_SCAN=1
      run: |
        if [ "${MINSKY_SKIP_SECRET_SCAN}" = "1" ]; then
          echo "secret scan skipped (MINSKY_SKIP_SECRET_SCAN=1)"
          exit 0
        fi
        if ! command -v gitleaks >/dev/null 2>&1; then
          printf 'ERROR: gitleaks not installed.\nInstall: brew install gitleaks  (macOS)\nSee docs/security/secret-scanning.md for other platforms.\nEmergency local bypass: MINSKY_SKIP_SECRET_SCAN=1  (CI is non-bypassable)\n' >&2
          exit 1
        fi
        gitleaks protect --staged --redact --no-banner --config .gitleaks.toml --exit-code 1

pre-push:
  commands:
    pre-pr-lint:
      # Canonical pre-PR lint stack — single source of truth shared with the
      # daemon's brief gate (TASKS.md `daemon-pre-pr-lint-gate`). Humans run
      # `--stage=full` (adds vitest + diff-relative + dormant-config lints);
      # the daemon brief runs `--stage=fast` for spawn-budget reasons. Both
      # share the manifest in `scripts/run-pre-pr-lint-stack.mjs`. Rule #10 —
      # the daemon and the human pass through the same gate.
      run: pnpm pre-pr-lint --stage=full
