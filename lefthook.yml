# Pre-commit + pre-push hooks. Run only on changed files for speed.
# Install with: pnpm dlx lefthook install
pre-commit:
  parallel: true
  commands:
    toolchain:
      # TASKS.md `commit-hook-chain-node-version-and-platform-resilience`
      # slice 1 (vision.md rule #6 — fail loud at the actionable boundary).
      # Runs every commit (no `glob` ⇒ unconditional) so a node-version /
      # platform-dep drift surfaces as a one-line `fnm use` / `pnpm install`
      # remediation INSTEAD OF an opaque MODULE_NOT_FOUND from biome/lefthook
      # that silently 100%-blocks every commit fleet-wide. The same guard runs
      # at `postinstall` (rule #10 — one guard, every gate); wiring it into
      # `pnpm pre-pr-lint`/CI is a tracked follow-up slice.
      run: node scripts/check-toolchain.mjs
    biome:
      glob: "*.{ts,js,json,jsonc,md}"
      run: pnpm biome check --error-on-warnings --no-errors-on-unmatched {staged_files}
    typecheck:
      glob: "*.ts"
      run: pnpm typecheck
    test:
      glob: "*.ts"
      run: pnpm vitest related --run {staged_files}
    scan-secrets:
      # vision.md § 13.1 / TASKS.md `secret-scanning-precommit-and-ci`: gate
      # credentials at commit time, before they land even locally — git's
      # rotation cost stays at "delete the working-tree line" instead of
      # escalating to "rotate the credential and rewrite history". The CLI
      # accepts `{staged_files}` positionally and runs only on those paths;
      # the same script's no-arg full-scan mode runs in CI as the
      # `secret-scan` gate.
      run: node scripts/scan-secrets.mjs {staged_files}

pre-push:
  commands:
    pre-pr-lint:
      # Canonical pre-PR lint stack — single source of truth shared with the
      # daemon's brief gate (TASKS.md `daemon-pre-pr-lint-gate`). Humans run
      # `--stage=full` (adds vitest + diff-relative + dormant-config lints);
      # the daemon brief runs `--stage=fast` for spawn-budget reasons. Both
      # share the manifest in `scripts/run-pre-pr-lint-stack.mjs`. Rule #10 —
      # the daemon and the human pass through the same gate.
      run: pnpm pre-pr-lint --stage=full
